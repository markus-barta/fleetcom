<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetCom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #080a10;
            --bg-1: #0e1118;
            --bg-2: #141821;
            --line: #1c202b;
            --line-2: #2a3040;
            --ink: #e8e6df;
            --ink-dim: #8a8d96;
            --ink-ghost: #565862;
            --ink-faint: #3a3e48;
            --ok: #3ddc97;
            --warn: #ffb84d;
            --crit: #ff4d6d;
            --dead: #545865;
            --accent: #6ab0ff;
            --ok-bg: rgba(61, 220, 151, 0.05);
            --warn-bg: rgba(255, 184, 77, 0.08);
            --warn-border: rgba(255, 184, 77, 0.42);
            --crit-bg: rgba(255, 77, 109, 0.10);
            --crit-border: rgba(255, 77, 109, 0.55);
            --dead-bg: rgba(84, 88, 101, 0.18);
            --dead-border: rgba(84, 88, 101, 0.40);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg-0);
            color: var(--ink);
            font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.5;
            font-feature-settings: 'tnum' 1, 'ss01' 1, 'cv02' 1;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* CRT scanlines — barely there, sets the telemetry tone */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                180deg,
                transparent 0,
                transparent 2px,
                rgba(255, 255, 255, 0.012) 2px,
                rgba(255, 255, 255, 0.012) 3px
            );
            z-index: 100;
        }

        /* Faint radial glow from top — subtle atmosphere */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(106, 176, 255, 0.05), transparent 60%);
            z-index: 1;
        }

        .app {
            flex: 1 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        main { flex: 1 0 auto; padding: 1.25rem 1.5rem 2rem; }

        /* ============================================================
           HEADER
           ============================================================ */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(20, 24, 33, 0.7), rgba(14, 17, 24, 0.5));
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left, .header-center, .header-right {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .header-right { justify-content: flex-end; }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.14em;
            color: var(--ink);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .brand::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 14px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(106, 176, 255, 0.3);
        }
        .brand .tag {
            font-size: 9px;
            letter-spacing: 0.22em;
            color: var(--ink-ghost);
            font-weight: 400;
            margin-left: 0.15rem;
        }

        /* Connection pill */
        .conn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.7rem;
            border: 1px solid var(--line-2);
            background: var(--bg-1);
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--ink-dim);
            white-space: nowrap;
        }
        .conn .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--ink-faint);
            flex-shrink: 0;
        }
        .conn.state-live { color: var(--ok); border-color: rgba(61, 220, 151, 0.35); }
        .conn.state-live .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok), 0 0 10px rgba(61, 220, 151, 0.4); }
        .conn.state-reconnecting { color: var(--warn); border-color: rgba(255, 184, 77, 0.4); }
        .conn.state-reconnecting .dot {
            background: var(--warn);
            box-shadow: 0 0 6px var(--warn);
            animation: pulse-fast 1s ease-in-out infinite;
        }
        .conn.state-offline {
            color: var(--crit);
            border-color: rgba(255, 77, 109, 0.55);
            background: rgba(255, 77, 109, 0.06);
        }
        .conn.state-offline .dot {
            background: var(--crit);
            box-shadow: 0 0 8px var(--crit), 0 0 14px rgba(255, 77, 109, 0.5);
            animation: pulse-fast 0.6s ease-in-out infinite;
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .clock {
            font-variant-numeric: tabular-nums;
            color: var(--ink-dim);
            font-size: 11px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .clock .sep { color: var(--ink-faint); margin: 0 0.35rem; }
        .clock .tz { color: var(--ink-ghost); font-size: 9px; letter-spacing: 0.18em; margin-left: 0.4rem; }

        .stats {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            line-height: 1;
        }
        .stat .label {
            font-size: 8px;
            letter-spacing: 0.2em;
            color: var(--ink-ghost);
            text-transform: uppercase;
            font-weight: 500;
        }
        .stat .value {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
        }
        .stat .value .sub {
            color: var(--ink-ghost);
            font-weight: 300;
            padding: 0 1px;
        }
        .stat.state-warn .value { color: var(--warn); }
        .stat.state-crit .value { color: var(--crit); }

        /* View toggle */
        .view-toggle {
            display: inline-flex;
            border: 1px solid var(--line-2);
            background: var(--bg-1);
        }
        .view-toggle button {
            border: none;
            background: transparent;
            color: var(--ink-dim);
            padding: 0.35rem 0.8rem;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s;
        }
        .view-toggle button:hover { color: var(--ink); background: var(--bg-2); }
        .view-toggle button.active {
            color: var(--bg-0);
            background: var(--accent);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 1.1rem;
        }
        .nav a {
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--ink-dim);
            text-decoration: none;
            cursor: pointer;
            padding: 0.3rem 0;
            border-bottom: 1px solid transparent;
            transition: color 0.12s, border-color 0.12s;
        }
        .nav a:hover { color: var(--ink); }
        .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
        .nav .readonly {
            color: var(--ink-ghost);
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--line);
        }

        /* ============================================================
           MAIN — view label
           ============================================================ */
        .view-label {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 0.85rem;
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 500;
        }
        .view-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--line), transparent);
        }

        /* ============================================================
           DETAIL VIEW — cards
           ============================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(410px, 1fr));
            gap: 0.85rem;
        }

        .card {
            position: relative;
            background: var(--bg-1);
            border: 1px solid var(--line);
            border-left: 3px solid var(--line-2);
            padding: 0.85rem 1.1rem 1rem;
            transition: background 0.15s, border-color 0.15s;
        }
        .card:hover { background: var(--bg-2); }

        .card.state-ok {
            border-left-color: var(--ok);
            animation: ok-breathe 6s ease-in-out infinite;
        }
        .card.state-warn {
            border-left-color: var(--warn);
            border-color: var(--warn-border);
            background: linear-gradient(180deg, var(--warn-bg), transparent 65%), var(--bg-1);
        }
        .card.state-crit {
            border-left-color: var(--crit);
            border-color: var(--crit-border);
            background: linear-gradient(180deg, var(--crit-bg), transparent 65%), var(--bg-1);
            animation: crit-pulse 2.4s ease-in-out infinite;
        }
        .card.state-dead {
            border-left-color: var(--dead);
            border-color: var(--dead-border);
            background:
                repeating-linear-gradient(
                    135deg,
                    transparent 0 18px,
                    rgba(255, 255, 255, 0.018) 18px 19px
                ),
                var(--dead-bg);
            filter: grayscale(0.7);
            opacity: 0.48;
        }
        .card.state-dead:hover { opacity: 0.72; }

        @keyframes ok-breathe {
            0%, 100% { box-shadow: -1px 0 14px -4px rgba(61, 220, 151, 0.18); }
            50%      { box-shadow: -1px 0 22px -2px rgba(61, 220, 151, 0.38); }
        }
        @keyframes crit-pulse {
            0%, 100% { box-shadow: 0 0 0 0 transparent, 0 0 12px rgba(255, 77, 109, 0.06); }
            50%      { box-shadow: inset 3px 0 0 0 var(--crit), 0 0 32px rgba(255, 77, 109, 0.24); }
        }

        .card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.25rem;
        }
        .card-head-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
            flex-wrap: wrap;
        }
        .hostname {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.01em;
        }
        .state-pill {
            display: inline-block;
            font-size: 8px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 2px 6px;
            border: 1px solid currentColor;
            line-height: 1.2;
        }
        .card.state-ok .state-pill {
            color: var(--ok);
            background: rgba(61, 220, 151, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .card.state-ok .state-pill::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ok);
            box-shadow: 0 0 6px var(--ok), 0 0 10px rgba(61, 220, 151, 0.5);
            animation: heartbeat 1.6s ease-in-out infinite;
        }
        .card.state-warn .state-pill { color: var(--warn); background: rgba(255, 184, 77, 0.05); }
        .card.state-crit .state-pill { color: var(--crit); background: rgba(255, 77, 109, 0.10); }
        .card.state-dead .state-pill { color: var(--dead); }

        @keyframes heartbeat {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.35; transform: scale(0.8); }
        }

        .card-head-right {
            text-align: right;
            font-size: 10px;
            color: var(--ink-dim);
            line-height: 1.5;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .card-head-right .seen {
            color: var(--ink-ghost);
        }
        .card.state-warn .card-head-right .seen { color: var(--warn); }
        .card.state-crit .card-head-right .seen { color: var(--crit); font-weight: 600; }

        .card-section {
            margin-top: 0.8rem;
        }
        .card-section-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            font-size: 8px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 600;
        }
        .card-section-label .count { color: var(--ink-dim); }
        .card-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .chips.dense {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
            gap: 3px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 7px;
            background: var(--bg-0);
            border: 1px solid var(--line);
            font-size: 11px;
            color: var(--ink);
            line-height: 1.3;
            min-width: 0;
            max-width: 100%;
        }
        .chip .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--ink-faint);
        }
        .chip.s-ok .dot { background: var(--ok); box-shadow: 0 0 4px rgba(61, 220, 151, 0.7); }
        .chip.s-warn .dot { background: var(--warn); box-shadow: 0 0 4px rgba(255, 184, 77, 0.7); }
        .chip.s-warn { border-color: rgba(255, 184, 77, 0.25); }
        .chip.s-crit .dot { background: var(--crit); box-shadow: 0 0 5px rgba(255, 77, 109, 0.8); }
        .chip.s-crit { border-color: rgba(255, 77, 109, 0.35); color: var(--crit); }
        .chip.s-dead .dot { background: var(--dead); }
        .chip.s-dead { opacity: 0.6; }

        /* Container chip — shipping-container crate icon */
        .chip-container .crate {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
            color: var(--ink-faint);
        }
        .chip-container.s-ok .crate {
            color: var(--ok);
            filter: drop-shadow(0 0 3px rgba(61, 220, 151, 0.75));
        }
        .chip-container.s-warn .crate {
            color: var(--warn);
            filter: drop-shadow(0 0 3px rgba(255, 184, 77, 0.75));
        }
        .chip-container.s-crit .crate {
            color: var(--crit);
            filter: drop-shadow(0 0 4px rgba(255, 77, 109, 0.85));
        }
        .chip-container.s-dead .crate { color: var(--dead); }

        .chip.is-open {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 0 10px rgba(106, 176, 255, 0.25);
        }
        .chip { cursor: pointer; }

        /* ============================================================
           HISTORY STRIPS — single-row, canvas-rendered, self-labelling
           ============================================================ */
        .strip-block {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 0.45rem;
            padding: 4px 8px;
            background: var(--bg-0);
            border: 1px solid var(--line);
            border-left: 2px solid var(--line-2);
        }
        .strip-block.host-strip {
            margin-top: 0.65rem;
            border-left-color: var(--accent);
            border-left-width: 2px;
        }
        .strip-prefix {
            font-size: 7px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 700;
            flex-shrink: 0;
            padding-right: 1px;
        }
        .strip-context {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--ink-dim);
            flex-shrink: 0;
            max-width: 120px;
            overflow: hidden;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .strip-context .ctx-name {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .strip-context .ctx-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ink-faint);
            flex-shrink: 0;
        }
        .strip-context.s-ok .ctx-dot   { background: var(--ok);   box-shadow: 0 0 4px rgba(61, 220, 151, 0.75); }
        .strip-context.s-warn .ctx-dot { background: var(--warn); box-shadow: 0 0 4px rgba(255, 184, 77, 0.75); }
        .strip-context.s-crit .ctx-dot { background: var(--crit); box-shadow: 0 0 5px rgba(255, 77, 109, 0.85); }
        .strip-context.s-dead .ctx-dot { background: var(--dead); }
        .strip-context.s-warn { color: var(--warn); }
        .strip-context.s-crit { color: var(--crit); }
        .strip-context.s-dead { color: var(--ink-ghost); opacity: 0.7; }

        .strip-tabs {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .strip-tab {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--ink-ghost);
            font-family: inherit;
            font-size: 7px;
            letter-spacing: 0.1em;
            padding: 0 4px;
            height: 13px;
            line-height: 11px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
        }
        .strip-tab:hover { color: var(--ink-dim); border-color: var(--line-2); }
        .strip-tab.active {
            background: rgba(106, 176, 255, 0.1);
            color: var(--accent);
            border-color: var(--accent);
        }
        .strip-canvas {
            display: block;
            flex: 1 1 auto;
            min-width: 60px;
            height: 12px;
            cursor: crosshair;
        }
        .strip-meta {
            flex-shrink: 0;
            font-size: 8px;
            color: var(--ink-ghost);
            letter-spacing: 0.03em;
            font-variant-numeric: tabular-nums;
            text-transform: lowercase;
            min-width: 44px;
            text-align: right;
            font-weight: 600;
        }
        .strip-meta.fresh    { color: var(--accent); }
        .strip-meta.complete { color: var(--ok); }
        #strip-tooltip {
            position: fixed;
            display: none;
            background: var(--bg-0);
            color: var(--ink);
            border: 1px solid var(--line-2);
            padding: 4px 8px;
            font-size: 10px;
            line-height: 1.35;
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.55);
            font-variant-numeric: tabular-nums;
        }

        /* Agent chip — sparkle icon instead of dot */
        .chip-agent .spark {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
            fill: var(--ink-faint);
            stroke: var(--ink-faint);
            stroke-width: 1;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chip-agent.s-ok .spark {
            fill: var(--ok);
            stroke: var(--ok);
            filter: drop-shadow(0 0 4px rgba(61, 220, 151, 0.85));
            animation: spark-twinkle 3.4s ease-in-out infinite;
        }
        .chip-agent.s-warn .spark {
            fill: var(--warn);
            stroke: var(--warn);
            filter: drop-shadow(0 0 4px rgba(255, 184, 77, 0.85));
        }
        .chip-agent.s-crit .spark {
            fill: var(--crit);
            stroke: var(--crit);
            filter: drop-shadow(0 0 5px rgba(255, 77, 109, 0.9));
        }
        .chip-agent.s-dead .spark { fill: var(--dead); stroke: var(--dead); }

        @keyframes spark-twinkle {
            0%, 100% { opacity: 1; transform: rotate(0deg); }
            50%      { opacity: 0.65; transform: rotate(12deg); }
        }

        .card-empty {
            font-size: 9px;
            color: var(--ink-ghost);
            letter-spacing: 0.12em;
            margin-top: 0.65rem;
            text-transform: uppercase;
        }

        /* ============================================================
           COMPACT VIEW — telemetry table
           ============================================================ */
        .fleet-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            border: 1px solid var(--line);
            background: var(--bg-1);
        }
        .fleet-table thead th {
            text-align: left;
            padding: 0.55rem 0.85rem;
            font-size: 8px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 600;
            border-bottom: 1px solid var(--line-2);
            background: var(--bg-2);
            white-space: nowrap;
        }
        .fleet-table thead th.col-state { width: 20px; padding-right: 0; }
        .fleet-table tbody td {
            padding: 0.6rem 0.85rem;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
            color: var(--ink-dim);
            white-space: nowrap;
        }
        .fleet-table tbody tr:last-child td { border-bottom: none; }
        .fleet-table tbody tr { transition: background 0.1s; }
        .fleet-table tbody tr:hover { background: var(--bg-2); }

        .fleet-table .col-host { color: var(--ink); font-weight: 700; font-size: 13px; }
        .fleet-table td.col-state { padding-right: 0; width: 20px; }
        .fleet-table td.col-state .dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--ink-faint);
        }

        .fleet-table tr.row-ok .col-state .dot {
            background: var(--ok);
            box-shadow: 0 0 6px var(--ok);
        }
        .fleet-table tr.row-warn .col-state .dot {
            background: var(--warn);
            box-shadow: 0 0 6px var(--warn);
        }
        .fleet-table tr.row-warn { background: var(--warn-bg); }
        .fleet-table tr.row-warn .col-host { color: var(--warn); }
        .fleet-table tr.row-crit .col-state .dot {
            background: var(--crit);
            box-shadow: 0 0 8px var(--crit);
            animation: pulse-fast 1.4s ease-in-out infinite;
        }
        .fleet-table tr.row-crit { background: var(--crit-bg); }
        .fleet-table tr.row-crit .col-host { color: var(--crit); }
        .fleet-table tr.row-dead {
            opacity: 0.42;
            filter: grayscale(0.75);
            background: repeating-linear-gradient(
                135deg,
                transparent 0 14px,
                rgba(255, 255, 255, 0.02) 14px 15px
            );
        }
        .fleet-table tr.row-dead:hover { opacity: 0.7; }
        .fleet-table tr.row-dead .col-state .dot { background: var(--dead); }
        .fleet-table tr.row-dead .col-host { color: var(--ink-ghost); text-decoration: line-through; text-decoration-color: var(--ink-faint); }
        .fleet-table tr.row-ok .col-state .dot { animation: heartbeat 1.6s ease-in-out infinite; }

        /* Bar strip inside compact table */
        .bar-strip {
            display: inline-flex;
            gap: 2px;
            flex-wrap: wrap;
            align-items: center;
            max-width: 320px;
            line-height: 0;
        }
        .bar-strip .bar {
            position: relative;
            width: 8px;
            height: 14px;
            background: var(--ink-faint);
            cursor: default;
            transition: transform 0.08s;
        }
        .bar-strip .bar:hover { transform: scaleY(1.2); }
        .bar-strip .bar.s-ok { background: var(--ok); box-shadow: 0 0 4px rgba(61, 220, 151, 0.55); }
        .bar-strip .bar.s-warn { background: var(--warn); box-shadow: 0 0 4px rgba(255, 184, 77, 0.55); }
        .bar-strip .bar.s-crit { background: var(--crit); box-shadow: 0 0 4px rgba(255, 77, 109, 0.7); }
        .bar-strip .bar.s-dead { background: var(--dead); }
        .bar-strip .bar:hover::after {
            content: attr(data-name);
            position: absolute;
            bottom: calc(100% + 7px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-0);
            color: var(--ink);
            border: 1px solid var(--line-2);
            padding: 4px 7px;
            font-size: 10px;
            line-height: 1.3;
            white-space: nowrap;
            z-index: 30;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .bar-strip .none { color: var(--ink-faint); }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--ink-ghost);
            border: 1px dashed var(--line);
            background: var(--bg-1);
        }
        .empty-state h2 {
            font-size: 13px;
            margin-bottom: 0.5rem;
            color: var(--ink-dim);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .empty-state p {
            font-size: 11px;
            letter-spacing: 0.02em;
        }

        /* ============================================================
           ADMIN PANEL
           ============================================================ */
        .admin-panel { max-width: 700px; }
        .admin-panel h2 {
            font-size: 10px;
            color: var(--ink-dim);
            margin-bottom: 1rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 700;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--line);
        }
        .form-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            align-items: stretch;
        }
        .form-row input, .form-row select {
            padding: 0.55rem 0.8rem;
            background: var(--bg-1);
            border: 1px solid var(--line-2);
            color: var(--ink);
            font-family: inherit;
            font-size: 12px;
        }
        .form-row input { flex: 1; }
        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(106, 176, 255, 0.12);
        }

        .btn {
            padding: 0.55rem 1.1rem;
            border: 1px solid var(--line-2);
            background: var(--bg-1);
            color: var(--ink);
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn:hover { background: var(--bg-2); }
        .btn-primary {
            background: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }
        .btn-primary:hover { background: rgba(106, 176, 255, 0.1); }
        .btn-danger {
            color: var(--crit);
            border-color: rgba(255, 77, 109, 0.35);
            padding: 0.3rem 0.65rem;
            font-size: 9px;
            background: transparent;
        }
        .btn-danger:hover { background: rgba(255, 77, 109, 0.08); }

        .token-list { list-style: none; }
        .token-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 0.9rem;
            background: var(--bg-1);
            border: 1px solid var(--line);
            margin-bottom: 0.4rem;
            font-size: 12px;
        }
        .token-list .hostname { color: var(--ink); font-weight: 700; font-size: 13px; }
        .token-list .created {
            color: var(--ink-ghost);
            font-size: 10px;
            margin-left: 1rem;
            font-variant-numeric: tabular-nums;
        }
        .token-reveal {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-1);
            border: 1px solid var(--ok);
            border-left: 3px solid var(--ok);
        }
        .token-reveal .label {
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ok);
            margin-bottom: 0.4rem;
            font-weight: 700;
        }
        .token-reveal code {
            display: block;
            word-break: break-all;
            font-size: 11px;
            color: var(--ink);
            user-select: all;
            padding: 0.5rem 0;
            line-height: 1.5;
        }
        .token-reveal .warning {
            font-size: 10px;
            color: var(--warn);
            margin-top: 0.5rem;
            letter-spacing: 0.04em;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        footer {
            flex-shrink: 0;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, transparent, rgba(14, 17, 24, 0.6));
            padding: 0.75rem 1.5rem;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
        }
        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.4rem 1rem;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: var(--ink-ghost);
            line-height: 1;
        }
        .footer-inner .sep { color: var(--ink-faint); user-select: none; }
        .footer-inner .brand-f {
            color: var(--ink-dim);
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .footer-inner .brand-f .version {
            color: var(--accent);
            font-weight: 500;
            margin-left: 0.35rem;
            letter-spacing: 0.02em;
            text-transform: none;
        }
        .footer-inner .ts {
            color: var(--ink-ghost);
            font-variant-numeric: tabular-nums;
        }
        .footer-inner a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--ink-dim);
            text-decoration: none;
            transition: color 0.15s;
            letter-spacing: 0.08em;
        }
        .footer-inner a:hover { color: var(--ink); }
        .footer-inner a svg { width: 13px; height: 13px; display: block; }
        .footer-inner a.commit {
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }
        .footer-inner a.commit::before {
            content: '#';
            color: var(--ink-faint);
            margin-right: 1px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1100px) {
            header { grid-template-columns: 1fr; gap: 0.75rem; padding: 0.75rem 1rem; }
            .header-left, .header-center, .header-right {
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }
        @media (max-width: 720px) {
            main { padding: 1rem; }
            .grid { grid-template-columns: 1fr; }
            .fleet-table { font-size: 11px; }
            .fleet-table thead th, .fleet-table tbody td { padding: 0.4rem 0.55rem; }
        }

        /* Shared icon base */
        .icon { display: inline-flex; align-items: center; flex-shrink: 0; }
        .icon svg { width: 14px; height: 14px; }
    </style>
</head>

    <div x-data="fleetcom()" x-init="init()" class="app">
        <header>
            <div class="header-left">
                <div class="brand">FleetCom<span class="tag">TELEMETRY</span></div>
                <div class="conn" :class="'state-' + connState">
                    <span class="dot"></span>
                    <span x-text="connState === 'live' ? 'Live' : (connState === 'reconnecting' ? 'Reconnecting' : 'Offline')"></span>
                </div>
            </div>

            <div class="header-center">
                <div class="clock">
                    <span x-text="clockDate"></span><span class="sep">·</span><span x-text="clockTime"></span><span class="tz">UTC</span>
                </div>
                <div class="stats">
                    <div class="stat" :class="hostsDown > 0 ? (hostsUp === 0 ? 'state-crit' : 'state-warn') : ''">
                        <span class="label">Hosts</span>
                        <span class="value"><span x-text="hostsUp"></span><span class="sub">/</span><span x-text="hosts.length"></span></span>
                    </div>
                    <div class="stat" :class="totalContainers > 0 && runningContainers < totalContainers ? 'state-warn' : ''">
                        <span class="label">Containers</span>
                        <span class="value"><span x-text="runningContainers"></span><span class="sub">/</span><span x-text="totalContainers"></span></span>
                    </div>
                    <div class="stat" :class="totalAgents > 0 && onlineAgents < totalAgents ? 'state-warn' : ''">
                        <span class="label">Agents</span>
                        <span class="value"><span x-text="onlineAgents"></span><span class="sub">/</span><span x-text="totalAgents"></span></span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="view-toggle" x-show="view === 'dashboard'">
                    <button :class="viewMode === 'detail' && 'active'" @click="setViewMode('detail')">Detail</button>
                    <button :class="viewMode === 'compact' && 'active'" @click="setViewMode('compact')">Compact</button>
                </div>
                <nav class="nav" x-show="!shared">
                    <a :class="view === 'dashboard' && 'active'" @click="view = 'dashboard'">Dashboard</a>
                    <a :class="view === 'hosts' && 'active'" @click="view = 'hosts'; loadTokens(); loadShares()">Hosts</a>
                    <a href="/logout">Sign out</a>
                </nav>
                <nav class="nav" x-show="shared">
                    <span class="readonly">Read-only</span>
                </nav>
            </div>
        </header>

        <main>
            <!-- Dashboard view -->
            <template x-if="view === 'dashboard'">
                <div>
                    <div class="view-label" x-show="hosts.length > 0">
                        <span x-text="'Fleet · ' + (viewMode === 'detail' ? 'Detail' : 'Compact')"></span>
                    </div>

                    <template x-if="hosts.length === 0">
                        <div class="empty-state">
                            <h2>No hosts reporting</h2>
                            <p>Go to Hosts to register an agent and receive its bearer token.</p>
                        </div>
                    </template>

                    <!-- DETAIL MODE -->
                    <template x-if="viewMode === 'detail' && hosts.length > 0">
                        <div class="grid">
                            <template x-for="host in hosts" :key="host.hostname">
                                <div class="card" :class="'state-' + hostStatus(host)">
                                    <div class="card-head">
                                        <div class="card-head-left">
                                            <span class="hostname" x-text="host.hostname"></span>
                                            <span class="state-pill" x-text="stateLabel(hostStatus(host))"></span>
                                        </div>
                                        <div class="card-head-right">
                                            <div x-text="(host.os || 'unknown') + (host.uptime_seconds ? ' · up ' + formatUptime(host.uptime_seconds) : '')"></div>
                                            <div class="seen" x-text="'seen ' + formatAgo(host.last_seen)"></div>
                                        </div>
                                    </div>

                                    <div class="strip-block host-strip" x-init="mountStrip($el, 'host', host.hostname, { kind: 'host' })"></div>

                                    <template x-if="host.containers && host.containers.length > 0">
                                        <div class="card-section">
                                            <div class="card-section-label">
                                                <span>Containers</span><span class="count" x-text="'· ' + countRunning(host.containers) + '/' + host.containers.length"></span>
                                            </div>
                                            <div class="chips" :class="host.containers.length > 8 ? 'dense' : ''">
                                                <template x-for="c in host.containers" :key="c.name">
                                                    <div class="chip chip-container"
                                                         :class="['s-' + containerStatus(c), isChipOpen('container', host.hostname + '/' + c.name) ? 'is-open' : '']"
                                                         :title="c.name + ' · ' + c.state"
                                                         @click="toggleChip('container', host.hostname + '/' + c.name)">
                                                        <svg class="crate" viewBox="0 0 24 24"><use href="#icon-container"/></svg>
                                                        <span class="name" x-text="c.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="c in host.containers" :key="'hist-' + c.name">
                                                <template x-if="isChipOpen('container', host.hostname + '/' + c.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'container', host.hostname + '/' + c.name, { kind: 'entity', label: c.name, status: containerStatus(c) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="host.agents && host.agents.length > 0">
                                        <div class="card-section">
                                            <div class="card-section-label">
                                                <span>Agents</span><span class="count" x-text="'· ' + countOnlineAgents(host.agents) + '/' + host.agents.length"></span>
                                            </div>
                                            <div class="chips">
                                                <template x-for="a in host.agents" :key="a.name">
                                                    <div class="chip chip-agent"
                                                         :class="['s-' + agentStatus(a), isChipOpen('agent', host.hostname + '/' + a.name) ? 'is-open' : '']"
                                                         :title="a.name + ' · ' + a.status"
                                                         @click="toggleChip('agent', host.hostname + '/' + a.name)">
                                                        <svg class="spark" viewBox="0 0 24 24"><use href="#icon-sparkles"/></svg>
                                                        <span class="name" x-text="a.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="a in host.agents" :key="'hist-' + a.name">
                                                <template x-if="isChipOpen('agent', host.hostname + '/' + a.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'agent', host.hostname + '/' + a.name, { kind: 'entity', label: a.name, status: agentStatus(a) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="(!host.containers || host.containers.length === 0) && (!host.agents || host.agents.length === 0)">
                                        <div class="card-empty">No containers or agents reported</div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- COMPACT MODE -->
                    <template x-if="viewMode === 'compact' && hosts.length > 0">
                        <table class="fleet-table">
                            <thead>
                                <tr>
                                    <th class="col-state"></th>
                                    <th>Host</th>
                                    <th>State</th>
                                    <th>OS</th>
                                    <th>Uptime</th>
                                    <th>Seen</th>
                                    <th>Containers</th>
                                    <th>Agents</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="host in hosts" :key="host.hostname">
                                    <tr :class="'row-' + hostStatus(host)">
                                        <td class="col-state"><span class="dot"></span></td>
                                        <td class="col-host" x-text="host.hostname"></td>
                                        <td x-text="stateLabel(hostStatus(host))"></td>
                                        <td x-text="host.os || '—'"></td>
                                        <td x-text="formatUptime(host.uptime_seconds) || '—'"></td>
                                        <td x-text="formatAgo(host.last_seen)"></td>
                                        <td>
                                            <template x-if="host.containers && host.containers.length > 0">
                                                <div class="bar-strip">
                                                    <template x-for="c in host.containers" :key="c.name">
                                                        <span class="bar" :class="'s-' + containerStatus(c)" :data-name="c.name + ' · ' + c.state"></span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template x-if="!host.containers || host.containers.length === 0">
                                                <span class="bar-strip"><span class="none">—</span></span>
                                            </template>
                                        </td>
                                        <td>
                                            <template x-if="host.agents && host.agents.length > 0">
                                                <div class="bar-strip">
                                                    <template x-for="a in host.agents" :key="a.name">
                                                        <span class="bar" :class="'s-' + agentStatus(a)" :data-name="a.name + ' · ' + a.status"></span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template x-if="!host.agents || host.agents.length === 0">
                                                <span class="bar-strip"><span class="none">—</span></span>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                </div>
            </template>

            <!-- Hosts management view -->
            <template x-if="view === 'hosts'">
                <div class="admin-panel">
                    <h2>Manage Hosts</h2>

                    <div class="form-row">
                        <input type="text" x-model="newHostname" placeholder="hostname (e.g. dsc0)" @keydown.enter="addHost()">
                        <button class="btn btn-primary" @click="addHost()">Add Host</button>
                    </div>

                    <template x-if="newToken">
                        <div class="token-reveal">
                            <div class="label">Agent token for <span x-text="newToken.hostname"></span></div>
                            <code x-text="newToken.token"></code>
                            <div class="warning">Copy this token now — it won't be shown again.</div>
                        </div>
                    </template>

                    <ul class="token-list">
                        <template x-for="t in tokens" :key="t.hostname">
                            <li>
                                <div>
                                    <span class="hostname" x-text="t.hostname"></span>
                                    <span class="created" x-text="t.created_at"></span>
                                </div>
                                <button class="btn btn-danger" @click="removeHost(t.hostname)">Remove</button>
                            </li>
                        </template>
                    </ul>

                    <template x-if="tokens.length === 0">
                        <div class="empty-state" style="padding: 2rem;">
                            <p>No hosts registered yet. Add one above.</p>
                        </div>
                    </template>

                    <h2 style="margin-top: 2rem;">Share Links</h2>
                    <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">Read-only dashboard access — no login required.</p>

                    <div class="form-row">
                        <input type="text" x-model="shareLabel" placeholder="label (e.g. David)">
                        <select x-model="shareHours">
                            <option value="24">24 hours</option>
                            <option value="48">2 days</option>
                            <option value="72">3 days</option>
                            <option value="168">7 days</option>
                        </select>
                        <button class="btn btn-primary" @click="createShare()">Create Link</button>
                    </div>

                    <template x-if="newShare">
                        <div class="token-reveal">
                            <div class="label">Share link for <span x-text="newShare.label || 'guest'"></span></div>
                            <code x-text="window.location.origin + '/s/' + newShare.token"></code>
                            <div class="warning">Copy this link now — the token won't be shown again.</div>
                        </div>
                    </template>

                    <ul class="token-list">
                        <template x-for="s in shares" :key="s.id">
                            <li>
                                <div>
                                    <span class="hostname" x-text="s.label || 'guest'"></span>
                                    <span class="created" x-text="'expires ' + s.expires_at"></span>
                                </div>
                                <button class="btn btn-danger" @click="deleteShare(s.id)">Revoke</button>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>
        </main>

        <footer>
            <div class="footer-inner">
                <span class="brand-f">
                    FleetCom<span class="version" x-text="'v' + (ver.version || '—')"></span>
                </span>
                <span class="sep">•</span>
                <span class="ts" x-text="ver.build_time_display || 'unknown'"></span>
                <span class="sep">•</span>
                <a class="commit"
                   :href="ver.commit && ver.commit !== 'dev' && ver.commit !== 'unknown'
                          ? 'https://github.com/markus-barta/fleetcom/commit/' + ver.commit
                          : 'https://github.com/markus-barta/fleetcom'"
                   target="_blank" rel="noopener"
                   x-text="ver.commit || 'dev'"></a>
                <span class="sep">•</span>
                <a href="https://github.com/markus-barta/fleetcom" target="_blank" rel="noopener" title="Source on GitHub">
                    <svg><use href="#icon-github"/></svg>
                    <span>GitHub</span>
                </a>
                <span class="sep">•</span>
                <a href="/LICENSE" target="_blank" rel="noopener" title="GNU Affero General Public License v3.0">
                    <svg><use href="#icon-scale"/></svg>
                    <span>AGPL-3.0</span>
                </a>
            </div>
        </footer>
    </div>

    <script src="/static/alpine.min.js" defer></script>
    <script>
        function fleetcom() {
            return {
                hosts: [],
                tokens: [],
                shares: [],
                shared: false,
                view: 'dashboard',
                viewMode: 'detail',
                newHostname: '',
                newToken: null,
                newShare: null,
                shareLabel: '',
                shareHours: '24',
                es: null,
                ver: { version: '', commit: '', build_time: '', build_time_display: '' },

                // Connection state machine
                connState: 'reconnecting', // 'live' | 'reconnecting' | 'offline'
                lastOkAt: 0,

                // Clock
                clockDate: '',
                clockTime: '',

                // Which chip is expanded in its card (key = `${type}:${entityKey}`, one at a time globally)
                openChip: null,
                scales: ['1h', '1d', '1w', '1mo'],
                scaleWindow: { '1h': 3600, '1d': 86400, '1w': 604800, '1mo': 2592000 },
                stripRegistry: null,

                init() {
                    this.viewMode = localStorage.getItem('fleetcom.view') || 'detail';
                    this.stripRegistry = new Set();
                    this.startClock();
                    this.loadVersion();
                    this.connect();
                    this.startConnWatchdog();
                    this.startStripRefresher();
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') this.kickIfStale();
                    });
                    let resizeT;
                    window.addEventListener('resize', () => {
                        clearTimeout(resizeT);
                        resizeT = setTimeout(() => {
                            for (const c of this.stripRegistry) this.drawStrip(c);
                        }, 150);
                    });
                },

                startStripRefresher() {
                    // Refetch every mounted strip every 60s and prune orphaned ones.
                    // Mounted = currently in the DOM (chip expanded or host card visible).
                    setInterval(() => {
                        if (document.visibilityState !== 'visible') return;
                        for (const c of [...this.stripRegistry]) {
                            if (!c.el.isConnected) {
                                this.stripRegistry.delete(c);
                            } else {
                                this.fetchStrip(c);
                            }
                        }
                    }, 60000);
                },

                setViewMode(m) {
                    this.viewMode = m;
                    localStorage.setItem('fleetcom.view', m);
                },

                // ---------- clock ----------
                startClock() {
                    const tick = () => {
                        const d = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        this.clockDate = d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate());
                        this.clockTime = pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
                        // Re-poke hosts array so x-text for relative times recomputes
                        if (this.hosts.length > 0 && d.getUTCSeconds() % 5 === 0) {
                            this.hosts = [...this.hosts];
                        }
                    };
                    tick();
                    setInterval(tick, 1000);
                },

                // ---------- version ----------
                async loadVersion() {
                    try {
                        const res = await fetch('/api/version');
                        if (!res.ok) return;
                        const v = await res.json();
                        v.build_time_display = this.formatBuildTime(v.build_time);
                        this.ver = v;
                    } catch (_) {}
                },

                formatBuildTime(iso) {
                    if (!iso || iso === 'unknown') return 'unknown';
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return iso;
                    const pad = n => String(n).padStart(2, '0');
                    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                },

                // ---------- SSE connection ----------
                connect() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    if (m) this.shared = true;
                    this.openStream();
                },

                streamURL() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    return m ? ('/s/' + m[1] + '/events') : '/api/events';
                },

                openStream() {
                    if (this.es) {
                        try { this.es.close(); } catch (_) {}
                    }
                    try {
                        this.es = new EventSource(this.streamURL());
                    } catch (e) {
                        console.warn('EventSource construction failed', e);
                        return;
                    }

                    this.es.addEventListener('hosts', (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            this.hosts = data || [];
                            this.lastOkAt = Date.now();
                        } catch (err) {
                            console.warn('hosts event parse error', err);
                        }
                    });

                    this.es.onopen = () => {
                        this.lastOkAt = Date.now();
                        this.connState = 'live';
                    };

                    // Intentionally NOT flipping connState in onerror — browser
                    // auto-reconnects, watchdog decides the UI state with grace period.
                    this.es.onerror = () => { /* watchdog handles it */ };
                },

                // Poll readyState — hides brief reconnects, surfaces real outages.
                //
                // Thresholds (relative to lastOkAt):
                //   <  3 s   → stay LIVE (grace window)
                //   <  75 s  → RECONNECTING (server pings every 30s; allow 2x miss)
                //   >= 75 s  → OFFLINE + force a fresh EventSource if stuck in CLOSED
                startConnWatchdog() {
                    setInterval(() => {
                        const rs = this.es ? this.es.readyState : 2;
                        const now = Date.now();

                        if (rs === 1) {
                            this.lastOkAt = now;
                            this.connState = 'live';
                            return;
                        }

                        const downFor = now - (this.lastOkAt || now);
                        if (downFor < 3000) {
                            this.connState = 'live';
                        } else if (downFor < 75000) {
                            this.connState = 'reconnecting';
                        } else {
                            this.connState = 'offline';
                            if (rs === 2) this.openStream();
                        }
                    }, 1000);
                },

                kickIfStale() {
                    const rs = this.es ? this.es.readyState : 2;
                    if (rs !== 1) this.openStream();
                },

                // ---------- admin ----------
                async loadTokens() {
                    const res = await fetch('/api/tokens');
                    if (res.ok) this.tokens = await res.json() || [];
                },

                async addHost() {
                    const hostname = this.newHostname.trim();
                    if (!hostname) return;
                    const res = await fetch('/api/hosts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ hostname })
                    });
                    if (res.ok) {
                        this.newToken = await res.json();
                        this.newHostname = '';
                        this.loadTokens();
                    }
                },

                // ---------- chip expand state ----------
                toggleChip(type, entityKey) {
                    const key = type + ':' + entityKey;
                    this.openChip = (this.openChip === key) ? null : key;
                },

                isChipOpen(type, entityKey) {
                    return this.openChip === (type + ':' + entityKey);
                },

                // ---------- history strips (canvas, imperative) ----------
                // Each strip is a self-contained controller mounted by Alpine via
                // x-init. Alpine creates the wrapper div; everything inside (tabs,
                // canvas, fetch, draw, hover) is plain DOM with no reactivity, so
                // SSE updates do not trigger any re-render of the strips. The
                // 60s refresher and unmount-pruning are handled centrally above.
                mountStrip(el, type, entityKey, opts) {
                    if (el._stripCtrl) return; // x-init can re-fire after Alpine clones
                    opts = opts || {};
                    const ctrl = {
                        el, type, key: entityKey,
                        scale: '1h',
                        tabs: {},
                        meta: null,
                        canvas: null,
                        data: null,
                    };

                    // Lead element: "UPTIME" prefix for host, status-dot+name for entities.
                    if (opts.kind === 'host') {
                        const prefix = document.createElement('span');
                        prefix.className = 'strip-prefix';
                        prefix.textContent = 'UPTIME';
                        el.appendChild(prefix);
                    } else {
                        const ctx = document.createElement('span');
                        ctx.className = 'strip-context s-' + (opts.status || 'dead');
                        const dot = document.createElement('span');
                        dot.className = 'ctx-dot';
                        ctx.appendChild(dot);
                        const name = document.createElement('span');
                        name.className = 'ctx-name';
                        name.textContent = opts.label || entityKey;
                        ctx.appendChild(name);
                        el.appendChild(ctx);
                    }

                    const tabRow = document.createElement('span');
                    tabRow.className = 'strip-tabs';
                    for (const s of this.scales) {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'strip-tab' + (s === ctrl.scale ? ' active' : '');
                        btn.textContent = s;
                        btn.addEventListener('click', () => {
                            if (ctrl.scale === s) return;
                            ctrl.scale = s;
                            for (const k in ctrl.tabs) ctrl.tabs[k].classList.toggle('active', k === s);
                            this.fetchStrip(ctrl);
                        });
                        ctrl.tabs[s] = btn;
                        tabRow.appendChild(btn);
                    }
                    el.appendChild(tabRow);

                    const canvas = document.createElement('canvas');
                    canvas.className = 'strip-canvas';
                    ctrl.canvas = canvas;
                    canvas.addEventListener('mousemove', (e) => this.onStripHover(e, ctrl));
                    canvas.addEventListener('mouseleave', () => this.hideStripTooltip());
                    el.appendChild(canvas);

                    const meta = document.createElement('span');
                    meta.className = 'strip-meta';
                    ctrl.meta = meta;
                    el.appendChild(meta);

                    el._stripCtrl = ctrl;
                    this.stripRegistry.add(ctrl);
                    this.fetchStrip(ctrl);
                },

                async fetchStrip(ctrl) {
                    const url = '/api/history?entity_type=' + encodeURIComponent(ctrl.type)
                        + '&entity_key=' + encodeURIComponent(ctrl.key)
                        + '&scale=' + ctrl.scale;
                    try {
                        const res = await fetch(url);
                        if (!res.ok) return;
                        const json = await res.json();
                        ctrl.data = json;
                        this.drawStrip(ctrl);
                    } catch (_) {}
                },

                drawStrip(ctrl) {
                    const canvas = ctrl.canvas;
                    if (!canvas || !canvas.isConnected) return;
                    const dpr = window.devicePixelRatio || 1;
                    const cssW = canvas.clientWidth || 200;
                    const cssH = canvas.clientHeight || 12;
                    if (canvas.width !== Math.round(cssW * dpr) || canvas.height !== Math.round(cssH * dpr)) {
                        canvas.width = Math.round(cssW * dpr);
                        canvas.height = Math.round(cssH * dpr);
                    }
                    const ctx = canvas.getContext('2d');
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.fillStyle = '#0a0d10';
                    ctx.fillRect(0, 0, cssW, cssH);

                    const data = ctrl.data;
                    if (!data || !data.buckets) {
                        if (ctrl.meta) ctrl.meta.textContent = 'loading…';
                        return;
                    }

                    const buckets = data.buckets;
                    const n = buckets.length || 60;
                    const windowSec = data.window_seconds;
                    const cellW = cssW / n;

                    let coverageSec = 0;
                    if (data.first_sample) {
                        const t = new Date(data.first_sample).getTime();
                        if (!isNaN(t)) {
                            coverageSec = Math.min(windowSec, Math.max(0, (Date.now() - t) / 1000));
                        }
                    }

                    // "Before tracking" zone — render as faint hatched dead area
                    let coverStartIdx = n;
                    if (coverageSec > 0 && windowSec > 0) {
                        const ratio = coverageSec / windowSec;
                        coverStartIdx = Math.floor(n * (1 - ratio));
                    }
                    if (coverStartIdx > 0) {
                        ctx.fillStyle = '#13171b';
                        ctx.fillRect(0, 0, coverStartIdx * cellW, cssH);
                    }

                    const colors = { ok: '#3ddc97', warn: '#ffb84d', crit: '#ff4d6d', dead: '#5a6068' };
                    for (let i = 0; i < n; i++) {
                        if (i < coverStartIdx) continue;
                        const b = buckets[i];
                        const status = b ? b.s : 'none';
                        const x = Math.floor(i * cellW);
                        const w = Math.max(1, Math.floor((i + 1) * cellW) - x - (cellW > 2 ? 1 : 0));
                        if (status === 'none') {
                            ctx.fillStyle = '#2a1518';
                            ctx.fillRect(x, 1, w, cssH - 2);
                            continue;
                        }
                        const color = colors[status];
                        if (!color) continue;
                        ctx.fillStyle = color;
                        ctx.fillRect(x, 1, w, cssH - 2);
                    }

                    // "now" marker on the right edge
                    ctx.fillStyle = 'rgba(232, 230, 223, 0.5)';
                    ctx.fillRect(cssW - 1, 0, 1, cssH);

                    // Meta text — terse, single token. Color carries the meaning:
                    //   accent = still collecting (partial coverage)
                    //   ok-green = full window, 100% healthy
                    //   ghost = full window, some degradation
                    if (ctrl.meta) {
                        ctrl.meta.classList.remove('fresh', 'complete');
                        if (!data.first_sample) {
                            ctrl.meta.textContent = '—';
                        } else if (coverageSec >= windowSec - 1) {
                            let ok = 0, total = 0;
                            for (const b of buckets) {
                                if (!b || b.s === 'none') continue;
                                total++;
                                if (b.s === 'ok') ok++;
                            }
                            const pct = total > 0 ? Math.round(100 * ok / total) : 0;
                            ctrl.meta.textContent = pct + '% ok';
                            if (pct >= 100) ctrl.meta.classList.add('complete');
                        } else {
                            ctrl.meta.textContent = this.humanDur(coverageSec) + '/' + this.humanDur(windowSec);
                            ctrl.meta.classList.add('fresh');
                        }
                    }
                },

                humanDur(sec) {
                    if (sec < 60) return Math.max(1, Math.round(sec)) + 's';
                    if (sec < 5400) return Math.round(sec / 60) + 'm';
                    if (sec < 86400 * 1.5) return Math.round(sec / 3600) + 'h';
                    if (sec < 86400 * 14) return Math.round(sec / 86400) + 'd';
                    return Math.round(sec / 86400 / 7) + 'w';
                },

                onStripHover(e, ctrl) {
                    const data = ctrl.data;
                    if (!data || !data.buckets) return;
                    const rect = ctrl.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const n = data.buckets.length || 60;
                    let idx = Math.floor((x / rect.width) * n);
                    if (idx < 0) idx = 0;
                    if (idx >= n) idx = n - 1;
                    const b = data.buckets[idx];
                    const bucketSec = data.window_seconds / n;
                    const ageSec = (n - 1 - idx) * bucketSec;
                    const ageLabel = ageSec < bucketSec ? 'now' : this.humanDur(ageSec) + ' ago';
                    let text;
                    if (!b || b.s === 'none') {
                        text = ctrl.scale + ' · ' + ageLabel + ' · no data';
                    } else {
                        text = ctrl.scale + ' · ' + ageLabel + ' · ' + b.s + ' · ' + (b.p || 0) + '% ok · n=' + (b.n || 0);
                    }
                    const tip = this.getStripTooltip();
                    tip.textContent = text;
                    tip.style.display = 'block';
                    const tx = Math.min(window.innerWidth - tip.offsetWidth - 10, e.clientX + 12);
                    const ty = Math.max(4, e.clientY - tip.offsetHeight - 8);
                    tip.style.left = tx + 'px';
                    tip.style.top = ty + 'px';
                },

                getStripTooltip() {
                    let tip = document.getElementById('strip-tooltip');
                    if (!tip) {
                        tip = document.createElement('div');
                        tip.id = 'strip-tooltip';
                        document.body.appendChild(tip);
                    }
                    return tip;
                },

                hideStripTooltip() {
                    const tip = document.getElementById('strip-tooltip');
                    if (tip) tip.style.display = 'none';
                },

                async removeHost(hostname) {
                    if (!confirm('Remove ' + hostname + '? Its agent will stop authenticating.')) return;
                    const res = await fetch('/api/hosts?hostname=' + encodeURIComponent(hostname), { method: 'DELETE' });
                    if (res.ok) {
                        this.loadTokens();
                        if (this.newToken && this.newToken.hostname === hostname) this.newToken = null;
                    }
                },

                async loadShares() {
                    const res = await fetch('/api/shares');
                    if (res.ok) this.shares = await res.json() || [];
                },

                async createShare() {
                    const res = await fetch('/api/shares', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ label: this.shareLabel.trim(), hours: parseInt(this.shareHours) })
                    });
                    if (res.ok) {
                        this.newShare = await res.json();
                        this.shareLabel = '';
                        this.loadShares();
                    }
                },

                async deleteShare(id) {
                    if (!confirm('Revoke this share link?')) return;
                    const res = await fetch('/api/shares?id=' + id, { method: 'DELETE' });
                    if (res.ok) this.loadShares();
                },

                // ---------- derived stats ----------
                get hostsUp() {
                    return this.hosts.filter(h => this.secondsAgo(h.last_seen) < 120).length;
                },
                get hostsDown() { return this.hosts.length - this.hostsUp; },
                get totalContainers() {
                    return this.hosts.reduce((n, h) => n + ((h.containers && h.containers.length) || 0), 0);
                },
                get runningContainers() {
                    return this.hosts.reduce((n, h) => n + this.countRunning(h.containers), 0);
                },
                get totalAgents() {
                    return this.hosts.reduce((n, h) => n + ((h.agents && h.agents.length) || 0), 0);
                },
                get onlineAgents() {
                    return this.hosts.reduce((n, h) => n + this.countOnlineAgents(h.agents), 0);
                },

                countRunning(containers) {
                    return (containers || []).filter(c => c.state === 'running').length;
                },
                countOnlineAgents(agents) {
                    return (agents || []).filter(a => a.status === 'online').length;
                },

                // ---------- status helpers ----------
                hostStatus(host) {
                    const ago = this.secondsAgo(host.last_seen);
                    if (ago < 120) return 'ok';
                    if (ago < 300) return 'warn';
                    if (ago < 600) return 'crit';
                    return 'dead';
                },
                containerStatus(c) {
                    if (c.state === 'running') return 'ok';
                    if (c.state === 'paused') return 'warn';
                    if (c.state === 'exited' || c.state === 'dead') return 'crit';
                    return 'dead';
                },
                agentStatus(a) {
                    if (a.status === 'online') return 'ok';
                    if (a.status === 'degraded') return 'warn';
                    if (a.status === 'offline') return 'crit';
                    return 'dead';
                },
                stateLabel(s) {
                    return s === 'ok'   ? 'Online'
                         : s === 'warn' ? 'Stale'
                         : s === 'crit' ? 'Offline'
                                        : 'Dead';
                },

                // ---------- time helpers ----------
                secondsAgo(isoStr) {
                    if (!isoStr) return 9999;
                    return (Date.now() - new Date(isoStr).getTime()) / 1000;
                },

                formatAgo(isoStr) {
                    const s = this.secondsAgo(isoStr);
                    if (s > 86400) return Math.floor(s / 86400) + 'd ago';
                    if (s > 3600) return Math.floor(s / 3600) + 'h ago';
                    if (s > 60) return Math.floor(s / 60) + 'm ago';
                    return Math.floor(s) + 's ago';
                },

                formatUptime(seconds) {
                    if (!seconds) return '';
                    const d = Math.floor(seconds / 86400);
                    const h = Math.floor((seconds % 86400) / 3600);
                    if (d > 0) return d + 'd ' + h + 'h';
                    const m = Math.floor((seconds % 3600) / 60);
                    return h + 'h ' + m + 'm';
                }
            };
        }
    </script>
</body>
