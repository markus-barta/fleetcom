name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  VERSION: 0.6.0
  AGENT_VERSION: 0.2.0

jobs:
  lint:
    name: Lint (gofmt + vet + staticcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: gofmt
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: staticcheck
        working-directory: backend
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...

  lint-agent:
    name: Lint Agent (gofmt + vet)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod

      - name: gofmt
        working-directory: agent
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        working-directory: agent
        run: go vet ./...

  lint-bridge:
    name: Lint Agent-Bridge (gofmt + vet)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: agent-bridge/go.mod

      - name: gofmt
        working-directory: agent-bridge
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted" ; exit 1
          fi

      - name: go vet
        working-directory: agent-bridge
        run: go vet ./...

  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../dist/fleetcom-server ./cmd/server

  build-agent:
    name: Build Agent (linux/amd64)
    runs-on: ubuntu-latest
    needs: [lint-agent]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod

      - name: Build
        working-directory: agent
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../dist/fleetcom-bosun ./cmd/fleetcom-bosun

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            AGENT_VERSION=${{ env.AGENT_VERSION }}
          tags: |
            ghcr.io/markus-barta/fleetcom:latest
            ghcr.io/markus-barta/fleetcom:v${{ env.VERSION }}
            ghcr.io/markus-barta/fleetcom:sha-${{ steps.meta.outputs.short_sha }}

  publish-agent:
    name: Publish Agent to GHCR
    runs-on: ubuntu-latest
    needs: [build-agent]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          build-args: |
            VERSION=${{ env.AGENT_VERSION }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ghcr.io/markus-barta/fleetcom-bosun:latest
            ghcr.io/markus-barta/fleetcom-bosun:v${{ env.AGENT_VERSION }}
            ghcr.io/markus-barta/fleetcom-bosun:sha-${{ steps.meta.outputs.short_sha }}
            ghcr.io/markus-barta/fleetcom-agent:latest
            ghcr.io/markus-barta/fleetcom-agent:v${{ env.AGENT_VERSION }}
            ghcr.io/markus-barta/fleetcom-agent:sha-${{ steps.meta.outputs.short_sha }}

  publish-agent-bridge:
    name: Publish Agent-Bridge to GHCR
    runs-on: ubuntu-latest
    needs: [lint-bridge]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push bridge image
        uses: docker/build-push-action@v7
        with:
          context: ./agent-bridge
          push: true
          build-args: |
            VERSION=${{ env.AGENT_VERSION }}
          tags: |
            ghcr.io/markus-barta/fleetcom-agent-bridge:latest
            ghcr.io/markus-barta/fleetcom-agent-bridge:v${{ env.AGENT_VERSION }}
            ghcr.io/markus-barta/fleetcom-agent-bridge:sha-${{ steps.meta.outputs.short_sha }}

  publish-agent-binaries:
    name: Publish Agent Binaries (GitHub Release)
    runs-on: ubuntu-latest
    needs: [build-agent]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod

      - name: Build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Cross-compile binaries
        working-directory: agent
        env:
          BT: ${{ steps.meta.outputs.build_time }}
          V: ${{ env.AGENT_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ../dist
          LDF="-s -w -X main.Version=$V -X main.BuildTime=$BT"
          build() {
            local goos=$1 goarch=$2 goarm=${3:-} name=$4
            echo "building $name..."
            GOOS=$goos GOARCH=$goarch GOARM=$goarm CGO_ENABLED=0 \
              go build -ldflags "$LDF" -o "../dist/$name" ./cmd/fleetcom-bosun
            (cd ../dist && sha256sum "$name" > "$name.sha256")
          }
          build linux amd64 ""  fleetcom-bosun-linux-amd64
          build linux arm   6   fleetcom-bosun-linux-armv6
          build linux arm64 ""  fleetcom-bosun-linux-arm64
          ls -lh ../dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ env.AGENT_VERSION }}
          name: Agent v${{ env.AGENT_VERSION }}
          body: |
            fleetcom-bosun ${{ env.AGENT_VERSION }}

            Commit: ${{ steps.meta.outputs.short_sha }}
            Built: ${{ steps.meta.outputs.build_time }}

            Use these binaries on hosts without Docker (e.g. Raspberry Pi).
            Docker hosts pull `ghcr.io/markus-barta/fleetcom-bosun:v${{ env.AGENT_VERSION }}`.
          files: |
            dist/fleetcom-bosun-linux-amd64
            dist/fleetcom-bosun-linux-amd64.sha256
            dist/fleetcom-bosun-linux-armv6
            dist/fleetcom-bosun-linux-armv6.sha256
            dist/fleetcom-bosun-linux-arm64
            dist/fleetcom-bosun-linux-arm64.sha256

  deploy:
    name: Deploy to csb1
    runs-on: ubuntu-latest
    needs: [publish]

    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            mba@152.53.64.166 fleetcom-deploy
          rm /tmp/deploy_key
