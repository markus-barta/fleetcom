name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  VERSION: 0.3.0

jobs:
  lint:
    name: Lint (gofmt + vet + staticcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: gofmt
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: staticcheck
        working-directory: backend
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./...

  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../dist/fleetcom-server ./cmd/server

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ghcr.io/markus-barta/fleetcom:latest
            ghcr.io/markus-barta/fleetcom:v${{ env.VERSION }}
            ghcr.io/markus-barta/fleetcom:sha-${{ steps.meta.outputs.short_sha }}

  deploy:
    name: Deploy to csb1
    runs-on: ubuntu-latest
    needs: [publish]

    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            mba@152.53.64.166 fleetcom-deploy
          rm /tmp/deploy_key
