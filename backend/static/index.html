                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="host.agents && host.agents.length > 0">
                                        <div class="card-section">
                                            <div class="card-section-label">
                                                <span>Agents</span><span class="count" x-text="'· ' + countOnlineAgents(host.agents) + '/' + host.agents.length"></span>
                                            </div>
                                            <div class="chips">
                                                <template x-for="a in host.agents" :key="a.name">
                                                    <div class="chip chip-agent"

                            <h3>Adding a Host</h3>
                            <p>Go to <strong>Hosts</strong> tab, enter a hostname, and click <strong>Add Host</strong>. Copy the bearer token — it is shown only once.</p>

                            <h3>Docker Setup (recommended)</h3>
                            <p>The agent runs as a Docker container with real-time container monitoring via the Docker socket. Works on any host with Docker.</p>
<pre>sudo mkdir -p /opt/fleetcom-bosun

# Create .env with your token
echo "FLEETCOM_TOKEN=your-token-here" | sudo tee /opt/fleetcom-bosun/.env

# Create docker-compose.yml
sudo tee /opt/fleetcom-bosun/docker-compose.yml &lt;&lt;'EOF'
services:
  fleetcom-bosun:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-bosun
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      - FLEETCOM_URL=https://fleet.barta.cm
      - FLEETCOM_HOSTNAME=your-hostname
EOF

cd /opt/fleetcom-bosun
sudo docker compose pull &amp;&amp; sudo docker compose up -d</pre>
                            <p>Updates: <code>docker compose pull &amp;&amp; docker compose up -d</code></p>

                            <h3>Static Binary (lightweight hosts)</h3>
                            <p>For hosts without Docker (Raspberry Pi, embedded, etc.) — cross-compile the Go agent and run it directly. Single binary, zero dependencies, ~6MB.</p>
<pre># Cross-compile (from dev machine)
GOOS=linux GOARCH=arm GOARM=6 CGO_ENABLED=0 \
  go build -ldflags="-s -w \
    -X main.Version=0.1.0 \
    -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
  -o fleetcom-bosun ./cmd/fleetcom-bosun

# Copy to host
scp fleetcom-bosun host:/usr/local/bin/

# Create env file
sudo mkdir -p /etc/fleetcom
sudo tee /etc/fleetcom/env &lt;&lt;'EOF'
FLEETCOM_URL=https://fleet.barta.cm
FLEETCOM_TOKEN=your-token-here
FLEETCOM_HOSTNAME=your-hostname
EOF
sudo chmod 600 /etc/fleetcom/env</pre>
                            <p>Create <code>/etc/systemd/system/fleetcom-bosun.service</code>:</p>
<pre>[Unit]
Description=FleetCom Bosun
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
EnvironmentFile=/etc/fleetcom/env
ExecStart=/usr/local/bin/fleetcom-bosun
Restart=on-failure
RestartSec=10

[Install]
WantedBy=multi-user.target</pre>
<pre>sudo systemctl enable --now fleetcom-bosun</pre>
                            <p>Common <code>GOARCH</code> values: <code>amd64</code> (x86_64), <code>arm64</code> (RPi 4/5, Apple Silicon), <code>arm GOARM=6</code> (RPi Zero/1), <code>arm GOARM=7</code> (RPi 2/3).</p>

                            <h3>AI Agents (optional)</h3>
                            <p>To report AI agents alongside system data, add <code>FLEETCOM_AGENTS</code> to the environment:</p>
<pre>FLEETCOM_AGENTS='[{"name":"Ocean","agent_type":"cto","status":"online"}]'</pre>
                            <p>Docker: add to <code>environment:</code> in docker-compose.yml. Static binary: add to <code>/etc/fleetcom/env</code>.</p>

                            <h3>Agent Version</h3>
                            <p>Hosts report their agent version in each heartbeat. The dashboard shows <span class="agent-version-badge current" style="display:inline">current</span> for up-to-date agents, <span class="agent-version-badge outdated" style="display:inline">outdated</span> with an alert icon for old versions, and <span class="agent-version-badge legacy" style="display:inline">LEGACY</span> for hosts running the old shell script agent. Expected version: <strong x-text="expectedAgentVersion || 'loading...'"></strong></p>

    <script src="/static/lucide.min.js"></script>
    <script src="/static/alpine.min.js" defer></script>
    <script>
        function fleetcom() {
            return {
                hosts: [],
                tokens: [],
                shares: [],
                shared: false,
                view: 'dashboard',
                viewMode: 'normal',
                newHostname: '',
                newToken: null,
                newShare: null,
                shareLabel: '',
                shareHours: '24',
                es: null,
                ver: { version: '', commit: '', build_time: '', build_time_display: '' },

                // Connection state machine
                connState: 'reconnecting', // 'live' | 'reconnecting' | 'offline'
                lastOkAt: 0,

                // Server config (pushed via SSE)
                heartbeatInterval: 60,
                expectedAgentVersion: '',

                // Clock + tick counter for reactive "seen Xs ago" updates
                clockDate: '',
                clockTime: '',
                tickSec: 0,
                // Timezone: true = UTC, false = local browser time
                useUTC: true,
                // Card image size (px)
                cardImgSize: 170,

                // Which chip is expanded in its card (key = `${type}:${entityKey}`, one at a time globally)
                openChip: null,
                // Settings view
                settingsTab: 'hosts',
                // Ignored entities (set from SSE, list for settings tab)
                ignoredSet: {},
                ignoredList: [],
                // Context menu
                ctxMenu: null,
                // Host configs (from SSE)
                hostConfigs: {},
                // Per-host config editing
                configHost: '',
                configComment: '',
                configImageId: null,
                // Image presets
                imagePresets: [],
                scaleList: ['1min', '15min', '1h', '1d', '14d', '1MO', '1Y'],
                scaleWindow: { '1min': 60, '15min': 900, '1h': 3600, '1d': 86400, '14d': 1209600, '1MO': 2592000, '1Y': 31536000 },
                globalScale: '1h',
                stripRegistry: null,

                init() {
                    this.viewMode = localStorage.getItem('fleetcom.view') || 'normal';
                    // Migrate legacy values
                    if (this.viewMode === 'overview') this.viewMode = 'normal';
                    this.globalScale = localStorage.getItem('fleetcom.globalScale') || '1h';
                    if (!this.scaleList.includes(this.globalScale)) this.globalScale = '1h';
                    this.useUTC = localStorage.getItem('fleetcom.tz') !== 'local';
                    this.cardImgSize = parseInt(localStorage.getItem('fleetcom.imgSize')) || 170;
                    document.documentElement.style.setProperty('--card-img-size', this.cardImgSize + 'px');
                    this.stripRegistry = new Set();
                    this.startClock();
                    this.loadVersion();
                    this.connect();
                    this.startConnWatchdog();
                    this.startStripRefresher();
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') this.kickIfStale();
                    });
                    let resizeT;
                    window.addEventListener('resize', () => {
                        clearTimeout(resizeT);
                        resizeT = setTimeout(() => {
                            for (const c of this.stripRegistry) this.drawStrip(c);
                        }, 150);
                    });
                    // Initialize Lucide icons. Debounced observer handles Alpine
                    // template changes without infinite loops (Lucide replacements
                    // themselves trigger mutations).
                    this.$nextTick(() => lucide.createIcons());
                    let iconTimer;
                    new MutationObserver((mutations) => {
                        // Only re-run if an <i data-lucide> was added (not replaced SVGs)
                        const needsIcons = mutations.some(m =>
                            [...m.addedNodes].some(n => n.nodeType === 1 &&
                                (n.matches?.('i[data-lucide]') || n.querySelector?.('i[data-lucide]'))
                            )
                        );
                        if (!needsIcons) return;
                        clearTimeout(iconTimer);
                        iconTimer = setTimeout(() => lucide.createIcons(), 50);
                    }).observe(document.querySelector('.app'), { childList: true, subtree: true });
                },

                startStripRefresher() {
                    // Refetch every mounted strip every 60s and prune orphaned ones.
                    // Mounted = currently in the DOM (chip expanded or host card visible).
                    setInterval(() => {
                        if (document.visibilityState !== 'visible') return;
                        for (const c of [...this.stripRegistry]) {
                            if (!c.el.isConnected) {
                                this.stripRegistry.delete(c);
                            } else {
                                this.fetchStrip(c);
                            }
                        }
                    }, 60000);
                },

                setViewMode(m) {
                    this.viewMode = m;
                    localStorage.setItem('fleetcom.view', m);
                },

                // ---------- clock + timezone ----------
                startClock() {
                    // Clock ticks every 1s for the seconds display in the
                    // header. tickSec ticks every 5s — it's the reactive
                    // dep for "seen Xs ago" / hostStatus / containerUptime,
                    // which Alpine re-evaluates across every host/chip on
                    // each bump. With 60s heartbeats, 5s precision is fine
                    // and 5× cheaper than per-second.
                    const tick = () => {
                        const d = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        if (this.useUTC) {
                            this.clockDate = d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate());
                            this.clockTime = pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
                        } else {
                            this.clockDate = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
                            this.clockTime = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                        }
                    };
                    tick();
                    setInterval(tick, 1000);
                    setInterval(() => { this.tickSec++; }, 5000);
                },

                get tzLabel() {
                    if (this.useUTC) return 'UTC';
                    const off = -(new Date().getTimezoneOffset());
                    const sign = off >= 0 ? '+' : '-';
                    const h = Math.floor(Math.abs(off) / 60);
                    const m = Math.abs(off) % 60;
                    return 'GMT' + sign + h + (m ? ':' + String(m).padStart(2, '0') : '');
                },

                toggleTimezone() {
                    this.useUTC = !this.useUTC;
                    localStorage.setItem('fleetcom.tz', this.useUTC ? 'utc' : 'local');
                    // Re-format build time for footer
                    if (this.ver.build_time) {
                        this.ver.build_time_display = this.formatBuildTime(this.ver.build_time);
                    }
                },

                // ---------- version ----------
                async loadVersion() {
                    try {
                        const res = await fetch('/api/version');
                        if (!res.ok) return;
                        const v = await res.json();
                        v.build_time_display = this.formatBuildTime(v.build_time);
                        this.ver = v;
                    } catch (_) {}
                },

                formatBuildTime(iso) {
                    if (!iso || iso === 'unknown') return 'unknown';
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return iso;
                    const pad = n => String(n).padStart(2, '0');
                    if (this.useUTC) {
                        return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate()) +
                               ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
                    }
                    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                },

                // Format ISO timestamp for display (tokens, shares, presets)
                formatTs(iso) {
                    if (!iso) return '—';
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return iso;
                    const pad = n => String(n).padStart(2, '0');
                    if (this.useUTC) {
                        return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate()) +
                               ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
                    }
                    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
                },

                // ---------- SSE connection ----------
                connect() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    if (m) this.shared = true;
                    this.openStream();
                },

                streamURL() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    return m ? ('/s/' + m[1] + '/events') : '/api/events';
                },

                openStream() {
                    if (this.es) {
                        try { this.es.close(); } catch (_) {}
                    }
                    try {
                        this.es = new EventSource(this.streamURL());
                    } catch (e) {
                        console.warn('EventSource construction failed', e);
                        return;
                    }

                    this.es.addEventListener('config', (e) => {
                        try {
                            const cfg = JSON.parse(e.data);
                            if (cfg.heartbeat_interval) this.heartbeatInterval = cfg.heartbeat_interval;
                            if (cfg.expected_agent_version) this.expectedAgentVersion = cfg.expected_agent_version;
                            // Detect new deployment — if the server commit changed, force reload
                            if (cfg.commit && this._serverCommit && cfg.commit !== this._serverCommit) {
                                console.log('New deployment detected (' + this._serverCommit + ' → ' + cfg.commit + '), reloading…');
                                location.reload();
                                return;
                            }
                            if (cfg.commit) this._serverCommit = cfg.commit;
                        } catch (_) {}
                    });

                    this.es.addEventListener('ignored', (e) => {
                        try {
                            this.ignoredSet = JSON.parse(e.data) || {};
                        } catch (_) {}
                    });

                    this.es.addEventListener('host-configs', (e) => {
                        try {
                            this.hostConfigs = JSON.parse(e.data) || {};
                        } catch (_) {}
                    });

                    this.es.addEventListener('hosts', (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            this.hosts = data || [];
                            this.lastOkAt = Date.now();
                        } catch (err) {
                            console.warn('hosts event parse error', err);
                        }
                    });

                    this.es.onopen = () => {
                        this.lastOkAt = Date.now();
                        this.connState = 'live';
                    };

                    // Intentionally NOT flipping connState in onerror — browser
                    // auto-reconnects, watchdog decides the UI state with grace period.
                    this.es.onerror = () => { /* watchdog handles it */ };
                },

                // Poll readyState — hides brief reconnects, surfaces real outages.
                //
                // Thresholds (relative to lastOkAt):
                //   <  5 s   -> stay LIVE (grace window; absorbs Cloudflare reconnects)
                //   <  75 s  -> RECONNECTING (server pings every 30s; allow 2x miss)
                //   >= 75 s  -> OFFLINE + force a fresh EventSource if stuck in CLOSED
                startConnWatchdog() {
                    setInterval(() => {
                        const rs = this.es ? this.es.readyState : 2;
                        const now = Date.now();

                        if (rs === 1) {
                            this.lastOkAt = now;
                            this.connState = 'live';
                            return;
                        }

                        const downFor = now - (this.lastOkAt || now);
                        if (downFor < 5000) {
                            this.connState = 'live';
                        } else if (downFor < 75000) {
                            this.connState = 'reconnecting';
                        } else {
                            this.connState = 'offline';
                            if (rs === 2) this.openStream();
                        }
                    }, 1000);
                },

                kickIfStale() {
                    const rs = this.es ? this.es.readyState : 2;
                    if (rs !== 1) this.openStream();
                },

                // ---------- admin ----------
                async loadTokens() {
                    const res = await fetch('/api/tokens');
                    if (res.ok) this.tokens = await res.json() || [];
                },

                async addHost() {
                    const hostname = this.newHostname.trim();
                    if (!hostname) return;
                    try {
                        const res = await fetch('/api/hosts', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ hostname })
                        });
                        if (res.ok) {
                            this.newToken = await res.json();
                            this.newHostname = '';
                            this.loadTokens();
                            this.toast('Host ' + hostname + ' added');
                        } else {
                            this.toast('Failed to add host', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- settings ----------
                async updateHeartbeatInterval(val) {
                    const n = parseInt(val);
                    if (isNaN(n) || n < 10 || n > 3600) return;
                    try {
                        const res = await fetch('/api/settings', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ heartbeat_interval: n })
                        });
                        if (res.ok) {
                            const cfg = await res.json();
                            this.heartbeatInterval = cfg.heartbeat_interval;
                            this.toast('Heartbeat interval set to ' + n + 's');
                        } else {
                            this.toast('Failed to update interval', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- settings navigation ----------
                openSettings() {
                    this.view = 'settings';
                    if (this.settingsTab === 'hosts') this.loadTokens();
                    else if (this.settingsTab === 'sharing') this.loadShares();
                    else if (this.settingsTab === 'ignored') this.loadIgnoredList();
                },

                // ---------- ignored entities ----------
                isIgnored(entityType, entityKey) {
                    return !!this.ignoredSet[entityType + ':' + entityKey];
                },

                async ignoreEntity(entityType, entityKey) {
                    try {
                        const res = await fetch('/api/ignore', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ entity_type: entityType, entity_key: entityKey })
                        });
                        if (res.ok) this.toast(entityType + ' ignored');
                        else this.toast('Failed to ignore', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                async unignoreEntity(entityType, entityKey) {
                    try {
                        const res = await fetch('/api/ignore?entity_type=' + encodeURIComponent(entityType) + '&entity_key=' + encodeURIComponent(entityKey), {
                            method: 'DELETE'
                        });
                        if (res.ok) this.toast(entityType + ' unignored');
                        else this.toast('Failed to unignore', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                    if (this.settingsTab === 'ignored') this.loadIgnoredList();
                },

                async loadIgnoredList() {
                    try {
                        const res = await fetch('/api/ignored');
                        if (res.ok) this.ignoredList = await res.json() || [];
                    } catch (_) {}
                },

                // ---------- context menu ----------
                showCtxMenu(event, entityType, entityKey) {
                    const x = Math.min(event.clientX, window.innerWidth - 180);
                    const y = Math.min(event.clientY, window.innerHeight - 50);
                    this.ctxMenu = {
                        x, y,
                        type: entityType,
                        key: entityKey,
                        ignored: this.isIgnored(entityType, entityKey)
                    };
                },

                // ---------- host config ----------
                openHostConfig(hostname) {
                    this.view = 'settings';
                    this.settingsTab = 'hosts';
                    this.configHost = hostname;
                    const cfg = this.hostConfigs[hostname] || {};
                    this.configComment = cfg.comment || '';
                    this.configImageId = cfg.image_preset_id || null;
                    this.loadTokens();
                    this.loadImagePresets();
                },

                async saveHostConfig() {
                    if (!this.configHost) return;
                    try {
                        const res = await fetch('/api/host-config', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                hostname: this.configHost,
                                image_preset_id: this.configImageId || null,
                                comment: this.configComment
                            })
                        });
                        if (res.ok) this.toast('Host config saved');
                        else this.toast('Failed to save config', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- image presets ----------
                async loadImagePresets() {
                    try {
                        const res = await fetch('/api/image-presets');
                        if (res.ok) this.imagePresets = await res.json() || [];
                    } catch (_) {}
                },

                async uploadPreset(ev) {
                    const input = ev.target;
                    if (!input.files || !input.files[0]) return;
                    const file = input.files[0];
                    const name = prompt('Icon name:', file.name.replace(/\.[^.]+$/, ''));
                    if (!name) { input.value = ''; return; }
                    const form = new FormData();
                    form.append('name', name);
                    form.append('file', file);
                    try {
                        const res = await fetch('/api/image-presets', { method: 'POST', body: form });
                        if (res.ok) { this.loadImagePresets(); this.toast('Icon "' + name + '" uploaded'); }
                        else this.toast('Upload failed', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                    input.value = '';
                },

                async deletePreset(id) {
                    if (!confirm('Delete this icon?')) return;
                    try {
                        const res = await fetch('/api/image-presets/' + id, { method: 'DELETE' });
                        if (res.ok) { this.loadImagePresets(); this.toast('Icon deleted'); }
                        else this.toast('Delete failed', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- chip expand state ----------
                toggleChip(type, entityKey) {
                    const key = type + ':' + entityKey;
                    this.openChip = (this.openChip === key) ? null : key;
                },

                isChipOpen(type, entityKey) {
                    return this.openChip === (type + ':' + entityKey);
                },

                // ---------- global scale controls ----------
                effectiveScale(ctrl) {
                    return ctrl.scaleOverride || this.globalScale;
                },

                nextScaleOf(scale) {
                    const idx = this.scaleList.indexOf(scale);
                    return this.scaleList[(idx + 1) % this.scaleList.length];
                },

                nextGlobalScale() {
                    return this.nextScaleOf(this.globalScale);
                },

                cycleGlobalScale() {
                    const idx = this.scaleList.indexOf(this.globalScale);
                    this.globalScale = this.scaleList[(idx + 1) % this.scaleList.length];
                    localStorage.setItem('fleetcom.globalScale', this.globalScale);
                    this.propagateGlobalScale();
                },

                propagateGlobalScale() {
                    for (const c of this.stripRegistry) {
                        if (!c.scaleOverride) {
                            this.updateStripScale(c, this.globalScale);
                        }
                    }
                },

                resetAllStrips() {
                    for (const c of this.stripRegistry) {
                        if (c.scaleOverride) {
                            c.scaleOverride = null;
                            this.updateStripScale(c, this.globalScale);
                            if (c.revertBtn) c.revertBtn.classList.add('hidden');
                            if (c.labelEl) c.labelEl.classList.remove('has-override');
                        }
                    }
                },

                // ---------- history strips (canvas, imperative) ----------
                mountStrip(el, type, entityKey, opts) {
                    if (el._stripCtrl) return;
                    opts = opts || {};
                    const ctrl = {
                        el, type, key: entityKey,
                        scaleOverride: null,
                        labelEl: null,
                        scaleEl: null,
                        nextEl: null,
                        revertBtn: null,
                        meta: null,
                        canvas: null,
                        data: null,
                    };

                    // Lead element: context label for entities (dot + name)
                    if (opts.kind !== 'host') {
                        const ctx = document.createElement('span');
                        ctx.className = 'strip-context s-' + (opts.status || 'dead');
                        const dot = document.createElement('span');
                        dot.className = 'ctx-dot';
                        ctx.appendChild(dot);
                        const name = document.createElement('span');
                        name.className = 'ctx-name';
                        name.textContent = opts.label || entityKey;
                        ctx.appendChild(name);
                        el.appendChild(ctx);
                    }

                    // "STATUS 1H" label — clickable to cycle scale
                    const label = document.createElement('span');
                    label.className = 'strip-label';
                    label.title = 'Click to change time scale';
                    const slText = document.createElement('span');
                    slText.className = 'sl-text';
                    slText.textContent = opts.kind === 'host' ? 'STATUS' : 'HISTORY';
                    label.appendChild(slText);
                    const slScale = document.createElement('span');
                    slScale.className = 'sl-scale';
                    slScale.textContent = this.effectiveScale(ctrl);
                    ctrl.scaleEl = slScale;
                    label.appendChild(slScale);
                    const slNext = document.createElement('span');
                    slNext.className = 'sl-next';
                    slNext.textContent = '→ ' + this.nextScaleOf(this.effectiveScale(ctrl));
                    ctrl.nextEl = slNext;
                    label.appendChild(slNext);
                    ctrl.labelEl = label;

                    label.addEventListener('click', () => {
                        const curScale = this.effectiveScale(ctrl);
                        const nextScale = this.nextScaleOf(curScale);
                        ctrl.scaleOverride = nextScale;
                        label.classList.add('has-override');
                        revertBtn.classList.remove('hidden');
                        this.updateStripScale(ctrl, nextScale);
                    });
                    el.appendChild(label);

                    // Revert button
                    const revertBtn = document.createElement('button');
                    revertBtn.type = 'button';
                    revertBtn.className = 'strip-revert hidden';
                    revertBtn.innerHTML = '&#x21ba;';
                    revertBtn.title = 'Revert to global scale';
                    revertBtn.addEventListener('click', () => {
                        ctrl.scaleOverride = null;
                        label.classList.remove('has-override');
                        revertBtn.classList.add('hidden');
                        this.updateStripScale(ctrl, this.globalScale);
                    });
                    ctrl.revertBtn = revertBtn;
                    el.appendChild(revertBtn);

                    const canvas = document.createElement('canvas');
                    canvas.className = 'strip-canvas';
                    ctrl.canvas = canvas;
                    canvas.addEventListener('mousemove', (e) => this.onStripHover(e, ctrl));
                    canvas.addEventListener('mouseleave', () => this.hideStripTooltip());
                    el.appendChild(canvas);

                    const meta = document.createElement('span');
                    meta.className = 'strip-meta';
                    ctrl.meta = meta;
                    el.appendChild(meta);

                    el._stripCtrl = ctrl;
                    this.stripRegistry.add(ctrl);
                    this.fetchStrip(ctrl);
                },

                updateStripScale(ctrl, scale) {
                    if (ctrl.scaleEl) ctrl.scaleEl.textContent = scale;
                    if (ctrl.nextEl) ctrl.nextEl.textContent = '→ ' + this.nextScaleOf(scale);
                    this.fetchStrip(ctrl);
                },

                async fetchStrip(ctrl) {
                    const scale = this.effectiveScale(ctrl);
                    const url = '/api/history?entity_type=' + encodeURIComponent(ctrl.type)
                        + '&entity_key=' + encodeURIComponent(ctrl.key)
                        + '&scale=' + scale;
                    try {
                        const res = await fetch(url);
                        if (!res.ok) return;
                        const json = await res.json();
                        ctrl.data = json;
                        this.drawStrip(ctrl);
                    } catch (_) {}
                },

                drawStrip(ctrl) {
                    const canvas = ctrl.canvas;
                    if (!canvas || !canvas.isConnected) return;
                    const dpr = window.devicePixelRatio || 1;
                    const cssW = canvas.clientWidth || 200;
                    const cssH = canvas.clientHeight || 12;
                    if (canvas.width !== Math.round(cssW * dpr) || canvas.height !== Math.round(cssH * dpr)) {
                        canvas.width = Math.round(cssW * dpr);
                        canvas.height = Math.round(cssH * dpr);
                    }
                    const ctx = canvas.getContext('2d');
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.fillStyle = '#0a0d10';
                    ctx.fillRect(0, 0, cssW, cssH);

                    const data = ctrl.data;
                    if (!data || !data.buckets) {
                        if (ctrl.meta) ctrl.meta.textContent = 'loading…';
                        return;
                    }

                    const buckets = data.buckets;
                    const n = buckets.length || 60;
                    const windowSec = data.window_seconds;
                    const cellW = cssW / n;

                    let coverageSec = 0;
                    if (data.first_sample) {
                        const t = new Date(data.first_sample).getTime();
                        if (!isNaN(t)) {
                            coverageSec = Math.min(windowSec, Math.max(0, (Date.now() - t) / 1000));
                        }
                    }

                    // "Before tracking" zone — render as faint hatched dead area
                    let coverStartIdx = n;
                    if (coverageSec > 0 && windowSec > 0) {
                        const ratio = coverageSec / windowSec;
                        coverStartIdx = Math.floor(n * (1 - ratio));
                    }
                    if (coverStartIdx > 0) {
                        ctx.fillStyle = '#13171b';
                        ctx.fillRect(0, 0, coverStartIdx * cellW, cssH);
                    }

                    // Interpolate none-gaps shorter than the heartbeat interval.
                    // With 15s buckets and 60s heartbeats, up to 3 consecutive
                    // empty buckets between two data points is expected — not
                    // downtime. Only runs longer than the heartbeat interval are
                    // real outages and stay red.
                    const resolved = new Array(n);
                    for (let i = 0; i < n; i++) {
                        resolved[i] = (buckets[i] && buckets[i].s) ? buckets[i].s : 'none';
                    }
                    const bucketSec = windowSec / n;
                    const maxGapBuckets = Math.ceil(this.heartbeatInterval / bucketSec);
                    const rank = { ok: 0, dead: 1, warn: 2, crit: 3 };
                    let i = coverStartIdx;
                    while (i < n) {
                        if (resolved[i] !== 'none') { i++; continue; }
                        // Found start of a none-run — measure its length
                        let runEnd = i;
                        while (runEnd < n && resolved[runEnd] === 'none') runEnd++;
                        const runLen = runEnd - i;
                        // Find the data-bearing neighbors
                        const prev = (i > coverStartIdx) ? resolved[i - 1] : null;
                        const next = (runEnd < n) ? resolved[runEnd] : null;
                        // Fill if the gap is within expected heartbeat spacing
                        if (prev && prev !== 'none' && next && next !== 'none' && runLen <= maxGapBuckets) {
                            const fill = (rank[prev] || 0) >= (rank[next] || 0) ? prev : next;
                            for (let j = i; j < runEnd; j++) resolved[j] = fill;
                        }
                        i = runEnd;
                    }

                    // Real data vs interpolated — interpolated buckets use dimmed colors
                    const colors     = { ok: '#3ddc97', warn: '#ffb84d', crit: '#ff4d6d', dead: '#5a6068' };
                    const colorsDim  = { ok: '#2a9e6c', warn: '#b8832e', crit: '#b8364d', dead: '#44484f' };
                    for (let i = 0; i < n; i++) {
                        if (i < coverStartIdx) continue;
                        const status = resolved[i];
                        const x = Math.floor(i * cellW);
                        const w = Math.max(1, Math.floor((i + 1) * cellW) - x - (cellW > 2 ? 1 : 0));
                        if (status === 'none') {
                            ctx.fillStyle = '#2a1518';
                            ctx.fillRect(x, 1, w, cssH - 2);
                            continue;
                        }
                        const hasData = buckets[i] && buckets[i].s && buckets[i].s !== 'none';
                        const palette = hasData ? colors : colorsDim;
                        const color = palette[status];
                        if (!color) continue;
                        ctx.fillStyle = color;
                        ctx.fillRect(x, 1, w, cssH - 2);
                    }

                    // "now" marker on the right edge
                    ctx.fillStyle = 'rgba(232, 230, 223, 0.5)';
                    ctx.fillRect(cssW - 1, 0, 1, cssH);

                    if (ctrl.meta) {
                        ctrl.meta.classList.remove('fresh', 'complete');
                        if (!data.first_sample) {
                            ctrl.meta.textContent = '—';
                        } else if (coverageSec >= windowSec - 1) {
                            let ok = 0, total = 0;
                            for (let i = coverStartIdx; i < n; i++) {
                                if (resolved[i] === 'none') continue;
                                total++;
                                if (resolved[i] === 'ok') ok++;
                            }
                            const pct = total > 0 ? Math.round(100 * ok / total) : 0;
                            ctrl.meta.textContent = pct + '% ok';
                            if (pct >= 100) ctrl.meta.classList.add('complete');
                        } else {
                            ctrl.meta.textContent = this.humanDur(coverageSec) + '/' + this.humanDur(windowSec);
                            ctrl.meta.classList.add('fresh');
                        }
                    }
                },

                humanDur(sec) {
                    if (sec < 60) return Math.max(1, Math.round(sec)) + 's';
                    if (sec < 5400) return Math.round(sec / 60) + 'm';
                    if (sec < 86400 * 1.5) return Math.round(sec / 3600) + 'h';
                    if (sec < 86400 * 14) return Math.round(sec / 86400) + 'd';
                    if (sec < 86400 * 60) return Math.round(sec / 86400 / 7) + 'w';
                    if (sec < 86400 * 365) return Math.round(sec / 86400 / 30) + 'mo';
                    return Math.round(sec / 86400 / 365 * 10) / 10 + 'y';
                },

                onStripHover(e, ctrl) {
                    const data = ctrl.data;
                    if (!data || !data.buckets) return;
                    const rect = ctrl.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const n = data.buckets.length || 60;
                    let idx = Math.floor((x / rect.width) * n);
                    if (idx < 0) idx = 0;
                    if (idx >= n) idx = n - 1;
                    const b = data.buckets[idx];
                    const bucketSec = data.window_seconds / n;
                    const ageSec = (n - 1 - idx) * bucketSec;
                    const ageLabel = ageSec < bucketSec ? 'now' : this.humanDur(ageSec) + ' ago';
                    const scale = this.effectiveScale(ctrl);
                    let text;
                    if (!b || b.s === 'none') {
                        text = ageLabel + ' · no data';
                    } else {
                        text = ageLabel + ' · ' + b.s + ' · ' + (b.p || 0) + '% ok';
                    }
                    const tip = this.getStripTooltip();
                    tip.textContent = text;
                    tip.style.display = 'block';
                    const tx = Math.min(window.innerWidth - tip.offsetWidth - 10, e.clientX + 12);
                    const ty = Math.max(4, e.clientY - tip.offsetHeight - 8);
                    tip.style.left = tx + 'px';
                    tip.style.top = ty + 'px';
                },

                getStripTooltip() {
                    let tip = document.getElementById('strip-tooltip');
                    if (!tip) {
                        tip = document.createElement('div');
                        tip.id = 'strip-tooltip';
                        document.body.appendChild(tip);
                    }
                    return tip;
                },

                hideStripTooltip() {
                    const tip = document.getElementById('strip-tooltip');
                    if (tip) tip.style.display = 'none';
                },

                async removeHost(hostname) {
                    if (!confirm('Remove ' + hostname + '? Its agent will stop authenticating.')) return;
                    try {
                        const res = await fetch('/api/hosts?hostname=' + encodeURIComponent(hostname), { method: 'DELETE' });
                        if (res.ok) {
                            this.loadTokens();
                            if (this.newToken && this.newToken.hostname === hostname) this.newToken = null;
                            this.toast('Host ' + hostname + ' removed');
                        } else {
                            this.toast('Failed to remove host', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                async loadShares() {
                    const res = await fetch('/api/shares');
                    if (res.ok) this.shares = await res.json() || [];
                },

                async createShare() {
                    try {
                        const res = await fetch('/api/shares', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ label: this.shareLabel.trim(), hours: parseInt(this.shareHours) })
                        });
                        if (res.ok) {
                            this.newShare = await res.json();
                            this.shareLabel = '';
                            this.loadShares();
                            this.toast('Share link created');
                        } else {
                            this.toast('Failed to create share link', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                async deleteShare(id) {
                    if (!confirm('Revoke this share link?')) return;
                    try {
                        const res = await fetch('/api/shares?id=' + id, { method: 'DELETE' });
                        if (res.ok) { this.loadShares(); this.toast('Share link revoked'); }
                        else this.toast('Failed to revoke', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- derived stats (ignored entities excluded) ----------
                activeHosts() {
                    return this.hosts.filter(h => !this.isIgnored('host', h.hostname));
                },
                get hostsUp() {
                    const iv = this.heartbeatInterval;
                    return this.activeHosts().filter(h => this.secondsAgo(h.last_seen) < iv * 2).length;
                },
                get hostsDown() { return this.activeHosts().length - this.hostsUp; },
                get totalContainers() {
                    return this.activeHosts().reduce((n, h) => n + this.activeContainers(h).length, 0);
                },
                get runningContainers() {
                    return this.activeHosts().reduce((n, h) => n + this.activeContainers(h).filter(c => c.state === 'running').length, 0);
                },
                get totalAgents() {
                    return this.activeHosts().reduce((n, h) => n + this.activeAgentsOf(h).length, 0);
                },
                get onlineAgents() {
                    return this.activeHosts().reduce((n, h) => n + this.activeAgentsOf(h).filter(a => a.status === 'online').length, 0);
                },

                activeContainers(host) {
                    return (host.containers || []).filter(c => !this.isIgnored('container', host.hostname + '/' + c.name));
                },
                activeAgentsOf(host) {
                    return (host.agents || []).filter(a => !this.isIgnored('agent', host.hostname + '/' + a.name));
                },
                get ignoredHostCount() {
                    return this.hosts.filter(h => this.isIgnored('host', h.hostname)).length;
                },
                get ignoredContainerCount() {
                    return this.hosts.reduce((n, h) => n + (h.containers || []).filter(c => this.isIgnored('container', h.hostname + '/' + c.name)).length, 0);
                },
                get ignoredAgentCount() {
                    return this.hosts.reduce((n, h) => n + (h.agents || []).filter(a => this.isIgnored('agent', h.hostname + '/' + a.name)).length, 0);
                },

                countRunning(containers) {
                    return (containers || []).filter(c => c.state === 'running').length;
                },
                countOnlineAgents(agents) {
                    return (agents || []).filter(a => a.status === 'online').length;
                },

                hostByName(hostname) {
                    return this.hosts.find(h => h.hostname === hostname) || null;
                },

                // ---------- status helpers ----------
                hostStatus(host) {
                    const ago = this.secondsAgo(host.last_seen);
                    const iv = this.heartbeatInterval;
                    if (ago < iv * 2) return 'ok';
                    if (ago < iv * 5) return 'warn';
                    if (ago < iv * 10) return 'crit';
                    return 'dead';
                },
                containerStatus(c) {
                    if (c.crash_loop || c.oom_killed) return 'crit';
                    if (c.health === 'unhealthy') return 'crit';
                    if (c.health === 'starting') return 'warn';
                    if (c.state === 'running') return 'ok';
                    if (c.state === 'restarting' || c.state === 'paused') return 'warn';
                    if (c.state === 'exited' || c.state === 'dead') return 'crit';
                    return 'dead';
                },
                containerHealthLabel(c) {
                    if (c.crash_loop) return 'CrashLoop';
                    if (c.oom_killed) return 'OOM Kill';
                    if (c.health === 'unhealthy') return 'Unhealthy';
                    if (c.health === 'starting') return 'Starting';
                    if (c.health === 'healthy') return 'Healthy';
                    if (c.state === 'restarting') return 'Restarting';
                    return '';
                },
                containerUptime(c) {
                    if (!c.started_at) return '';
                    const started = new Date(c.started_at).getTime();
                    if (isNaN(started)) return '';
                    const secs = Math.floor((Date.now() - started) / 1000);
                    if (secs < 0) return '';
                    if (secs < 60) return secs + 's';
                    if (secs < 3600) return Math.floor(secs / 60) + 'm';
                    if (secs < 86400) return Math.floor(secs / 3600) + 'h ' + Math.floor((secs % 3600) / 60) + 'm';
                    return Math.floor(secs / 86400) + 'd ' + Math.floor((secs % 86400) / 3600) + 'h';
                },
                exitCodeLabel(code) {
                    if (code === 0) return '';
                    if (code === 137) return 'SIGKILL/OOM';
                    if (code === 143) return 'SIGTERM';
                    if (code === 1) return 'Error';
                    return 'Exit ' + code;
                },
                isLegacyAgent(host) {
                    return !host.agent_version;
                },
                isOutdatedAgent(host) {
                    if (!host.agent_version || !this.expectedAgentVersion) return false;
                    // Extract semver from "0.1.0 (date, time)" format
                    const current = host.agent_version.split(' ')[0];
                    const expected = this.expectedAgentVersion.split(' ')[0];
                    return current !== expected;
                },
                agentVersionLabel(host) {
                    if (!host.agent_version) return 'LEGACY';
                    return host.agent_version;
                },
                agentStatus(a) {
                    if (a.status === 'online') return 'ok';
                    if (a.status === 'degraded') return 'warn';
                    if (a.status === 'offline') return 'crit';
                    return 'dead';
                },
                stateLabel(s) {
                    return s === 'ok'   ? 'Online'
                         : s === 'warn' ? 'Stale'
                         : s === 'crit' ? 'Offline'
                                        : 'Dead';
                },

                // ---------- toast notifications ----------
                toast(msg, type = 'ok') {
                    const container = document.getElementById('toasts');
                    const el = document.createElement('div');
                    el.className = 'toast toast-' + type;
                    el.textContent = msg;
                    container.appendChild(el);
                    setTimeout(() => {
                        el.classList.add('toast-out');
                        setTimeout(() => el.remove(), 200);
                    }, type === 'err' ? 5000 : 3000);
                },

                // ---------- time helpers ----------
                secondsAgo(isoStr) {
                    // Read tickSec so Alpine tracks it as a dependency —
                    // this makes "seen Xs ago" and hostStatus update every second.
                    void this.tickSec;
                    if (!isoStr) return 9999;
                    return (Date.now() - new Date(isoStr).getTime()) / 1000;
                },

                formatAgo(isoStr) {
                    const s = this.secondsAgo(isoStr);
                    if (s > 86400) return Math.floor(s / 86400) + 'd ago';
                    if (s > 3600) return Math.floor(s / 3600) + 'h ago';
                    if (s > 60) return Math.floor(s / 60) + 'm ago';
                    return Math.floor(s) + 's ago';
                },

                formatUptime(seconds) {
                    if (!seconds) return '';
                    const d = Math.floor(seconds / 86400);
                    const h = Math.floor((seconds % 86400) / 3600);
                    if (d > 0) return d + 'd ' + h + 'h';
                    const m = Math.floor((seconds % 3600) / 60);
                    return h + 'h ' + m + 'm';
                }
            };
        }
    </script>
