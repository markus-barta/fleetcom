services:
  fleetcom-bosun:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-bosun
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/mtab:/host/etc/mtab:ro
    environment:
      - FLEETCOM_URL=${FLEETCOM_URL:-https://fleet.barta.cm}
      - FLEETCOM_TOKEN=${FLEETCOM_TOKEN}
      - FLEETCOM_HOSTNAME=${FLEETCOM_HOSTNAME}
      - FLEETCOM_AGENTS=${FLEETCOM_AGENTS:-[]}
