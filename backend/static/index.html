                                        </div>
                                        <div class="card-head-right">
                                            <div>
                                                <div x-text="(host.os || 'unknown') + (host.uptime_seconds ? ' · up ' + formatUptime(host.uptime_seconds) : '')"></div>
                                                <div class="seen" x-text="'seen ' + formatAgo(host.last_seen)"></div>
                                                <div class="agent-version-line agent-version-line-compact" :title="agentVersionLabel(host)">
                                                    <template x-if="isOutdatedAgent(host)"><svg class="agent-alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></template>
                                                    <svg class="agent-version-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r="1" fill="currentColor"/></svg>
                                                    <span class="agent-version-badge" :class="isLegacyAgent(host) ? 'legacy' : (isOutdatedAgent(host) ? 'outdated' : 'current')" x-text="agentVersionShort(host)"></span>
                                                    <span class="agent-version-rest" x-show="agentVersionRest(host)" x-text="agentVersionRest(host)"></span>
                                                    <template x-if="isAgentStale(host)">
                                                        <span class="agent-stale-mark" title="Agent has not been updated in over 24h. Docker hosts should auto-update daily via watchtower; legacy hosts need manual rollout.">!</span>
                                                    </template>
                                                    <template x-if="hasPendingUpdate(host)">
                                                        <span class="agent-update-pending" title="Update requested — will run on next heartbeat">upd</span>
                                                    </template>
                                                </div>
                                                <div class="hw-chips" x-show="host.hw_live">
                                                    <span class="hw-chip" :title="'CPU load 1m: ' + (host.hw_live ? host.hw_live.cpu_load_1.toFixed(2) : '—')"><span class="hw-chip-k">CPU</span><span class="hw-chip-v" x-text="hwCpuPct(host) != null ? hwCpuPct(host) + '%' : '—'"></span></span>
                                                    <span class="hw-chip" :title="'Memory: ' + (host.hw_live && host.hw_live.mem_used_bytes ? formatBytes(host.hw_live.mem_used_bytes) + ' / ' + formatBytes(host.hw_live.mem_total_bytes) : '—')"><span class="hw-chip-k">RAM</span><span class="hw-chip-v" x-text="hwMemPct(host) != null ? hwMemPct(host) + '%' : '—'"></span></span>
                                                    <template x-if="hwCpuTemp(host) != null">
                                                        <span class="hw-chip" :class="hwTempLevel(hwCpuTemp(host))" title="CPU temperature"><span class="hw-chip-k">°C</span><span class="hw-chip-v" x-text="hwCpuTemp(host)"></span></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="card-comment-slot">
                                        <div class="card-comment" x-show="hostConfigs[host.hostname] && hostConfigs[host.hostname].comment" x-text="(hostConfigs[host.hostname] || {}).comment || ''"></div>
                                    </div>

                                    <div class="strip-block host-strip" x-init="mountStrip($el, 'host', host.hostname, { kind: 'host' })"></div>

                                    <template x-if="host.containers && host.containers.length > 0">
                                        <div class="card-section">

                                                <span>Containers</span><span class="count" x-text="'· ' + countRunning(host.containers) + '/' + host.containers.length"></span>
                                            </div>
                                            <div class="chips" :class="host.containers.length > 8 ? 'dense' : ''">
                                                <template x-for="c in host.containers" :key="c.name">
                                                    <div class="chip chip-container"
                                                         :class="['s-' + containerStatus(c), isChipOpen('container', host.hostname + '/' + c.name) ? 'is-open' : '', isIgnored('container', host.hostname + '/' + c.name) ? 'is-ignored' : '', c.crash_loop ? 'crash-loop' : '', c.oom_killed ? 'oom-killed' : '']"
                                                         :title="c.name + ' · ' + c.state + (c.health ? ' · ' + c.health : '') + (containerUptime(c) ? ' · up ' + containerUptime(c) : '') + (c.restart_count ? ' · ' + c.restart_count + '× restarted' : '') + (c.crash_loop ? ' · CRASH LOOP' : '') + (c.oom_killed ? ' · OOM KILLED' : '') + (c.exit_code && c.state !== 'running' ? ' · ' + exitCodeLabel(c.exit_code) : '')"

                                                         @contextmenu.prevent.stop="showCtxMenu($event, 'container', host.hostname + '/' + c.name)">

                                                </template>
                                            </template>
                                        </div>

                                                    <div class="chip chip-agent"

                                                         @click="toggleChip('agent', host.hostname + '/' + a.name)"
                                                         @contextmenu.prevent.stop="showCtxMenu($event, 'agent', host.hostname + '/' + a.name)">
                                                        <i data-lucide="sparkles" class="spark"></i>
                                                        <span class="name" x-text="a.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="a in host.agents" :key="'hist-' + a.name">
                                                <template x-if="isChipOpen('agent', host.hostname + '/' + a.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'agent', host.hostname + '/' + a.name, { kind: 'entity', label: a.name, status: agentStatus(a) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="(!host.containers || host.containers.length === 0) && (!host.agents || host.agents.length === 0)">
                                        <div class="card-empty">No containers or agents reported</div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- DETAIL MODE — expanded single-column cards with extra sysop info -->
                    <template x-if="viewMode === 'detail' && hosts.length > 0">
                        <div class="grid-detail">
                            <template x-for="host in hosts" :key="host.hostname">
                                <div class="card"
                                     :class="['state-' + hostStatus(host), isIgnored('host', host.hostname) ? 'is-ignored' : '']"
                                     @contextmenu.prevent="showCtxMenu($event, 'host', host.hostname)">
                                    <template x-if="hostConfigs[host.hostname] && hostConfigs[host.hostname].image_preset_id">
                                        <div class="card-bg-img">
                                            <img :src="'/api/image-presets/' + hostConfigs[host.hostname].image_preset_id + '/image'" :alt="host.hostname">
                                        </div>
                                    </template>

                                    <button class="card-gear" @click.stop="openHostConfig(host.hostname)" title="Host settings">
                                        <span class="card-gear-label">Configure</span>
                                        <i data-lucide="settings"></i>
                                    </button>

                                    <div class="card-head">
                                        <div class="card-head-left">
                                            <i data-lucide="server" class="hostname-icon"></i>
                                            <span class="hostname" x-text="host.hostname"></span>
                                            <span class="state-pill" x-text="stateLabel(hostStatus(host))"></span>
                                        </div>
                                        <div class="card-head-right">
                                            <div>
                                                <div x-text="(host.os || 'unknown') + (host.uptime_seconds ? ' · up ' + formatUptime(host.uptime_seconds) : '')"></div>
                                                <div class="seen" x-text="'seen ' + formatAgo(host.last_seen)"></div>
                                                <div class="hw-chips" x-show="host.hw_live">
                                                    <span class="hw-chip" :title="'CPU load 1m: ' + (host.hw_live ? host.hw_live.cpu_load_1.toFixed(2) : '—')"><span class="hw-chip-k">CPU</span><span class="hw-chip-v" x-text="hwCpuPct(host) != null ? hwCpuPct(host) + '%' : '—'"></span></span>
                                                    <span class="hw-chip" :title="'Memory: ' + (host.hw_live && host.hw_live.mem_used_bytes ? formatBytes(host.hw_live.mem_used_bytes) + ' / ' + formatBytes(host.hw_live.mem_total_bytes) : '—')"><span class="hw-chip-k">RAM</span><span class="hw-chip-v" x-text="hwMemPct(host) != null ? hwMemPct(host) + '%' : '—'"></span></span>
                                                    <template x-if="hwCpuTemp(host) != null">
                                                        <span class="hw-chip" :class="hwTempLevel(hwCpuTemp(host))" title="CPU temperature"><span class="hw-chip-k">°C</span><span class="hw-chip-v" x-text="hwCpuTemp(host)"></span></span>
                                                    </template>
                                                </div>
                                                <div class="agent-version-line">
                                                    <template x-if="isOutdatedAgent(host)"><svg class="agent-alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></template>
                                                    <span class="agent-version-badge" :class="isLegacyAgent(host) ? 'legacy' : (isOutdatedAgent(host) ? 'outdated' : 'current')" x-text="agentVersionLabel(host)"></span>
                                                    <template x-if="isAgentStale(host)">
                                                        <span class="agent-stale-mark" title="Agent has not been updated in over 24h. Docker hosts should auto-update daily via watchtower; legacy hosts need manual rollout.">!</span>
                                                    </template>
                                                    <template x-if="hasPendingUpdate(host)">
                                                        <span class="agent-update-pending" title="Update requested — will run on next heartbeat">upd</span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="card-comment-slot">
                                        <div class="card-comment" x-show="hostConfigs[host.hostname] && hostConfigs[host.hostname].comment" x-text="(hostConfigs[host.hostname] || {}).comment || ''"></div>

                                    <div class="card-detail-meta">
                                        <div class="detail-field">
                                            <span class="df-label">Agent</span>
                                            <span class="df-value">
                                                <template x-if="isOutdatedAgent(host)"><svg class="agent-alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></template>

                                                                <div x-html="renderSparkline(hardwareCache[host.hostname].metrics, 'cpu_temp_c')"></div>

                                                        </template>
                                                    </div>
                                                </div>
                                            </template>

                                            <template x-if="hardwareCache[host.hostname] && hardwareCache[host.hostname].static && hardwareCache[host.hostname].static.mounts && hardwareCache[host.hostname].static.mounts.length > 0">

                                                <template x-for="c in host.containers" :key="c.name">
                                                    <div class="chip chip-container"
                                                         :class="['s-' + containerStatus(c), isChipOpen('container', host.hostname + '/' + c.name) ? 'is-open' : '', isIgnored('container', host.hostname + '/' + c.name) ? 'is-ignored' : '', c.crash_loop ? 'crash-loop' : '', c.oom_killed ? 'oom-killed' : '']"
                                                         :title="c.name + ' · ' + c.state + (c.health ? ' · ' + c.health : '') + ' · ' + (c.image || '') + (containerUptime(c) ? ' · up ' + containerUptime(c) : '') + (c.restart_count ? ' · ' + c.restart_count + '× restarted' : '') + (c.crash_loop ? ' · CRASH LOOP' : '') + (c.oom_killed ? ' · OOM KILLED' : '') + (c.exit_code && c.state !== 'running' ? ' · ' + exitCodeLabel(c.exit_code) : '')"
                                                         @click="toggleChip('container', host.hostname + '/' + c.name)"
                                                         @contextmenu.prevent.stop="showCtxMenu($event, 'container', host.hostname + '/' + c.name)">
                                                        <svg class="crate" viewBox="0 0 24 24"><use href="#icon-container"/></svg>
                                                        <span class="name" x-text="c.name"></span>
                                                        <template x-if="containerHealthLabel(c)">
                                                            <span class="health-badge" :class="'s-' + containerStatus(c)" x-text="containerHealthLabel(c)"></span>
                                                        </template>
                                                        <template x-if="containerUptime(c) && !containerHealthLabel(c)">
                                                            <span class="uptime-badge" x-text="containerUptime(c)"></span>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="c in host.containers" :key="'hist-' + c.name">
                                                <template x-if="isChipOpen('container', host.hostname + '/' + c.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'container', host.hostname + '/' + c.name, { kind: 'entity', label: c.name, status: containerStatus(c) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="host.agents && host.agents.length > 0">
                                        <div class="card-section">
                                            <div class="card-section-label">
                                                <span>Agents</span><span class="count" x-text="'· ' + countOnlineAgents(host.agents) + '/' + host.agents.length"></span>
                                            </div>
                                            <div class="chips">
                                                <template x-for="a in host.agents" :key="a.name">
                                                    <div class="chip chip-agent"
                                                         :class="['s-' + agentStatus(a), isChipOpen('agent', host.hostname + '/' + a.name) ? 'is-open' : '', isIgnored('agent', host.hostname + '/' + a.name) ? 'is-ignored' : '']"
                                                         :title="a.name + ' · ' + a.status + ' · ' + (a.agent_type || '')"
                                                         @click="toggleChip('agent', host.hostname + '/' + a.name)"
                                                         @contextmenu.prevent.stop="showCtxMenu($event, 'agent', host.hostname + '/' + a.name)">
                                                        <i data-lucide="sparkles" class="spark"></i>
                                                        <span class="name" x-text="a.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="a in host.agents" :key="'hist-' + a.name">
                                                <template x-if="isChipOpen('agent', host.hostname + '/' + a.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'agent', host.hostname + '/' + a.name, { kind: 'entity', label: a.name, status: agentStatus(a) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- COMPACT MODE -->
                    <template x-if="viewMode === 'compact' && hosts.length > 0">
                        <table class="fleet-table">
                            <thead>
                                <tr>
                                    <th class="col-state"></th>
                                    <th>Host</th>
                                    <th>State</th>
                                    <th>Agent</th>
                                    <th>OS</th>
                                    <th>Uptime</th>
                                    <th>Seen</th>
                                    <th>Containers</th>
                                    <th>Agents</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="host in hosts" :key="host.hostname">
                                    <tr :class="'row-' + hostStatus(host)">
                                        <td class="col-state"><span class="dot"></span></td>
                                        <td class="col-host" x-text="host.hostname"></td>
                                        <td x-text="stateLabel(hostStatus(host))"></td>
                                        <td>
                                            <span class="agent-version-badge compact" :class="isLegacyAgent(host) ? 'legacy' : (isOutdatedAgent(host) ? 'outdated' : 'current')">
                                                <template x-if="isOutdatedAgent(host)"><svg class="agent-alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></template>
                                                <span x-text="agentVersionLabel(host)"></span>
                                            </span>
                                        </td>
                                        <td x-text="host.os || '—'"></td>
                                        <td x-text="formatUptime(host.uptime_seconds) || '—'"></td>
                                        <td x-text="formatAgo(host.last_seen)"></td>
                                        <td>
                                            <template x-if="host.containers && host.containers.length > 0">
                                                <div class="bar-strip">
                                                    <template x-for="c in host.containers" :key="c.name">
                                                        <span class="bar" :class="'s-' + containerStatus(c)" :data-name="c.name + ' · ' + c.state"></span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template x-if="!host.containers || host.containers.length === 0">
                                                <span class="bar-strip"><span class="none">—</span></span>
                                            </template>
                                        </td>
                                        <td>
                                            <template x-if="host.agents && host.agents.length > 0">
                                                <div class="bar-strip">
                                                    <template x-for="a in host.agents" :key="a.name">
                                                        <span class="bar" :class="'s-' + agentStatus(a)" :data-name="a.name + ' · ' + a.status"></span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template x-if="!host.agents || host.agents.length === 0">
                                                <span class="bar-strip"><span class="none">—</span></span>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                </div>
            </template>

            <!-- Settings view -->
            <template x-if="view === 'settings'">
                <div class="admin-panel">
                    <div class="settings-tabs">
                        <button class="settings-tab" x-show="currentUser && currentUser.role === 'admin'" :class="settingsTab === 'hosts' && 'active'" @click="settingsTab = 'hosts'; loadTokens(); loadImagePresets()">Hosts</button>
                        <button class="settings-tab" x-show="currentUser && currentUser.role === 'admin'" :class="settingsTab === 'icons' && 'active'" @click="settingsTab = 'icons'; loadImagePresets()">Icons</button>
                        <button class="settings-tab" x-show="currentUser && currentUser.role === 'admin'" :class="settingsTab === 'sharing' && 'active'" @click="settingsTab = 'sharing'; loadShares()">Sharing</button>
                        <button class="settings-tab" :class="settingsTab === 'ignored' && 'active'" @click="settingsTab = 'ignored'; loadIgnoredList()">Ignored</button>
                        <button class="settings-tab" x-show="currentUser && currentUser.role === 'admin'" :class="settingsTab === 'config' && 'active'" @click="settingsTab = 'config'">Config</button>
                        <button class="settings-tab" :class="settingsTab === 'account' && 'active'" @click="settingsTab = 'account'; loadMySessions()">Account</button>
                        <button class="settings-tab" x-show="currentUser && currentUser.role === 'admin'" :class="settingsTab === 'users' && 'active'" @click="settingsTab = 'users'; loadUsers()">Users</button>
                        <span class="tab-spacer"></span>
                        <button class="settings-tab" :class="settingsTab === 'docs' && 'active'" @click="settingsTab = 'docs'">Docs</button>
                    </div>

                    <!-- Hosts tab -->
                    <template x-if="settingsTab === 'hosts'">
                        <div>
                            <div class="form-row">
                                <input type="text" x-model="newHostname" placeholder="hostname (e.g. dsc0)" @keydown.enter="addHost()">
                                <button class="btn btn-primary" @click="addHost()">Add Host</button>
                                <button class="btn" style="margin-left:auto;" @click="requestUpdateAll()" :title="'Trigger a watchtower pull on every host you can access'">Update all</button>
                            </div>

                            <template x-if="newToken">
                                <div class="token-reveal">
                                    <div class="label">Agent token for <span x-text="newToken.hostname"></span></div>
                                    <code x-text="newToken.token"></code>
                                    <div class="warning">Copy this token now — it won't be shown again.</div>
                                </div>
                            </template>

                            <ul class="token-list">
                                <template x-for="t in tokens" :key="t.hostname">
                                    <li style="flex-wrap:wrap;">
                                        <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
                                            <div style="display:flex;align-items:center;gap:0.6rem;">
                                                <span class="dot" :class="hostByName(t.hostname) ? 'dot-' + hostStatus(hostByName(t.hostname)) : ''" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ink-faint);"></span>
                                                <div>
                                                    <span class="hostname" x-text="t.hostname"></span>
                                                    <template x-if="hostByName(t.hostname)">
                                                        <span style="color:var(--ink-ghost);font-size:10px;margin-left:0.5rem;" x-text="'seen ' + formatAgo(hostByName(t.hostname).last_seen)"></span>
                                                    </template>
                                                    <template x-if="!hostByName(t.hostname)">
                                                        <span style="color:var(--ink-faint);font-size:10px;margin-left:0.5rem;">never reported</span>
                                                    </template>
                                                    <div style="font-size:9px;color:var(--ink-faint);">
                                                        <span x-text="'token created ' + formatTs(t.created_at)"></span>
                                                        <template x-if="hostByName(t.hostname)">
                                                            <span x-text="' · ' + (hostByName(t.hostname).os || '') + (hostByName(t.hostname).uptime_seconds ? ' · up ' + formatUptime(hostByName(t.hostname).uptime_seconds) : '')"></span>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>
                                            <div style="display:flex;gap:0.4rem;align-items:center;">
                                                <template x-if="hostByName(t.hostname) && hasPendingUpdate(hostByName(t.hostname))">
                                                    <span class="agent-update-pending" title="Update requested — will run on next heartbeat">upd</span>
                                                </template>
                                                <button class="btn" @click="requestHostUpdate(t.hostname)" :disabled="!hostByName(t.hostname)" :title="hostByName(t.hostname) ? 'Trigger watchtower pull on this host' : 'Host has not reported yet'">Update</button>
                                                <button class="btn" @click="configHost === t.hostname ? configHost = '' : openHostConfig(t.hostname)" x-text="configHost === t.hostname ? 'Close' : 'Configure'"></button>
                                                <button class="btn btn-danger" @click="removeHost(t.hostname)">Remove</button>
                                            </div>
                                        </div>
                                        <template x-if="configHost === t.hostname">
                                            <div style="width:100%;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--line);">
                                                <div style="display:flex;gap:1rem;margin-bottom:0.6rem;align-items:center;flex-wrap:wrap;">
                                                    <label style="font-size:10px;color:var(--ink-ghost);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;">Icon</label>
                                                    <div class="imgpick"
                                                         :class="{ 'is-open': imgPickOpen }"
                                                         @keydown.escape.prevent="imgPickOpen = false"
                                                         @keydown.arrow-down.prevent="imgPickNav(1)"
                                                         @keydown.arrow-up.prevent="imgPickNav(-1)"
                                                         @keydown.enter.prevent="imgPickCommit()"
                                                         @click.outside="imgPickOpen = false">
                                                        <button type="button" class="imgpick-trigger" @click="imgPickToggle()">
                                                            <template x-if="configImageId">
                                                                <span class="imgpick-thumb">
                                                                    <img :src="'/api/image-presets/' + configImageId + '/image'" alt="">
                                                                </span>
                                                            </template>
                                                            <template x-if="!configImageId">
                                                                <span class="imgpick-thumb is-empty">Ø</span>
                                                            </template>
                                                            <span class="imgpick-name" :class="{ 'is-empty': !configImageId }"
                                                                  x-text="configImageId ? (imagePresetName(configImageId) || 'unknown') : 'none — no icon'"></span>
                                                            <span class="imgpick-chev"></span>
                                                        </button>
                                                        <template x-if="imgPickOpen">
                                                            <div class="imgpick-panel" @mouseleave="imgPickFocus = -1">
                                                                <div class="imgpick-option"
                                                                     :class="{ 'is-selected': configImageId === null, 'is-active': imgPickFocus === 0 }"
                                                                     @click="imgPickSelect(null)"
                                                                     @mouseenter="imgPickFocus = 0">
                                                                    <span class="imgpick-thumb is-empty">Ø</span>
                                                                    <span class="imgpick-option-name">none — no icon</span>
                                                                    <span class="check">✓</span>
                                                                </div>
                                                                <template x-for="(p, idx) in imagePresets" :key="p.id">
                                                                    <div class="imgpick-option"
                                                                         :class="{ 'is-selected': configImageId === p.id, 'is-active': imgPickFocus === idx + 1 }"
                                                                         @click="imgPickSelect(p.id)"
                                                                         @mouseenter="imgPickFocus = idx + 1">
                                                                        <span class="imgpick-thumb">
                                                                            <img :src="'/api/image-presets/' + p.id + '/image'" :alt="p.name">
                                                                        </span>
                                                                        <span class="imgpick-option-name" x-text="p.name"></span>
                                                                        <span class="check">✓</span>
                                                                    </div>
                                                                </template>
                                                                <template x-if="imagePresets.length === 0">
                                                                    <div class="imgpick-option" style="cursor:default;color:var(--ink-ghost);font-style:italic;">
                                                                        <span class="imgpick-option-name">no icons uploaded — use the Icons tab</span>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                                <div style="margin-bottom:0.6rem;">
                                                    <label style="font-size:10px;color:var(--ink-ghost);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:0.3rem;">Comment</label>
                                                    <textarea x-model="configComment"
                                                              rows="3"
                                                              maxlength="200"
                                                              placeholder="Short description (3 lines max)"
                                                              style="width:100%;background:var(--bg-0);border:1px solid var(--line-2);color:var(--ink);font-family:inherit;font-size:11px;padding:0.4rem 0.6rem;resize:none;"></textarea>
                                                </div>
                                                <button class="btn btn-primary" @click="saveHostConfig()">Save</button>
                                            </div>
                                        </template>
                                    </li>
                                </template>
                            </ul>

                            <template x-if="tokens.length === 0">
                                <div class="empty-state" style="padding: 2rem;">
                                    <p>No hosts registered yet. Add one above.</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Icons tab -->
                    <template x-if="settingsTab === 'icons'">
                        <div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">
                                Upload transparent PNG graphics to identify hosts visually on the dashboard. Assign them per-host in the Hosts tab.
                            </p>

                            <div class="form-row" style="gap:0.5rem;flex-wrap:wrap">
                                <label class="btn btn-primary" style="cursor:pointer;">
                                    Upload graphic
                                    <input type="file" accept="image/*" @change="uploadPreset($event)" style="display:none;">
                                </label>
                                <button class="btn" style="background:var(--bg-2)" @click="exportPresets()" x-show="imagePresets.length > 0">Export ZIP</button>
                                <label class="btn" style="background:var(--bg-2);cursor:pointer;">
                                    Import ZIP
                                    <input type="file" accept=".zip" @change="showImportDialog($event)" style="display:none;">
                                </label>
                            </div>

                            <!-- Import dialog -->
                            <template x-if="importFile">
                                <div style="margin:1rem 0;padding:1rem;border:1px solid var(--accent);border-radius:4px;background:var(--bg-2);max-width:400px">
                                    <p style="font-size:0.875rem;margin-bottom:0.75rem">Importing: <strong x-text="importFile.name"></strong></p>
                                    <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.8125rem;color:var(--ink-dim);margin-bottom:0.75rem;cursor:pointer">
                                        <input type="checkbox" x-model="importOverwrite">
                                        Overwrite existing icons with the same name
                                    </label>
                                    <div style="display:flex;gap:0.5rem">
                                        <button class="btn btn-primary" @click="importPresets()">Import</button>
                                        <button class="btn" @click="importFile=null">Cancel</button>
                                    </div>
                                </div>
                            </template>

                            <ul class="token-list">
                                <template x-for="p in imagePresets" :key="p.id">
                                    <li>
                                        <div style="display:flex;align-items:center;gap:0.75rem;">
                                            <img :src="'/api/image-presets/' + p.id + '/image'" style="width:40px;height:40px;object-fit:contain;border:1px solid var(--line);background:var(--bg-0);">
                                            <span class="hostname" x-text="p.name"></span>
                                            <span class="created" x-text="formatTs(p.created_at)"></span>
                                        </div>
                                        <button class="btn btn-danger" @click="deletePreset(p.id)">Delete</button>
                                    </li>
                                </template>
                            </ul>

                            <template x-if="imagePresets.length === 0">
                                <div class="empty-state" style="padding: 2rem;">
                                    <p>No host icons yet. Upload one above.</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Sharing tab -->
                    <template x-if="settingsTab === 'sharing'">
                        <div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">Read-only dashboard access — no login required.</p>

                            <div class="form-row">
                                <input type="text" x-model="shareLabel" placeholder="label (e.g. ops-team, client-acme)">
                                <select x-model="shareHours">
                                    <option value="24">24 hours</option>
                                    <option value="720">30 days</option>
                                    <option value="8760">1 year</option>
                                    <option value="0">Unlimited</option>
                                </select>
                                <button class="btn btn-primary" @click="createShare()">Create Link</button>
                            </div>

                            <template x-if="newShare">
                                <div class="token-reveal">
                                    <div class="label">Share link for <span x-text="newShare.label || 'guest'"></span></div>
                                    <code x-text="window.location.origin + '/s/' + newShare.token"></code>
                                    <div class="warning">Copy this link now — the token won't be shown again.</div>
                                </div>
                            </template>

                            <ul class="token-list">
                                <template x-for="s in shares" :key="s.id">
                                    <li>
                                        <div>
                                            <span class="hostname" x-text="s.label || 'guest'"></span>
                                            <span class="created" x-text="'expires ' + formatTs(s.expires_at)"></span>
                                        </div>
                                        <button class="btn btn-danger" @click="deleteShare(s.id)">Revoke</button>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>

                    <!-- Ignored tab -->
                    <template x-if="settingsTab === 'ignored'">
                        <div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">
                                Ignored entities are muted on the dashboard and excluded from status counts. Right-click any host, container, or agent on the dashboard to ignore it.
                            </p>

                            <ul class="ignored-list">
                                <template x-for="e in ignoredList" :key="e.id">
                                    <li>
                                        <span class="entity-type" x-text="e.entity_type"></span>
                                        <span class="entity-key" x-text="e.entity_key"></span>
                                        <button class="btn btn-danger" @click="unignoreEntity(e.entity_type, e.entity_key)">Unignore</button>
                                    </li>
                                </template>
                            </ul>

                            <template x-if="ignoredList.length === 0">
                                <div class="empty-state" style="padding: 2rem;">
                                    <p>No ignored entities.</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Config tab -->
                    <template x-if="settingsTab === 'config'">
                        <div>
                            <div class="form-row">
                                <label style="display:flex;align-items:center;gap:0.6rem;font-size:11px;color:var(--ink-dim);">
                                    Heartbeat interval
                                    <input type="number" min="10" max="3600" step="1"
                                           :value="heartbeatInterval"
                                           @change="updateHeartbeatInterval($event.target.value)"
                                           style="width:70px;text-align:right;">
                                    <span style="color:var(--ink-ghost);font-size:10px;">seconds (10–3600)</span>
                                </label>
                            </div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1.5rem;">
                                Agents read this value from the heartbeat response and adapt their reporting cadence automatically.
                            </p>
                            <div class="form-row">
                                <label style="display:flex;align-items:center;gap:0.6rem;font-size:11px;color:var(--ink-dim);">
                                    Card icon size
                                    <input type="range" min="80" max="300" step="10"
                                           :value="cardImgSize"
                                           @input="cardImgSize = parseInt($event.target.value); document.documentElement.style.setProperty('--card-img-size', cardImgSize + 'px'); localStorage.setItem('fleetcom.imgSize', cardImgSize)"
                                           style="width:120px;">
                                    <span style="color:var(--ink-ghost);font-size:10px;" x-text="cardImgSize + 'px'"></span>
                                </label>
                            </div>

                            <template x-if="currentUser && currentUser.role === 'admin'">
                                <div>
                                    <h3 style="margin:2rem 0 1rem;color:var(--ink-dim)">Branding</h3>
                                    <div class="form-row" style="flex-direction:column;gap:0.5rem;max-width:400px">
                                        <label style="font-size:11px;color:var(--ink-dim)">Instance Label</label>
                                        <div style="display:flex;gap:0.5rem">
                                            <input type="text" x-model="configInstanceLabel" placeholder="e.g. BYTEPOETS" style="flex:1">
                                            <button class="btn btn-primary" @click="saveInstanceLabel()">Save</button>
                                        </div>
                                        <label style="font-size:11px;color:var(--ink-dim);margin-top:0.5rem">Org Logo</label>
                                        <div style="display:flex;gap:0.5rem;align-items:center">
                                            <img x-show="orgLogoURL" :src="orgLogoURL" style="height:32px;border-radius:4px">
                                            <input type="file" accept="image/*" @change="uploadOrgLogo($event)" style="font-size:11px">
                                            <button class="btn" x-show="orgLogoURL" style="font-size:0.75rem;padding:0.25rem 0.5rem;background:var(--crit)" @click="deleteOrgLogo()">Remove</button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Account tab -->
                    <template x-if="settingsTab === 'account'">
                        <div>
                            <h3 style="margin-bottom:1rem;color:var(--ink-dim)">Change Password</h3>
                            <div class="form-row" style="flex-direction:column;gap:0.5rem;max-width:360px">
                                <input type="password" x-model="pwCurrent" placeholder="Current password">
                                <input type="password" x-model="pwNew" placeholder="New password (min 6 chars)">

                                          title="Click to copy"></code>

                                </div>

                        </div>
                    </template>

                    <!-- Users tab (admin only) -->
                    <template x-if="settingsTab === 'users'">
                        <div>
                            <h3 style="margin-bottom:1rem;color:var(--ink-dim)">Create User</h3>
                            <div class="form-row" style="gap:0.5rem;flex-wrap:wrap;max-width:600px">
                                <input type="email" x-model="newUserEmail" placeholder="email@example.com" style="flex:2;min-width:200px">
                                <input type="password" x-model="newUserPassword" placeholder="Password (min 6)" style="flex:1;min-width:140px">
                                <select x-model="newUserRole" style="background:var(--bg-card);color:var(--ink);border:1px solid var(--border);border-radius:4px;padding:0.5rem">
                                    <option value="user">User</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <button class="btn btn-primary" @click="createUser()">Add User</button>
                            </div>

                            <h3 style="margin:2rem 0 1rem;color:var(--ink-dim)">Users</h3>
                            <table style="width:100%;border-collapse:collapse;font-size:0.875rem">
                                <thead>
                                    <tr style="border-bottom:1px solid var(--border);text-align:left">
                                        <th style="padding:0.5rem">Email</th>
                                        <th style="padding:0.5rem">Role</th>
                                        <th style="padding:0.5rem">Status</th>
                                        <th style="padding:0.5rem">2FA</th>
                                        <th style="padding:0.5rem">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="u in usersList" :key="u.id">
                                        <tr style="border-bottom:1px solid var(--border)">
                                            <td style="padding:0.5rem" x-text="u.email"></td>
                                            <td style="padding:0.5rem" x-text="u.role"></td>
                                            <td style="padding:0.5rem">
                                                <span :style="'color:' + (u.status === 'active' ? 'var(--ok)' : 'var(--crit)')" x-text="u.status"></span>
                                            </td>
                                            <td style="padding:0.5rem" x-text="u.totp_enabled ? 'Yes' : 'No'"></td>
                                            <td style="padding:0.5rem">
                                                <template x-if="u.id !== currentUser.id">
                                                    <span style="display:flex;gap:0.4rem;flex-wrap:wrap">
                                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem"
                                                                @click="toggleUserStatus(u)"
                                                                x-text="u.status === 'active' ? 'Disable' : 'Activate'"></button>
                                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem"
                                                                @click="setUserPassword(u)">Set Password</button>
                                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem"
                                                                x-show="u.totp_enabled"
                                                                @click="disableUserTOTP(u)">Disable 2FA</button>
                                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem"
                                                                @click="invalidateUserSessions(u)">Kill Sessions</button>
                                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem"
                                                                @click="selectUserForHosts(u)">Hosts</button>
                                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem;background:var(--crit);color:#fff"
                                                                @click="deleteUser(u)">Delete</button>
                                                    </span>
                                                </template>
                                                <template x-if="u.id === currentUser.id">
                                                    <span style="color:var(--ink-dim);font-size:0.75rem">(you)</span>

                                </tbody>
                            </table>

                            <!-- Host access management -->
                            <template x-if="selectedUser">
                                <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border)">
                                    <h3 style="margin-bottom:1rem;color:var(--ink-dim)">
                                        Host Access for <span x-text="selectedUser.email"></span>
                                        <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem;margin-left:0.5rem" @click="selectedUser=null">Close</button>
                                    </h3>
                                    <div style="display:flex;gap:2rem;flex-wrap:wrap">
                                        <div style="flex:1;min-width:200px">
                                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
                                                <h4 style="font-size:0.8125rem;color:var(--ink-dim);margin:0">Granted Hosts</h4>
                                                <button class="btn" style="font-size:0.7rem;padding:0.2rem 0.5rem;background:var(--crit);color:#fff"
                                                        x-show="selectedUserHosts.length > 0"
                                                        @click="revokeAllHostAccess()">Revoke All</button>
                                            </div>
                                            <template x-if="selectedUserHosts.length === 0">
                                                <p style="color:var(--ink-dim);font-size:0.8125rem">No hosts assigned.</p>
                                            </template>
                                            <template x-for="h in selectedUserHosts" :key="h.id">
                                                <div style="display:flex;justify-content:space-between;align-items:center;padding:0.375rem 0;border-bottom:1px solid var(--border)">
                                                    <span style="font-size:0.875rem" x-text="h.hostname"></span>
                                                    <button class="btn" style="font-size:0.7rem;padding:0.2rem 0.4rem;background:var(--crit);color:#fff" @click="revokeHostAccess(h.id)">Revoke</button>
                                                </div>
                                            </template>
                                        </div>
                                        <div style="flex:1;min-width:200px">
                                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
                                                <h4 style="font-size:0.8125rem;color:var(--ink-dim);margin:0">Available Hosts</h4>
                                                <button class="btn btn-primary" style="font-size:0.7rem;padding:0.2rem 0.5rem"
                                                        x-show="availableHosts.length > 0"
                                                        @click="grantAllHostAccess()">Grant All</button>
                                            </div>
                                            <template x-if="availableHosts.length === 0">
                                                <p style="color:var(--ink-dim);font-size:0.8125rem">All hosts granted.</p>
                                            </template>
                                            <template x-for="h in availableHosts" :key="h.id">
                                                <div style="display:flex;justify-content:space-between;align-items:center;padding:0.375rem 0;border-bottom:1px solid var(--border)">
                                                    <span style="font-size:0.875rem" x-text="h.hostname"></span>
                                                    <button class="btn btn-primary" style="font-size:0.7rem;padding:0.2rem 0.4rem" @click="grantHostAccess(h.id)">Grant</button>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template x-if="settingsTab === 'docs'">
                        <div class="docs">
                            <div class="doc-intro">
                                FleetCom collects heartbeats from the <strong>Bosun</strong> agent running on each host. Bosun streams Docker events in real time and pushes enriched heartbeats every 60s. Expand any section below for details.
                            </div>

                            <details class="doc-section" open>
                                <summary>Adding a Host</summary>
                                <div class="doc-body">
                                    <p>Follow these steps to onboard a new host:</p>
                                    <ol class="doc-steps">
                                        <li>Open <strong>Settings → Hosts</strong>, enter a hostname, click <strong>Add Host</strong>.</li>
                                        <li><strong>Copy the bearer token immediately</strong> — it is shown only once and cannot be retrieved later.</li>
                                        <li>Install the Bosun agent on the host using <em>Docker Setup</em> (recommended) or <em>Static Binary</em> below. Pass the token as <code>FLEETCOM_TOKEN</code>.</li>
                                        <li>Bosun starts pushing heartbeats within ~60 s. The host appears on the dashboard with Docker container details.</li>
                                        <li>(Admin) Grant access to other users via <strong>Settings → Users → Hosts</strong>. Admins see all hosts by default; regular users see only what you grant them.</li>
                                    </ol>
                                    <div class="doc-note"><strong>Token lost?</strong> Delete the host in Settings → Hosts and add it again. The old token is invalidated on delete.</div>
                                </div>
                            </details>

                            <details class="doc-section">
                                <summary>Docker Setup (recommended)</summary>
                                <div class="doc-body">
                                    <p>Bosun runs as a container, mounts the Docker socket read-only, and watches the event stream for instant container lifecycle notifications. Works on any host with Docker.</p>
<pre>sudo mkdir -p /opt/fleetcom-bosun

# Create .env with your token
echo "FLEETCOM_TOKEN=your-token-here" | sudo tee /opt/fleetcom-bosun/.env

# Create docker-compose.yml
sudo tee /opt/fleetcom-bosun/docker-compose.yml &lt;&lt;'EOF'
services:
  fleetcom-bosun:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-bosun
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      - FLEETCOM_URL=https://fleet.barta.cm
      - FLEETCOM_HOSTNAME=your-hostname
EOF

cd /opt/fleetcom-bosun
sudo docker compose pull &amp;&amp; sudo docker compose up -d</pre>
                                    <h4>Updating</h4>
                                    <pre>cd /opt/fleetcom-bosun &amp;&amp; sudo docker compose pull &amp;&amp; sudo docker compose up -d</pre>
                                    <h4>Verifying</h4>
                                    <p><code>sudo docker logs -f fleetcom-bosun</code> — should show periodic heartbeat POSTs returning 200.</p>
                                </div>
                            </details>

                            <details class="doc-section">
                                <summary>Static Binary (lightweight hosts)</summary>
                                <div class="doc-body">
                                    <p>For hosts without Docker (Raspberry Pi, embedded, OpenWrt, etc.) — cross-compile the Go agent and run it directly. Single binary, zero dependencies, ~6 MB.</p>
                                    <h4>Cross-compile</h4>
<pre># From your dev machine
GOOS=linux GOARCH=arm GOARM=6 CGO_ENABLED=0 \
  go build -ldflags="-s -w \
    -X main.Version=0.1.0 \
    -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
  -o fleetcom-bosun ./cmd/fleetcom-bosun

scp fleetcom-bosun host:/usr/local/bin/</pre>
                                    <h4>Environment file</h4>
<pre>sudo mkdir -p /etc/fleetcom
sudo tee /etc/fleetcom/env &lt;&lt;'EOF'
FLEETCOM_URL=https://fleet.barta.cm
FLEETCOM_TOKEN=your-token-here
FLEETCOM_HOSTNAME=your-hostname
EOF
sudo chmod 600 /etc/fleetcom/env</pre>
                                    <h4>systemd unit</h4>
                                    <p>Create <code>/etc/systemd/system/fleetcom-bosun.service</code>:</p>
<pre>[Unit]
Description=FleetCom Bosun
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
EnvironmentFile=/etc/fleetcom/env
ExecStart=/usr/local/bin/fleetcom-bosun
Restart=on-failure
RestartSec=10

[Install]
WantedBy=multi-user.target</pre>
<pre>sudo systemctl enable --now fleetcom-bosun</pre>
                                    <h4>Architecture cheat-sheet</h4>
                                    <p>Common <code>GOARCH</code> values: <code>amd64</code> (x86_64), <code>arm64</code> (RPi 4/5, Apple Silicon), <code>arm GOARM=6</code> (RPi Zero/1), <code>arm GOARM=7</code> (RPi 2/3).</p>
                                </div>
                            </details>

                            <details class="doc-section">
                                <summary>AI Agents (optional)</summary>
                                <div class="doc-body">
                                    <p>To report AI agents alongside system data, add <code>FLEETCOM_AGENTS</code> to the agent environment:</p>
<pre>FLEETCOM_AGENTS='[{"name":"Ocean","agent_type":"cto","status":"online"}]'</pre>
                                    <p>Docker: add to <code>environment:</code> in <code>docker-compose.yml</code>. Static binary: add to <code>/etc/fleetcom/env</code>.</p>
                                </div>
                            </details>

                            <details class="doc-section">
                                <summary>User Access &amp; Permissions</summary>
                                <div class="doc-body">
                                    <p><strong>Roles.</strong> <code>admin</code> sees and manages everything. <code>user</code> sees only hosts explicitly granted to them.</p>
                                    <p><strong>Granting host access.</strong> Open <strong>Settings → Users</strong>, click <strong>Hosts</strong> on a user, then <strong>Grant</strong> individual hosts or <strong>Grant All</strong> for everything in the fleet. Use <strong>Revoke All</strong> to reset.</p>
                                    <p><strong>Admin actions per user.</strong> Disable/activate the account, set a new password (kills all their sessions), disable 2FA (forces re-setup on next login), kill active sessions, or delete the user entirely. Deleted users are soft-deleted and can no longer log in.</p>
                                    <div class="doc-note">All users must complete <strong>TOTP 2FA setup</strong> on first login — it is mandatory, not optional.</div>
                                </div>
                            </details>

                            <details class="doc-section">
                                <summary>Agent Versions</summary>
                                <div class="doc-body">
                                    <p>Hosts report their agent version in each heartbeat. The dashboard shows:</p>
                                    <ul style="margin:0.25rem 0 0.5rem 1.1rem;padding:0;font-size:11px;color:var(--ink-ghost);line-height:1.75">
                                        <li><span class="agent-version-badge current" style="display:inline">current</span> — agent matches the expected version.</li>
                                        <li><span class="agent-version-badge outdated" style="display:inline">outdated</span> — older than expected; update recommended.</li>
                                        <li><span class="agent-version-badge legacy" style="display:inline">LEGACY</span> — host still running the old shell-script agent; migrate to Bosun.</li>
                                    </ul>
                                    <p>Expected version: <strong x-text="expectedAgentVersion || 'loading…'"></strong></p>
                                </div>
                            </details>

                            <details class="doc-section">
                                <summary>Troubleshooting</summary>
                                <div class="doc-body">
                                    <h4>Host shows <em>Offline</em> immediately after install</h4>
                                    <p>Check <code>FLEETCOM_URL</code> is reachable from the host (<code>curl -sS $FLEETCOM_URL/healthz</code>) and <code>FLEETCOM_TOKEN</code> matches the one generated in the UI. Docker: <code>sudo docker logs fleetcom-bosun</code>. Systemd: <code>journalctl -u fleetcom-bosun -f</code>.</p>
                                    <h4>Dashboard empty for a regular user</h4>
                                    <p>Grant host access under <strong>Settings → Users → Hosts</strong>. New non-admin users start with no host permissions.</p>
                                    <h4>Can't log in after password change</h4>
                                    <p>Changing or resetting a password invalidates all existing sessions for that user — this is intentional. Log back in with the new password.</p>
                                </div>
                            </details>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Context menu -->
            <template x-if="ctxMenu">
                <div class="ctx-menu" :style="'left:' + ctxMenu.x + 'px;top:' + ctxMenu.y + 'px'" @click.outside="ctxMenu = null">
                    <button x-show="!ctxMenu.ignored" @click="ignoreEntity(ctxMenu.type, ctxMenu.key); ctxMenu = null">
                        Ignore <span x-text="ctxMenu.type"></span>
                    </button>
                    <button x-show="ctxMenu.ignored" @click="unignoreEntity(ctxMenu.type, ctxMenu.key); ctxMenu = null">
                        Unignore <span x-text="ctxMenu.type"></span>
                    </button>
                </div>
            </template>
        </main>

        <footer>
            <div class="footer-inner">
                <span class="brand-f">FleetCom<span class="version" x-text="' v' + (ver.version || '—')"></span></span>
                <span class="sep">&bull;</span>
                <span class="deployed">Deployed <span class="ts" x-text="ver.build_time_display || 'unknown'"></span> <span class="tz" @click="toggleTimezone()" style="cursor:pointer;font-size:8px;" x-text="tzLabel"></span></span>
                <span class="sep">&bull;</span>
                <a class="commit"
                   :href="ver.commit && ver.commit !== 'dev' && ver.commit !== 'unknown'
                          ? 'https://github.com/markus-barta/fleetcom/commit/' + ver.commit
                          : 'https://github.com/markus-barta/fleetcom'"
                   target="_blank" rel="noopener">
                    <i data-lucide="github"></i>
                    <span class="hash" x-text="ver.commit ? ver.commit.substring(0, 7) : 'dev'"></span>
                </a>
                <span class="sep">&bull;</span>
                <a href="/LICENSE" target="_blank" rel="noopener" title="GNU Affero General Public License v3.0">
                    <i data-lucide="scale"></i>
                    <span>AGPL-3.0</span>
                </a>
            </div>
        </footer>
    </div>

    <div class="toast-container" id="toasts"></div>
    <script src="/static/lucide.min.js"></script>
    <script src="/static/alpine.min.js" defer></script>
    <script>
        function fleetcom() {
            return {
                hosts: [],
                tokens: [],
                shares: [],
                shared: false,
                view: 'dashboard',
                viewMode: 'normal',
                newHostname: '',
                newToken: null,
                newShare: null,
                shareLabel: '',
                shareHours: '24',
                es: null,
                ver: { version: '', commit: '', build_time: '', build_time_display: '' },

                // Connection state machine
                connState: 'reconnecting', // 'live' | 'reconnecting' | 'offline'
                lastOkAt: 0,

                // Server config (pushed via SSE)
                heartbeatInterval: 60,
                expectedAgentVersion: '',

                // Clock + tick counter for reactive "seen Xs ago" updates
                clockDate: '',
                clockTime: '',
                tickSec: 0,
                // Timezone: true = UTC, false = local browser time
                useUTC: true,
                // Card image size (px)
                cardImgSize: 170,

                // Which chip is expanded in its card (key = `${type}:${entityKey}`, one at a time globally)
                openChip: null,
                // Settings view — default "hosts" for admins; flipped to "account" on load for non-admins.
                settingsTab: 'hosts',
                // Ignored entities (set from SSE, list for settings tab)
                ignoredSet: {},
                ignoredList: [],
                // Context menu
                ctxMenu: null,
                // Host configs (from SSE)
                hostConfigs: {},
                // Per-host config editing
                configHost: '',
                configComment: '',
                configImageId: null,
                // Image presets
                imagePresets: [],
                // Custom image picker state
                imgPickOpen: false,
                imgPickFocus: -1,
                // Host hardware panel state
                hwOpen: {},
                hardwareCache: {},
                hardwareLoading: {},
                scaleList: ['1min', '15min', '1h', '1d', '14d', '1MO', '1Y'],
                scaleWindow: { '1min': 60, '15min': 900, '1h': 3600, '1d': 86400, '14d': 1209600, '1MO': 2592000, '1Y': 31536000 },
                globalScale: '1h',
                stripRegistry: null,
                // User management
                currentUser: null,
                pwCurrent: '', pwNew: '', pwMsg: '',
                totpSetup: null, totpCode: '', totpDisablePw: '',
                mySessions: [],
                usersList: [],
                newUserEmail: '', newUserPassword: '', newUserRole: 'user',
                selectedUser: null, selectedUserHosts: [], allHostsList: [],
                // Branding
                instanceLabel: '',
                orgLogoURL: '',
                theme: 'dark',
                // Icon import
                importFile: null,
                importOverwrite: false,

                init() {
                    this.viewMode = localStorage.getItem('fleetcom.view') || 'normal';
                    // Migrate legacy values
                    if (this.viewMode === 'overview') this.viewMode = 'normal';
                    this.globalScale = localStorage.getItem('fleetcom.globalScale') || '1h';
                    if (!this.scaleList.includes(this.globalScale)) this.globalScale = '1h';
                    this.useUTC = localStorage.getItem('fleetcom.tz') !== 'local';
                    this.cardImgSize = parseInt(localStorage.getItem('fleetcom.imgSize')) || 170;
                    document.documentElement.style.setProperty('--card-img-size', this.cardImgSize + 'px');
                    this.stripRegistry = new Set();
                    this.startClock();
                    this.loadVersion();
                    this.loadMe();
                    this.initTheme();
                    this.connect();
                    this.startConnWatchdog();
                    this.startStripRefresher();
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') this.kickIfStale();
                    });
                    let resizeT;
                    window.addEventListener('resize', () => {
                        clearTimeout(resizeT);
                        resizeT = setTimeout(() => {
                            for (const c of this.stripRegistry) this.drawStrip(c);
                        }, 150);
                    });
                    // Initialize Lucide icons. Debounced observer handles Alpine
                    // template changes without infinite loops (Lucide replacements
                    // themselves trigger mutations).
                    this.$nextTick(() => lucide.createIcons());
                    let iconTimer;
                    new MutationObserver((mutations) => {
                        // Only re-run if an <i data-lucide> was added (not replaced SVGs)
                        const needsIcons = mutations.some(m =>
                            [...m.addedNodes].some(n => n.nodeType === 1 &&
                                (n.matches?.('i[data-lucide]') || n.querySelector?.('i[data-lucide]'))
                            )
                        );
                        if (!needsIcons) return;

                startStripRefresher() {

                    // Mounted = currently in the DOM (chip expanded or host card visible).
                    setInterval(() => {
                        if (document.visibilityState !== 'visible') return;
                        for (const c of [...this.stripRegistry]) {

                // ---------- clock + timezone ----------
                startClock() {
                    // Clock ticks every 1s for the seconds display in the
                    // header. tickSec ticks every 5s — it's the reactive
                    // dep for "seen Xs ago" / hostStatus / containerUptime,
                    // which Alpine re-evaluates across every host/chip on
                    // each bump. With 60s heartbeats, 5s precision is fine
                    // and 5× cheaper than per-second.
                    const tick = () => {
                        const d = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        if (this.useUTC) {
                            this.clockDate = d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate());
                            this.clockTime = pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
                        } else {
                            this.clockDate = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
                            this.clockTime = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                        }
                    };
                    tick();
                    setInterval(tick, 1000);
                    setInterval(() => { this.tickSec++; }, 5000);
                },

                get tzLabel() {
                    if (this.useUTC) return 'UTC';
                    const off = -(new Date().getTimezoneOffset());
                    const sign = off >= 0 ? '+' : '-';
                    const h = Math.floor(Math.abs(off) / 60);
                    const m = Math.abs(off) % 60;
                    return 'GMT' + sign + h + (m ? ':' + String(m).padStart(2, '0') : '');
                },

                    this.useUTC = !this.useUTC;
                    localStorage.setItem('fleetcom.tz', this.useUTC ? 'utc' : 'local');
