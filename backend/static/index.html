                <path d="M12 3v18"/>
                <path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>
            </symbol>
        </defs>
    </svg>

    <div x-data="fleetcom()" x-init="init()" class="app">
        <header>
            <div class="header-left">
                <div class="brand">FleetCom<span class="tag">TELEMETRY</span></div>
                <div class="conn" :class="'state-' + connState">
                    <span class="dot"></span>
                    <span x-text="connState === 'live' ? 'Live' : (connState === 'reconnecting' ? 'Reconnecting' : 'Offline')"></span>
                </div>
            </div>

            <div class="header-center">
                <div class="clock">
                    <span x-text="clockDate"></span><span class="sep">·</span><span x-text="clockTime"></span><span class="tz">UTC</span>
                </div>
            </div>

            <div class="header-right">
                <div class="view-toggle" x-show="view === 'dashboard'">
                    <button :class="viewMode === 'detail' && 'active'" @click="setViewMode('detail')">Detail</button>
                    <button :class="viewMode === 'compact' && 'active'" @click="setViewMode('compact')">Compact</button>
                </div>
                <nav class="nav" x-show="!shared">
                    <a :class="view === 'dashboard' && 'active'" @click="view = 'dashboard'">Dashboard</a>
                    <a :class="view === 'settings' && 'active'" @click="openSettings()">Settings</a>
                    <a href="/logout">Sign out</a>
                </nav>
                <nav class="nav" x-show="shared">
                    <span class="readonly">Read-only</span>
                </nav>
            </div>
        </header>

        <div class="sub-header" x-show="view === 'dashboard'">
            <div class="sub-header-center">
                <div class="fleet-stat" :class="hostsDown > 0 ? (hostsUp === 0 ? 'state-crit' : 'state-warn') : ''">
                    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="8" x="2" y="2" rx="0.5" ry="0.5"/><rect width="20" height="8" x="2" y="14" rx="0.5" ry="0.5"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/>
                    </svg>
                    <span class="stat-label">Hosts</span>
                    <span class="stat-value"><span x-text="hostsUp"></span><span class="sub">/</span><span x-text="hosts.length"></span></span>
                </div>

                <div class="fleet-stat" :class="totalContainers > 0 && runningContainers < totalContainers ? 'state-warn' : ''">
                    <svg class="stat-icon" viewBox="0 0 24 24">
                        <rect x="2" y="7" width="20" height="10" rx="0.6" ry="0.6" fill="currentColor"/>
                        <path d="M6 9.5v5M10 9.5v5M14 9.5v5M18 9.5v5" stroke="rgba(0,0,0,0.45)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
                    </svg>
                    <span class="stat-label">Containers</span>
                    <span class="stat-value"><span x-text="runningContainers"></span><span class="sub">/</span><span x-text="totalContainers"></span></span>
                </div>

                <div class="fleet-stat" :class="totalAgents > 0 && onlineAgents < totalAgents ? 'state-warn' : ''">
                    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .963L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/>
                    </svg>
                    <span class="stat-label">Agents</span>
                    <span class="stat-value"><span x-text="onlineAgents"></span><span class="sub">/</span><span x-text="totalAgents"></span></span>
                </div>

                <div class="sub-header-sep"></div>

                <div class="global-scale">
                    <span class="gs-label">Scale</span>
                    <button class="strip-scale-btn" x-text="globalScale" @click="cycleGlobalScale()"></button>
                    <button class="strip-ghost-btn" @click="nudgeGlobalScale(-1)" title="Zoom in">&minus;</button>
                    <button class="strip-ghost-btn" @click="nudgeGlobalScale(1)" title="Zoom out">+</button>
                    <button class="strip-ghost-btn revert-btn" @click="resetAllStrips()" title="Reset all strips to global scale">&#x21ba;</button>
                </div>
            </div>
        </div>

        <main>
            <!-- Dashboard view -->
            <template x-if="view === 'dashboard'">
                <div>
                    <div class="view-label" x-show="hosts.length > 0">
                        <span x-text="'Fleet · ' + (viewMode === 'detail' ? 'Detail' : 'Compact')"></span>
                    </div>

                    <template x-if="hosts.length === 0">
                        <div class="empty-state">
                            <h2>No hosts reporting</h2>
                            <p>Go to Hosts to register an agent and receive its bearer token.</p>
                        </div>
                    </template>

                    <!-- DETAIL MODE -->
                    <template x-if="viewMode === 'detail' && hosts.length > 0">
                        <div class="grid">
                            <template x-for="host in hosts" :key="host.hostname">
                                <div class="card"
                                     :class="['state-' + hostStatus(host), isIgnored('host', host.hostname) ? 'is-ignored' : '']"
                                     @contextmenu.prevent="showCtxMenu($event, 'host', host.hostname)">
                                    <div class="card-head">
                                        <div class="card-avatar">
                                            <template x-if="hostConfigs[host.hostname] && hostConfigs[host.hostname].image_preset_id">
                                                <img :src="'/api/image-presets/' + hostConfigs[host.hostname].image_preset_id + '/image'" :alt="host.hostname">
                                            </template>
                                            <template x-if="!hostConfigs[host.hostname] || !hostConfigs[host.hostname].image_preset_id">
                                                <svg class="avatar-placeholder" viewBox="0 0 24 24"><use href="#icon-server"/></svg>
                                            </template>
                                        </div>
                                        <div class="card-head-main">
                                            <div class="card-head-top">
                                                <div class="card-head-left">
                                                    <span class="hostname" x-text="host.hostname"></span>
                                                    <span class="state-pill" x-text="stateLabel(hostStatus(host))"></span>
                                                    <button class="card-gear" @click.stop="openHostConfig(host.hostname)" title="Host settings">
                                                        <svg viewBox="0 0 24 24"><use href="#icon-gear"/></svg>
                                                    </button>
                                                </div>
                                                <div class="card-head-right">
                                                    <div x-text="(host.os || 'unknown') + (host.uptime_seconds ? ' · up ' + formatUptime(host.uptime_seconds) : '')"></div>
                                                    <div class="seen" x-text="'seen ' + formatAgo(host.last_seen)"></div>
                                                </div>
                                            </div>
                                            <template x-if="hostConfigs[host.hostname] && hostConfigs[host.hostname].comment">
                                                <div class="card-comment" x-text="hostConfigs[host.hostname].comment"></div>
                                            </template>
                                        </div>
                                    </div>

                                    <div class="strip-block host-strip" x-init="mountStrip($el, 'host', host.hostname, { kind: 'host' })"></div>

                                    <template x-if="host.containers && host.containers.length > 0">
                                        <div class="card-section">
                                            <div class="card-section-label">
                                                <span>Containers</span><span class="count" x-text="'· ' + countRunning(host.containers) + '/' + host.containers.length"></span>
                                            </div>
                                            <div class="chips" :class="host.containers.length > 8 ? 'dense' : ''">
                                                <template x-for="c in host.containers" :key="c.name">
                                                    <div class="chip chip-container"
                                                         :class="['s-' + containerStatus(c), isChipOpen('container', host.hostname + '/' + c.name) ? 'is-open' : '', isIgnored('container', host.hostname + '/' + c.name) ? 'is-ignored' : '']"
                                                         :title="c.name + ' · ' + c.state"
                                                         @click="toggleChip('container', host.hostname + '/' + c.name)"
                                                         @contextmenu.prevent.stop="showCtxMenu($event, 'container', host.hostname + '/' + c.name)">
                                                        <svg class="crate" viewBox="0 0 24 24"><use href="#icon-container"/></svg>
                                                        <span class="name" x-text="c.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="c in host.containers" :key="'hist-' + c.name">
                                                <template x-if="isChipOpen('container', host.hostname + '/' + c.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'container', host.hostname + '/' + c.name, { kind: 'entity', label: c.name, status: containerStatus(c) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="host.agents && host.agents.length > 0">
                                        <div class="card-section">
                                            <div class="card-section-label">
                                                <span>Agents</span><span class="count" x-text="'· ' + countOnlineAgents(host.agents) + '/' + host.agents.length"></span>
                                            </div>
                                            <div class="chips">
                                                <template x-for="a in host.agents" :key="a.name">
                                                    <div class="chip chip-agent"
                                                         :class="['s-' + agentStatus(a), isChipOpen('agent', host.hostname + '/' + a.name) ? 'is-open' : '', isIgnored('agent', host.hostname + '/' + a.name) ? 'is-ignored' : '']"
                                                         :title="a.name + ' · ' + a.status"
                                                         @click="toggleChip('agent', host.hostname + '/' + a.name)"
                                                         @contextmenu.prevent.stop="showCtxMenu($event, 'agent', host.hostname + '/' + a.name)">
                                                        <svg class="spark" viewBox="0 0 24 24"><use href="#icon-sparkles"/></svg>
                                                        <span class="name" x-text="a.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                            <template x-for="a in host.agents" :key="'hist-' + a.name">
                                                <template x-if="isChipOpen('agent', host.hostname + '/' + a.name)">
                                                    <div class="strip-block" x-init="mountStrip($el, 'agent', host.hostname + '/' + a.name, { kind: 'entity', label: a.name, status: agentStatus(a) })"></div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="(!host.containers || host.containers.length === 0) && (!host.agents || host.agents.length === 0)">
                                        <div class="card-empty">No containers or agents reported</div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- COMPACT MODE -->
                    <template x-if="viewMode === 'compact' && hosts.length > 0">
                        <table class="fleet-table">
                            <thead>
                                <tr>
                                    <th class="col-state"></th>
                                    <th>Host</th>
                                    <th>State</th>
                                    <th>OS</th>
                                    <th>Uptime</th>
                                    <th>Seen</th>
                                    <th>Containers</th>
                                    <th>Agents</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="host in hosts" :key="host.hostname">
                                    <tr :class="'row-' + hostStatus(host)">
                                        <td class="col-state"><span class="dot"></span></td>
                                        <td class="col-host" x-text="host.hostname"></td>
                                        <td x-text="stateLabel(hostStatus(host))"></td>
                                        <td x-text="host.os || '—'"></td>
                                        <td x-text="formatUptime(host.uptime_seconds) || '—'"></td>
                                        <td x-text="formatAgo(host.last_seen)"></td>
                                        <td>
                                            <template x-if="host.containers && host.containers.length > 0">
                                                <div class="bar-strip">
                                                    <template x-for="c in host.containers" :key="c.name">
                                                        <span class="bar" :class="'s-' + containerStatus(c)" :data-name="c.name + ' · ' + c.state"></span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template x-if="!host.containers || host.containers.length === 0">
                                                <span class="bar-strip"><span class="none">—</span></span>
                                            </template>
                                        </td>
                                        <td>
                                            <template x-if="host.agents && host.agents.length > 0">
                                                <div class="bar-strip">
                                                    <template x-for="a in host.agents" :key="a.name">
                                                        <span class="bar" :class="'s-' + agentStatus(a)" :data-name="a.name + ' · ' + a.status"></span>
                                                    </template>
                                                </div>
                                            </template>
                                            <template x-if="!host.agents || host.agents.length === 0">
                                                <span class="bar-strip"><span class="none">—</span></span>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                </div>
            </template>

            <!-- Settings view -->
            <template x-if="view === 'settings'">
                <div class="admin-panel">
                    <div class="settings-tabs">
                        <button class="settings-tab" :class="settingsTab === 'hosts' && 'active'" @click="settingsTab = 'hosts'; loadTokens(); loadImagePresets()">Hosts</button>
                        <button class="settings-tab" :class="settingsTab === 'presets' && 'active'" @click="settingsTab = 'presets'; loadImagePresets()">Presets</button>
                        <button class="settings-tab" :class="settingsTab === 'sharing' && 'active'" @click="settingsTab = 'sharing'; loadShares()">Sharing</button>
                        <button class="settings-tab" :class="settingsTab === 'ignored' && 'active'" @click="settingsTab = 'ignored'; loadIgnoredList()">Ignored</button>
                        <button class="settings-tab" :class="settingsTab === 'config' && 'active'" @click="settingsTab = 'config'">Config</button>
                    </div>

                    <!-- Hosts tab -->
                    <template x-if="settingsTab === 'hosts'">
                        <div>
                            <div class="form-row">
                                <input type="text" x-model="newHostname" placeholder="hostname (e.g. dsc0)" @keydown.enter="addHost()">
                                <button class="btn btn-primary" @click="addHost()">Add Host</button>
                            </div>

                            <template x-if="newToken">
                                <div class="token-reveal">
                                    <div class="label">Agent token for <span x-text="newToken.hostname"></span></div>
                                    <code x-text="newToken.token"></code>
                                    <div class="warning">Copy this token now — it won't be shown again.</div>
                                </div>
                            </template>

                            <ul class="token-list">
                                <template x-for="t in tokens" :key="t.hostname">
                                    <li style="flex-wrap:wrap;">
                                        <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
                                            <div>
                                                <span class="hostname" x-text="t.hostname"></span>
                                                <span class="created" x-text="t.created_at"></span>
                                            </div>
                                            <div style="display:flex;gap:0.4rem;">
                                                <button class="btn" @click="configHost === t.hostname ? configHost = '' : openHostConfig(t.hostname)" x-text="configHost === t.hostname ? 'Close' : 'Configure'"></button>
                                                <button class="btn btn-danger" @click="removeHost(t.hostname)">Remove</button>
                                            </div>
                                        </div>
                                        <template x-if="configHost === t.hostname">
                                            <div style="width:100%;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--line);">
                                                <div style="display:flex;gap:1rem;margin-bottom:0.6rem;">
                                                    <label style="font-size:10px;color:var(--ink-ghost);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;">Image</label>
                                                    <select style="background:var(--bg-0);border:1px solid var(--line-2);color:var(--ink);font-family:inherit;font-size:11px;padding:2px 6px;"
                                                            x-model.number="configImageId"
                                                            @change="saveHostConfig()">
                                                        <option :value="null">None</option>
                                                        <template x-for="p in imagePresets" :key="p.id">
                                                            <option :value="p.id" x-text="p.name"></option>
                                                        </template>
                                                    </select>
                                                    <template x-if="configImageId">
                                                        <img :src="'/api/image-presets/' + configImageId + '/image'" style="width:32px;height:32px;object-fit:contain;border:1px solid var(--line);">
                                                    </template>
                                                </div>
                                                <div>
                                                    <label style="font-size:10px;color:var(--ink-ghost);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:0.3rem;">Comment</label>
                                                    <textarea x-model="configComment"
                                                              @input="saveHostConfig()"
                                                              rows="3"
                                                              maxlength="200"
                                                              placeholder="Short description (3 lines max)"
                                                              style="width:100%;background:var(--bg-0);border:1px solid var(--line-2);color:var(--ink);font-family:inherit;font-size:11px;padding:0.4rem 0.6rem;resize:none;"></textarea>
                                                </div>
                                            </div>
                                        </template>
                                    </li>
                                </template>
                            </ul>

                            <template x-if="tokens.length === 0">
                                <div class="empty-state" style="padding: 2rem;">
                                    <p>No hosts registered yet. Add one above.</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Presets tab -->
                    <template x-if="settingsTab === 'presets'">
                        <div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">
                                Upload 50×50 transparent PNG images to identify hosts visually. Assign them per-host in the Hosts tab.
                            </p>

                            <div class="form-row">
                                <label class="btn btn-primary" style="cursor:pointer;">
                                    Upload image
                                    <input type="file" accept="image/*" @change="uploadPreset($event)" style="display:none;">
                                </label>
                            </div>

                            <ul class="token-list">
                                <template x-for="p in imagePresets" :key="p.id">
                                    <li>
                                        <div style="display:flex;align-items:center;gap:0.75rem;">
                                            <img :src="'/api/image-presets/' + p.id + '/image'" style="width:40px;height:40px;object-fit:contain;border:1px solid var(--line);background:var(--bg-0);">
                                            <span class="hostname" x-text="p.name"></span>
                                            <span class="created" x-text="p.created_at"></span>
                                        </div>
                                        <button class="btn btn-danger" @click="deletePreset(p.id)">Delete</button>
                                    </li>
                                </template>
                            </ul>

                            <template x-if="imagePresets.length === 0">
                                <div class="empty-state" style="padding: 2rem;">
                                    <p>No image presets yet. Upload one above.</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Sharing tab -->
                    <template x-if="settingsTab === 'sharing'">
                        <div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">Read-only dashboard access — no login required.</p>

                            <div class="form-row">
                                <input type="text" x-model="shareLabel" placeholder="label (e.g. David)">
                                <select x-model="shareHours">
                                    <option value="24">24 hours</option>
                                    <option value="48">2 days</option>
                                    <option value="72">3 days</option>
                                    <option value="168">7 days</option>
                                </select>
                                <button class="btn btn-primary" @click="createShare()">Create Link</button>
                            </div>

                            <template x-if="newShare">
                                <div class="token-reveal">
                                    <div class="label">Share link for <span x-text="newShare.label || 'guest'"></span></div>
                                    <code x-text="window.location.origin + '/s/' + newShare.token"></code>
                                    <div class="warning">Copy this link now — the token won't be shown again.</div>
                                </div>
                            </template>

                            <ul class="token-list">
                                <template x-for="s in shares" :key="s.id">
                                    <li>
                                        <div>
                                            <span class="hostname" x-text="s.label || 'guest'"></span>
                                            <span class="created" x-text="'expires ' + s.expires_at"></span>
                                        </div>
                                        <button class="btn btn-danger" @click="deleteShare(s.id)">Revoke</button>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>

                    <!-- Ignored tab -->
                    <template x-if="settingsTab === 'ignored'">
                        <div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em; margin-bottom: 1rem;">
                                Ignored entities are muted on the dashboard and excluded from status counts. Right-click any host, container, or agent on the dashboard to ignore it.
                            </p>

                            <ul class="ignored-list">
                                <template x-for="e in ignoredList" :key="e.id">
                                    <li>
                                        <span class="entity-type" x-text="e.entity_type"></span>
                                        <span class="entity-key" x-text="e.entity_key"></span>
                                        <button class="btn btn-danger" @click="unignoreEntity(e.entity_type, e.entity_key)">Unignore</button>
                                    </li>
                                </template>
                            </ul>

                            <template x-if="ignoredList.length === 0">
                                <div class="empty-state" style="padding: 2rem;">
                                    <p>No ignored entities.</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Config tab -->
                    <template x-if="settingsTab === 'config'">
                        <div>
                            <div class="form-row">
                                <label style="display:flex;align-items:center;gap:0.6rem;font-size:11px;color:var(--ink-dim);">
                                    Heartbeat interval
                                    <input type="number" min="10" max="3600" step="1"
                                           :value="heartbeatInterval"
                                           @change="updateHeartbeatInterval($event.target.value)"
                                           style="width:70px;text-align:right;">
                                    <span style="color:var(--ink-ghost);font-size:10px;">seconds (10–3600)</span>
                                </label>
                            </div>
                            <p style="color: var(--ink-ghost); font-size: 10px; letter-spacing: 0.04em;">
                                Agents read this value from the heartbeat response and adapt their reporting cadence automatically.
                            </p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Context menu -->
            <template x-if="ctxMenu">
                <div class="ctx-menu" :style="'left:' + ctxMenu.x + 'px;top:' + ctxMenu.y + 'px'" @click.outside="ctxMenu = null">
                    <button x-show="!ctxMenu.ignored" @click="ignoreEntity(ctxMenu.type, ctxMenu.key); ctxMenu = null">
                        Ignore <span x-text="ctxMenu.type"></span>
                    </button>
                    <button x-show="ctxMenu.ignored" @click="unignoreEntity(ctxMenu.type, ctxMenu.key); ctxMenu = null">
                        Unignore <span x-text="ctxMenu.type"></span>
                    </button>
                </div>
            </template>
        </main>

        <footer>
            <div class="footer-inner">
                <span class="brand-f">FleetCom<span class="version" x-text="' v' + (ver.version || '—')"></span></span>
                <span class="sep">&bull;</span>
                <span class="deployed">Deployed <span class="ts" x-text="ver.build_time_display || 'unknown'"></span></span>
                <span class="sep">&bull;</span>
                <a class="commit"
                   :href="ver.commit && ver.commit !== 'dev' && ver.commit !== 'unknown'
                          ? 'https://github.com/markus-barta/fleetcom/commit/' + ver.commit
                          : 'https://github.com/markus-barta/fleetcom'"
                   target="_blank" rel="noopener">
                    <svg><use href="#icon-github"/></svg>
                    <span class="hash" x-text="ver.commit ? ver.commit.substring(0, 7) : 'dev'"></span>
                </a>
                <span class="sep">&bull;</span>
                <a href="/LICENSE" target="_blank" rel="noopener" title="GNU Affero General Public License v3.0">
                    <svg><use href="#icon-scale"/></svg>
                    <span>AGPL-3.0</span>
                </a>
            </div>
        </footer>
    </div>

    <script src="/static/alpine.min.js" defer></script>
    <script>
        function fleetcom() {
            return {
                hosts: [],
                tokens: [],
                shares: [],
                shared: false,
                view: 'dashboard',
                viewMode: 'detail',
                newHostname: '',
                newToken: null,
                newShare: null,
                shareLabel: '',
                shareHours: '24',
                es: null,
                ver: { version: '', commit: '', build_time: '', build_time_display: '' },

                // Connection state machine
                connState: 'reconnecting', // 'live' | 'reconnecting' | 'offline'
                lastOkAt: 0,

                // Server config (pushed via SSE)
                heartbeatInterval: 60,

                // Clock + tick counter for reactive "seen Xs ago" updates
                clockDate: '',
                clockTime: '',
                tickSec: 0,

                // Which chip is expanded in its card (key = `${type}:${entityKey}`, one at a time globally)
                openChip: null,
                // Settings view
                settingsTab: 'hosts',
                // Ignored entities (set from SSE, list for settings tab)
                ignoredSet: {},
                ignoredList: [],
                // Context menu
                ctxMenu: null,
                // Host configs (from SSE)
                hostConfigs: {},
                // Per-host config editing
                configHost: '',
                configComment: '',
                configImageId: null,
                // Image presets
                imagePresets: [],
                scaleList: ['1min', '15min', '1h', '1d', '14d', '1MO', '1Y'],
                scaleWindow: { '1min': 60, '15min': 900, '1h': 3600, '1d': 86400, '14d': 1209600, '1MO': 2592000, '1Y': 31536000 },
                globalScale: '1h',
                stripRegistry: null,

                init() {
                    this.viewMode = localStorage.getItem('fleetcom.view') || 'detail';
                    this.globalScale = localStorage.getItem('fleetcom.globalScale') || '1h';
                    if (!this.scaleList.includes(this.globalScale)) this.globalScale = '1h';
                    this.stripRegistry = new Set();
                    this.startClock();
                    this.loadVersion();
                    this.connect();
                    this.startConnWatchdog();
                    this.startStripRefresher();
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') this.kickIfStale();
                    });
                    let resizeT;
                    window.addEventListener('resize', () => {
                        clearTimeout(resizeT);
                        resizeT = setTimeout(() => {
                            for (const c of this.stripRegistry) this.drawStrip(c);
                        }, 150);
                    });
                },

                startStripRefresher() {
                    // Refetch every mounted strip every 60s and prune orphaned ones.
                    // Mounted = currently in the DOM (chip expanded or host card visible).
                    setInterval(() => {
                        if (document.visibilityState !== 'visible') return;
                        for (const c of [...this.stripRegistry]) {
                            if (!c.el.isConnected) {
                                this.stripRegistry.delete(c);
                            } else {
                                this.fetchStrip(c);
                            }
                        }
                    }, 60000);
                },

                setViewMode(m) {
                    this.viewMode = m;
                    localStorage.setItem('fleetcom.view', m);
                },

                // ---------- clock ----------
                startClock() {
                    const tick = () => {
                        const d = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        this.clockDate = d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate());
                        this.clockTime = pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
                        // Lightweight tick counter — only "seen Xs ago" and hostStatus
                        // bindings re-evaluate. No hosts array clone needed.
                        this.tickSec++;
                    };
                    tick();
                    setInterval(tick, 1000);
                },

                // ---------- version ----------
                async loadVersion() {
                    try {
                        const res = await fetch('/api/version');
                        if (!res.ok) return;
                        const v = await res.json();
                        v.build_time_display = this.formatBuildTime(v.build_time);
                        this.ver = v;
                    } catch (_) {}
                },

                formatBuildTime(iso) {
                    if (!iso || iso === 'unknown') return 'unknown';
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return iso;
                    const pad = n => String(n).padStart(2, '0');
                    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                },

                // ---------- SSE connection ----------
                connect() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    if (m) this.shared = true;
                    this.openStream();
                },

                streamURL() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    return m ? ('/s/' + m[1] + '/events') : '/api/events';
                },

                openStream() {
                    if (this.es) {
                        try { this.es.close(); } catch (_) {}
                    }
                    try {
                        this.es = new EventSource(this.streamURL());
                    } catch (e) {
                        console.warn('EventSource construction failed', e);
                        return;
                    }

                    this.es.addEventListener('config', (e) => {
                        try {
                            const cfg = JSON.parse(e.data);
                            if (cfg.heartbeat_interval) this.heartbeatInterval = cfg.heartbeat_interval;
                        } catch (_) {}
                    });

                    this.es.addEventListener('ignored', (e) => {
                        try {
                            this.ignoredSet = JSON.parse(e.data) || {};
                        } catch (_) {}
                    });

                    this.es.addEventListener('host-configs', (e) => {
                        try {
                            this.hostConfigs = JSON.parse(e.data) || {};
                        } catch (_) {}
                    });

                    this.es.addEventListener('hosts', (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            this.hosts = data || [];
                            this.lastOkAt = Date.now();
                        } catch (err) {
                            console.warn('hosts event parse error', err);
                        }
                    });

                    this.es.onopen = () => {
                        this.lastOkAt = Date.now();
                        this.connState = 'live';
                    };

                    // Intentionally NOT flipping connState in onerror — browser
                    // auto-reconnects, watchdog decides the UI state with grace period.
                    this.es.onerror = () => { /* watchdog handles it */ };
                },

                // Poll readyState — hides brief reconnects, surfaces real outages.
                //
                // Thresholds (relative to lastOkAt):
                //   <  5 s   -> stay LIVE (grace window; absorbs Cloudflare reconnects)
                //   <  75 s  -> RECONNECTING (server pings every 30s; allow 2x miss)
                //   >= 75 s  -> OFFLINE + force a fresh EventSource if stuck in CLOSED
                startConnWatchdog() {
                    setInterval(() => {
                        const rs = this.es ? this.es.readyState : 2;
                        const now = Date.now();

                        if (rs === 1) {
                            this.lastOkAt = now;
                            this.connState = 'live';
                            return;
                        }

                        const downFor = now - (this.lastOkAt || now);
                        if (downFor < 5000) {
                            this.connState = 'live';
                        } else if (downFor < 75000) {
                            this.connState = 'reconnecting';
                        } else {
                            this.connState = 'offline';
                            if (rs === 2) this.openStream();
                        }
                    }, 1000);
                },

                kickIfStale() {
                    const rs = this.es ? this.es.readyState : 2;
                    if (rs !== 1) this.openStream();
                },

                // ---------- admin ----------
                async loadTokens() {
                    const res = await fetch('/api/tokens');
                    if (res.ok) this.tokens = await res.json() || [];
                },

                async addHost() {
                    const hostname = this.newHostname.trim();
                    if (!hostname) return;
                    const res = await fetch('/api/hosts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ hostname })
                    });
                    if (res.ok) {
                        this.newToken = await res.json();
                        this.newHostname = '';
                        this.loadTokens();
                    }
                },

                // ---------- settings ----------
                async updateHeartbeatInterval(val) {
                    const n = parseInt(val);
                    if (isNaN(n) || n < 10 || n > 3600) return;
                    try {
                        const res = await fetch('/api/settings', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ heartbeat_interval: n })
                        });
                        if (res.ok) {
                            const cfg = await res.json();
                            this.heartbeatInterval = cfg.heartbeat_interval;
                        }
                    } catch (_) {}
                },

                // ---------- settings navigation ----------
                openSettings() {
                    this.view = 'settings';
                    if (this.settingsTab === 'hosts') this.loadTokens();
                    else if (this.settingsTab === 'sharing') this.loadShares();
                    else if (this.settingsTab === 'ignored') this.loadIgnoredList();
                },

                // ---------- ignored entities ----------
                isIgnored(entityType, entityKey) {
                    return !!this.ignoredSet[entityType + ':' + entityKey];
                },

                async ignoreEntity(entityType, entityKey) {
                    try {
                        await fetch('/api/ignore', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ entity_type: entityType, entity_key: entityKey })
                        });
                    } catch (_) {}
                },

                async unignoreEntity(entityType, entityKey) {
                    try {
                        await fetch('/api/ignore?entity_type=' + encodeURIComponent(entityType) + '&entity_key=' + encodeURIComponent(entityKey), {
                            method: 'DELETE'
                        });
                    } catch (_) {}
                    // Also refresh the list if we're on the ignored tab
                    if (this.settingsTab === 'ignored') this.loadIgnoredList();
                },

                async loadIgnoredList() {
                    try {
                        const res = await fetch('/api/ignored');
                        if (res.ok) this.ignoredList = await res.json() || [];
                    } catch (_) {}
                },

                // ---------- context menu ----------
                showCtxMenu(event, entityType, entityKey) {
                    const x = Math.min(event.clientX, window.innerWidth - 180);
                    const y = Math.min(event.clientY, window.innerHeight - 50);
                    this.ctxMenu = {
                        x, y,
                        type: entityType,
                        key: entityKey,
                        ignored: this.isIgnored(entityType, entityKey)
                    };
                },

                // ---------- host config ----------
                openHostConfig(hostname) {
                    this.view = 'settings';
                    this.settingsTab = 'hosts';
                    this.configHost = hostname;
                    const cfg = this.hostConfigs[hostname] || {};
                    this.configComment = cfg.comment || '';
                    this.configImageId = cfg.image_preset_id || null;
                    this.loadTokens();
                    this.loadImagePresets();
                },

                async saveHostConfig() {
                    if (!this.configHost) return;
                    try {
                        await fetch('/api/host-config', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                hostname: this.configHost,
                                image_preset_id: this.configImageId || null,
                                comment: this.configComment
                            })
                        });
                    } catch (_) {}
                },

                // ---------- image presets ----------
                async loadImagePresets() {
                    try {
                        const res = await fetch('/api/image-presets');
                        if (res.ok) this.imagePresets = await res.json() || [];
                    } catch (_) {}
                },

                async uploadPreset(ev) {
                    const input = ev.target;
                    if (!input.files || !input.files[0]) return;
                    const file = input.files[0];
                    const name = prompt('Preset name:', file.name.replace(/\.[^.]+$/, ''));
                    if (!name) { input.value = ''; return; }
                    const form = new FormData();
                    form.append('name', name);
                    form.append('file', file);
                    try {
                        await fetch('/api/image-presets', { method: 'POST', body: form });
                        this.loadImagePresets();
                    } catch (_) {}
                    input.value = '';
                },

                async deletePreset(id) {
                    if (!confirm('Delete this image preset?')) return;
                    try {
                        await fetch('/api/image-presets/' + id, { method: 'DELETE' });
                        this.loadImagePresets();
                    } catch (_) {}
                },

                // ---------- chip expand state ----------
                toggleChip(type, entityKey) {
                    const key = type + ':' + entityKey;
                    this.openChip = (this.openChip === key) ? null : key;
                },

                isChipOpen(type, entityKey) {
                    return this.openChip === (type + ':' + entityKey);
                },

                // ---------- global scale controls ----------
                effectiveScale(ctrl) {
                    return ctrl.scaleOverride || this.globalScale;
                },

                cycleGlobalScale() {
                    const idx = this.scaleList.indexOf(this.globalScale);
                    this.globalScale = this.scaleList[(idx + 1) % this.scaleList.length];
                    localStorage.setItem('fleetcom.globalScale', this.globalScale);
                    this.propagateGlobalScale();
                },

                nudgeGlobalScale(dir) {
                    const idx = this.scaleList.indexOf(this.globalScale);
                    const next = idx + dir;
                    if (next < 0 || next >= this.scaleList.length) return;
                    this.globalScale = this.scaleList[next];
                    localStorage.setItem('fleetcom.globalScale', this.globalScale);
                    this.propagateGlobalScale();
                },

                propagateGlobalScale() {
                    for (const c of this.stripRegistry) {
                        if (!c.scaleOverride) {
                            this.updateStripScale(c, this.globalScale);
                        }
                    }
                },

                resetAllStrips() {
                    for (const c of this.stripRegistry) {
                        if (c.scaleOverride) {
                            c.scaleOverride = null;
                            this.updateStripScale(c, this.globalScale);
                            if (c.revertBtn) c.revertBtn.classList.add('hidden');
                            if (c.scaleBtn) {
                                c.scaleBtn.classList.remove('has-override');
                            }
                        }
                    }
                },

                // ---------- history strips (canvas, imperative) ----------
                mountStrip(el, type, entityKey, opts) {
                    if (el._stripCtrl) return;
                    opts = opts || {};
                    const ctrl = {
                        el, type, key: entityKey,
                        scaleOverride: null,
                        scaleBtn: null,
                        revertBtn: null,
                        meta: null,
                        canvas: null,
                        data: null,
                    };

                    // Lead element: "UPTIME" prefix for host, status-dot+name for entities.
                    if (opts.kind === 'host') {
                        const prefix = document.createElement('span');
                        prefix.className = 'strip-prefix';
                        prefix.textContent = 'UPTIME';
                        el.appendChild(prefix);
                    } else {
                        const ctx = document.createElement('span');
                        ctx.className = 'strip-context s-' + (opts.status || 'dead');
                        const dot = document.createElement('span');
                        dot.className = 'ctx-dot';
                        ctx.appendChild(dot);
                        const name = document.createElement('span');
                        name.className = 'ctx-name';
                        name.textContent = opts.label || entityKey;
                        ctx.appendChild(name);
                        el.appendChild(ctx);
                    }

                    // Scale controls
                    const controls = document.createElement('span');
                    controls.className = 'strip-controls';

                    const scaleBtn = document.createElement('button');
                    scaleBtn.type = 'button';
                    scaleBtn.className = 'strip-scale-btn';
                    scaleBtn.textContent = this.effectiveScale(ctrl);
                    scaleBtn.addEventListener('click', () => {
                        // Cycle through scales for this strip (creates override)
                        const curScale = this.effectiveScale(ctrl);
                        const idx = this.scaleList.indexOf(curScale);
                        const nextScale = this.scaleList[(idx + 1) % this.scaleList.length];
                        ctrl.scaleOverride = nextScale;
                        scaleBtn.classList.add('has-override');
                        revertBtn.classList.remove('hidden');
                        this.updateStripScale(ctrl, nextScale);
                    });
                    ctrl.scaleBtn = scaleBtn;
                    controls.appendChild(scaleBtn);

                    const minusBtn = document.createElement('button');
                    minusBtn.type = 'button';
                    minusBtn.className = 'strip-ghost-btn';
                    minusBtn.innerHTML = '&minus;';
                    minusBtn.title = 'Zoom in (shorter window)';
                    minusBtn.addEventListener('click', () => {
                        const curScale = this.effectiveScale(ctrl);
                        const idx = this.scaleList.indexOf(curScale);
                        if (idx <= 0) return;
                        const nextScale = this.scaleList[idx - 1];
                        ctrl.scaleOverride = nextScale;
                        scaleBtn.classList.add('has-override');
                        revertBtn.classList.remove('hidden');
                        this.updateStripScale(ctrl, nextScale);
                    });
                    controls.appendChild(minusBtn);

                    const plusBtn = document.createElement('button');
                    plusBtn.type = 'button';
                    plusBtn.className = 'strip-ghost-btn';
                    plusBtn.textContent = '+';
                    plusBtn.title = 'Zoom out (longer window)';
                    plusBtn.addEventListener('click', () => {
                        const curScale = this.effectiveScale(ctrl);
                        const idx = this.scaleList.indexOf(curScale);
                        if (idx >= this.scaleList.length - 1) return;
                        const nextScale = this.scaleList[idx + 1];
                        ctrl.scaleOverride = nextScale;
                        scaleBtn.classList.add('has-override');
                        revertBtn.classList.remove('hidden');
                        this.updateStripScale(ctrl, nextScale);
                    });
                    controls.appendChild(plusBtn);

                    const revertBtn = document.createElement('button');
                    revertBtn.type = 'button';
                    revertBtn.className = 'strip-ghost-btn revert-btn hidden';
                    revertBtn.innerHTML = '&#x21ba;';
                    revertBtn.title = 'Revert to global scale';
                    revertBtn.addEventListener('click', () => {
                        ctrl.scaleOverride = null;
                        scaleBtn.classList.remove('has-override');
                        revertBtn.classList.add('hidden');
                        this.updateStripScale(ctrl, this.globalScale);
                    });
                    ctrl.revertBtn = revertBtn;
                    controls.appendChild(revertBtn);

                    el.appendChild(controls);

                    const canvas = document.createElement('canvas');
                    canvas.className = 'strip-canvas';
                    ctrl.canvas = canvas;
                    canvas.addEventListener('mousemove', (e) => this.onStripHover(e, ctrl));
                    canvas.addEventListener('mouseleave', () => this.hideStripTooltip());
                    el.appendChild(canvas);

                    const meta = document.createElement('span');
                    meta.className = 'strip-meta';
                    ctrl.meta = meta;
                    el.appendChild(meta);

                    el._stripCtrl = ctrl;
                    this.stripRegistry.add(ctrl);
                    this.fetchStrip(ctrl);
                },

                updateStripScale(ctrl, scale) {
                    if (ctrl.scaleBtn) ctrl.scaleBtn.textContent = scale;
                    this.fetchStrip(ctrl);
                },

                async fetchStrip(ctrl) {
                    const scale = this.effectiveScale(ctrl);
                    const url = '/api/history?entity_type=' + encodeURIComponent(ctrl.type)
                        + '&entity_key=' + encodeURIComponent(ctrl.key)
                        + '&scale=' + scale;
                    try {
                        const res = await fetch(url);
                        if (!res.ok) return;
                        const json = await res.json();
                        ctrl.data = json;
                        this.drawStrip(ctrl);
                    } catch (_) {}
                },

                drawStrip(ctrl) {
                    const canvas = ctrl.canvas;
                    if (!canvas || !canvas.isConnected) return;
                    const dpr = window.devicePixelRatio || 1;
                    const cssW = canvas.clientWidth || 200;
                    const cssH = canvas.clientHeight || 12;
                    if (canvas.width !== Math.round(cssW * dpr) || canvas.height !== Math.round(cssH * dpr)) {
                        canvas.width = Math.round(cssW * dpr);
                        canvas.height = Math.round(cssH * dpr);
                    }
                    const ctx = canvas.getContext('2d');
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.fillStyle = '#0a0d10';
                    ctx.fillRect(0, 0, cssW, cssH);

                    const data = ctrl.data;
                    if (!data || !data.buckets) {
                        if (ctrl.meta) ctrl.meta.textContent = 'loading…';
                        return;
                    }

                    const buckets = data.buckets;
                    const n = buckets.length || 60;
                    const windowSec = data.window_seconds;
                    const cellW = cssW / n;

                    let coverageSec = 0;
                    if (data.first_sample) {
                        const t = new Date(data.first_sample).getTime();
                        if (!isNaN(t)) {
                            coverageSec = Math.min(windowSec, Math.max(0, (Date.now() - t) / 1000));
                        }
                    }

                    // "Before tracking" zone — render as faint hatched dead area
                    let coverStartIdx = n;
                    if (coverageSec > 0 && windowSec > 0) {
                        const ratio = coverageSec / windowSec;
                        coverStartIdx = Math.floor(n * (1 - ratio));
                    }
                    if (coverStartIdx > 0) {
                        ctx.fillStyle = '#13171b';
                        ctx.fillRect(0, 0, coverStartIdx * cellW, cssH);
                    }

                    const colors = { ok: '#3ddc97', warn: '#ffb84d', crit: '#ff4d6d', dead: '#5a6068' };
                    for (let i = 0; i < n; i++) {
                        if (i < coverStartIdx) continue;
                        const b = buckets[i];
                        const status = b ? b.s : 'none';
                        const x = Math.floor(i * cellW);
                        const w = Math.max(1, Math.floor((i + 1) * cellW) - x - (cellW > 2 ? 1 : 0));
                        if (status === 'none') {
                            ctx.fillStyle = '#2a1518';
                            ctx.fillRect(x, 1, w, cssH - 2);
                            continue;
                        }
                        const color = colors[status];
                        if (!color) continue;
                        ctx.fillStyle = color;
                        ctx.fillRect(x, 1, w, cssH - 2);
                    }

                    // "now" marker on the right edge
                    ctx.fillStyle = 'rgba(232, 230, 223, 0.5)';
                    ctx.fillRect(cssW - 1, 0, 1, cssH);

                    if (ctrl.meta) {
                        ctrl.meta.classList.remove('fresh', 'complete');
                        if (!data.first_sample) {
                            ctrl.meta.textContent = '—';
                        } else if (coverageSec >= windowSec - 1) {
                            let ok = 0, total = 0;
                            for (const b of buckets) {
                                if (!b || b.s === 'none') continue;
                                total++;
                                if (b.s === 'ok') ok++;
                            }
                            const pct = total > 0 ? Math.round(100 * ok / total) : 0;
                            ctrl.meta.textContent = pct + '% ok';
                            if (pct >= 100) ctrl.meta.classList.add('complete');
                        } else {
                            ctrl.meta.textContent = this.humanDur(coverageSec) + '/' + this.humanDur(windowSec);
                            ctrl.meta.classList.add('fresh');
                        }
                    }
                },

                humanDur(sec) {
                    if (sec < 60) return Math.max(1, Math.round(sec)) + 's';
                    if (sec < 5400) return Math.round(sec / 60) + 'm';
                    if (sec < 86400 * 1.5) return Math.round(sec / 3600) + 'h';
                    if (sec < 86400 * 14) return Math.round(sec / 86400) + 'd';
                    if (sec < 86400 * 60) return Math.round(sec / 86400 / 7) + 'w';
                    if (sec < 86400 * 365) return Math.round(sec / 86400 / 30) + 'mo';
                    return Math.round(sec / 86400 / 365 * 10) / 10 + 'y';
                },

                onStripHover(e, ctrl) {
                    const data = ctrl.data;
                    if (!data || !data.buckets) return;
                    const rect = ctrl.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const n = data.buckets.length || 60;
                    let idx = Math.floor((x / rect.width) * n);
                    if (idx < 0) idx = 0;
                    if (idx >= n) idx = n - 1;
                    const b = data.buckets[idx];
                    const bucketSec = data.window_seconds / n;
                    const ageSec = (n - 1 - idx) * bucketSec;
                    const ageLabel = ageSec < bucketSec ? 'now' : this.humanDur(ageSec) + ' ago';
                    const scale = this.effectiveScale(ctrl);
                    let text;
                    if (!b || b.s === 'none') {
                        text = scale + ' · ' + ageLabel + ' · no data';
                    } else {
                        text = scale + ' · ' + ageLabel + ' · ' + b.s + ' · ' + (b.p || 0) + '% ok · n=' + (b.n || 0);
                    }
                    const tip = this.getStripTooltip();
                    tip.textContent = text;
                    tip.style.display = 'block';
                    const tx = Math.min(window.innerWidth - tip.offsetWidth - 10, e.clientX + 12);
                    const ty = Math.max(4, e.clientY - tip.offsetHeight - 8);
                    tip.style.left = tx + 'px';
                    tip.style.top = ty + 'px';
                },

                getStripTooltip() {
                    let tip = document.getElementById('strip-tooltip');
                    if (!tip) {
                        tip = document.createElement('div');
                        tip.id = 'strip-tooltip';
                        document.body.appendChild(tip);
                    }
                    return tip;
                },

                hideStripTooltip() {
                    const tip = document.getElementById('strip-tooltip');
                    if (tip) tip.style.display = 'none';
                },

                async removeHost(hostname) {
                    if (!confirm('Remove ' + hostname + '? Its agent will stop authenticating.')) return;
                    const res = await fetch('/api/hosts?hostname=' + encodeURIComponent(hostname), { method: 'DELETE' });
                    if (res.ok) {
                        this.loadTokens();
                        if (this.newToken && this.newToken.hostname === hostname) this.newToken = null;
                    }
                },

                async loadShares() {
                    const res = await fetch('/api/shares');
                    if (res.ok) this.shares = await res.json() || [];
                },

                async createShare() {
                    const res = await fetch('/api/shares', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ label: this.shareLabel.trim(), hours: parseInt(this.shareHours) })
                    });
                    if (res.ok) {
                        this.newShare = await res.json();
                        this.shareLabel = '';
                        this.loadShares();
                    }
                },

                async deleteShare(id) {
                    if (!confirm('Revoke this share link?')) return;
                    const res = await fetch('/api/shares?id=' + id, { method: 'DELETE' });
                    if (res.ok) this.loadShares();
                },

                // ---------- derived stats (ignored entities excluded) ----------
                activeHosts() {
                    return this.hosts.filter(h => !this.isIgnored('host', h.hostname));
                },
                get hostsUp() {
                    const iv = this.heartbeatInterval;
                    return this.activeHosts().filter(h => this.secondsAgo(h.last_seen) < iv * 2).length;
                },
                get hostsDown() { return this.activeHosts().length - this.hostsUp; },
                get totalContainers() {
                    return this.activeHosts().reduce((n, h) => n + this.activeContainers(h).length, 0);
                },
                get runningContainers() {
                    return this.activeHosts().reduce((n, h) => n + this.activeContainers(h).filter(c => c.state === 'running').length, 0);
                },
                get totalAgents() {
                    return this.activeHosts().reduce((n, h) => n + this.activeAgentsOf(h).length, 0);
                },
                get onlineAgents() {
                    return this.activeHosts().reduce((n, h) => n + this.activeAgentsOf(h).filter(a => a.status === 'online').length, 0);
                },

                activeContainers(host) {
                    return (host.containers || []).filter(c => !this.isIgnored('container', host.hostname + '/' + c.name));
                },
                activeAgentsOf(host) {
                    return (host.agents || []).filter(a => !this.isIgnored('agent', host.hostname + '/' + a.name));
                },
                countRunning(containers) {
                    return (containers || []).filter(c => c.state === 'running').length;
                },
                countOnlineAgents(agents) {
                    return (agents || []).filter(a => a.status === 'online').length;
                },

                // ---------- status helpers ----------
                hostStatus(host) {
                    const ago = this.secondsAgo(host.last_seen);
                    const iv = this.heartbeatInterval;
                    if (ago < iv * 2) return 'ok';
                    if (ago < iv * 5) return 'warn';
                    if (ago < iv * 10) return 'crit';
                    return 'dead';
                },
                containerStatus(c) {
                    if (c.state === 'running') return 'ok';
                    if (c.state === 'paused') return 'warn';
                    if (c.state === 'exited' || c.state === 'dead') return 'crit';
                    return 'dead';
                },
                agentStatus(a) {
                    if (a.status === 'online') return 'ok';
                    if (a.status === 'degraded') return 'warn';
                    if (a.status === 'offline') return 'crit';
                    return 'dead';
                },
                stateLabel(s) {
                    return s === 'ok'   ? 'Online'
                         : s === 'warn' ? 'Stale'
                         : s === 'crit' ? 'Offline'
                                        : 'Dead';
                },

                // ---------- time helpers ----------
                secondsAgo(isoStr) {
                    // Read tickSec so Alpine tracks it as a dependency —
                    // this makes "seen Xs ago" and hostStatus update every second.
                    void this.tickSec;
                    if (!isoStr) return 9999;
                    return (Date.now() - new Date(isoStr).getTime()) / 1000;
                },

                formatAgo(isoStr) {
                    const s = this.secondsAgo(isoStr);
                    if (s > 86400) return Math.floor(s / 86400) + 'd ago';
                    if (s > 3600) return Math.floor(s / 3600) + 'h ago';
                    if (s > 60) return Math.floor(s / 60) + 'm ago';
                    return Math.floor(s) + 's ago';
                },

                formatUptime(seconds) {
                    if (!seconds) return '';
                    const d = Math.floor(seconds / 86400);
                    const h = Math.floor((seconds % 86400) / 3600);
                    if (d > 0) return d + 'd ' + h + 'h';
                    const m = Math.floor((seconds % 3600) / 60);
                    return h + 'h ' + m + 'm';
                }
            };
        }
    </script>
</body>
