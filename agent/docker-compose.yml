services:
  fleetcom-bosun:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-bosun
    restart: unless-stopped
    # FLEET-78: hard cap so a runaway agent gets OOM-killed by the kernel
    # instead of thrashing the host into swap. memswap_limit == mem_limit
    # disables swap usage for this container so the limit is real.
    mem_limit: 256m
    memswap_limit: 256m
    labels:
      # Opt-in: watchtower only manages containers with this label, so it
      # never touches unrelated host containers.
      - com.centurylinklabs.watchtower.enable=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/mtab:/host/etc/mtab:ro
    environment:
      - FLEETCOM_URL=${FLEETCOM_URL:-https://fleet.barta.cm}
      - FLEETCOM_TOKEN=${FLEETCOM_TOKEN}
      - FLEETCOM_HOSTNAME=${FLEETCOM_HOSTNAME}
      - FLEETCOM_AGENTS=${FLEETCOM_AGENTS:-[]}
      # FLEET-78: tell Go's runtime to keep total heap under ~80% of
      # mem_limit. With a soft limit set, GC runs more aggressively and
      # returns memory to the OS instead of waiting for kernel pressure.
      - GOMEMLIMIT=200MiB
      # Watchtower-triggered updates: bosun calls this endpoint when the
      # server sends command="update" in a heartbeat response.
      - WATCHTOWER_URL=http://watchtower:8080
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN}

  # Opt-in: only starts when you run `docker compose --profile standalone up -d`.
  # Skip this service on hosts that already run a host-wide watchtower.
  # In that case, enable the existing watchtower's HTTP API and point bosun's
  # WATCHTOWER_URL at it (e.g. http://<existing-watchtower-name>:8080).
  watchtower:
    image: containrrr/watchtower:latest
    container_name: fleetcom-watchtower
    restart: unless-stopped
    profiles: [standalone]
    # No host port — the HTTP API is only reachable inside the compose
    # network by fleetcom-bosun.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
