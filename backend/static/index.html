                formatBuildTime(iso) {
                    if (!iso || iso === 'unknown') return 'unknown';
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return iso;
                    const pad = n => String(n).padStart(2, '0');
                    if (this.useUTC) {
                        return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate()) +
                               ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
                    }
                    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                },

                // Format ISO timestamp for display (tokens, shares, presets)
                formatTs(iso) {
                    if (!iso) return '—';
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return iso;
                    const pad = n => String(n).padStart(2, '0');
                    if (this.useUTC) {
                        return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate()) +
                               ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
                    }
                    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
                },

                // ---------- SSE connection ----------
                connect() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    if (m) this.shared = true;
                    this.openStream();
                },

                streamURL() {
                    const m = window.location.pathname.match(/^\/s\/([a-f0-9]+)/);
                    return m ? ('/s/' + m[1] + '/events') : '/api/events';
                },

                openStream() {
                    if (this.es) {
                        try { this.es.close(); } catch (_) {}
                    }
                    try {
                        this.es = new EventSource(this.streamURL());
                    } catch (e) {
                        console.warn('EventSource construction failed', e);
                        return;
                    }

                    this.es.addEventListener('config', (e) => {
                        try {
                            const cfg = JSON.parse(e.data);
                            if (cfg.heartbeat_interval) this.heartbeatInterval = cfg.heartbeat_interval;
                            if (cfg.instance_label !== undefined) this.instanceLabel = cfg.instance_label;
                            this.orgLogoURL = cfg.org_logo_url || '';
                            if (cfg.expected_agent_version) this.expectedAgentVersion = cfg.expected_agent_version;
                            // Detect new deployment — if the server commit changed, force reload
                            if (cfg.commit && this._serverCommit && cfg.commit !== this._serverCommit) {
                                console.log('New deployment detected (' + this._serverCommit + ' → ' + cfg.commit + '), reloading…');
                                location.reload();
                                return;
                            }
                            if (cfg.commit) this._serverCommit = cfg.commit;
                        } catch (_) {}
                    });

                    this.es.addEventListener('ignored', (e) => {
                        try {
                            this.ignoredSet = JSON.parse(e.data) || {};
                        } catch (_) {}
                    });

                    this.es.addEventListener('host-configs', (e) => {
                        try {
                            this.hostConfigs = JSON.parse(e.data) || {};
                        } catch (_) {}
                    });

                    this.es.addEventListener('hosts', (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            this.hosts = data || [];
                            this.lastOkAt = Date.now();
                        } catch (err) {
                            console.warn('hosts event parse error', err);
                        }
                    });

                    this.es.onopen = () => {
                        this.lastOkAt = Date.now();
                        this.connState = 'live';
                    };

                    // Intentionally NOT flipping connState in onerror — browser
                    // auto-reconnects, watchdog decides the UI state with grace period.
                    this.es.onerror = () => { /* watchdog handles it */ };
                },

                // Poll readyState — hides brief reconnects, surfaces real outages.
                //
                // Thresholds (relative to lastOkAt):
                //   <  5 s   -> stay LIVE (grace window; absorbs Cloudflare reconnects)
                //   <  75 s  -> RECONNECTING (server pings every 30s; allow 2x miss)
                //   >= 75 s  -> OFFLINE + force a fresh EventSource if stuck in CLOSED
                startConnWatchdog() {
                    setInterval(() => {
                        const rs = this.es ? this.es.readyState : 2;
                        const now = Date.now();

                        if (rs === 1) {
                            this.lastOkAt = now;
                            this.connState = 'live';
                            return;
                        }

                        const downFor = now - (this.lastOkAt || now);
                        if (downFor < 5000) {
                            this.connState = 'live';
                        } else if (downFor < 75000) {
                            this.connState = 'reconnecting';
                        } else {
                            this.connState = 'offline';
                            if (rs === 2) this.openStream();
                        }
                    }, 1000);
                },

                kickIfStale() {
                    const rs = this.es ? this.es.readyState : 2;
                    if (rs !== 1) this.openStream();
                },

                toggleHardware(hostname) {

                async loadHardware(hostname) {
                    if (this.hardwareLoading[hostname]) return;
                    this.hardwareLoading[hostname] = true;
                    try {
                        const res = await fetch('/api/hosts/' + encodeURIComponent(hostname) + '/hardware');
                        if (res.ok) {
                            this.hardwareCache[hostname] = await res.json();
                        }
                    } catch (_) {
                        // silent — panel shows "loading…" until cache is set
                    } finally {
                        delete this.hardwareLoading[hostname];
                    }
                },
                hwCpuPct(host) {
                    const live = host && host.hw_live;
                    if (!live) return null;
                    if (typeof live.cpu_used_pct === 'number' && live.cpu_used_pct > 0) {
                        return Math.min(999, Math.round(live.cpu_used_pct));
                    }
                    // Fallback — cpu_cores from hardwareCache if bosun didn't pre-compute
                    const hw = this.hardwareCache[host.hostname];
                    const cores = hw && hw.static && hw.static.cpu_cores ? hw.static.cpu_cores : 0;
                    if (cores > 0) {
                        return Math.min(999, Math.round((live.cpu_load_1 / cores) * 100));
                    }
                    return null;
                },
                hwMemPct(host) {
                    const live = host && host.hw_live;
                    if (!live || !live.mem_used_pct) return null;
                    return Math.round(live.mem_used_pct);
                },
                hwCpuTemp(host) {
                    const live = host && host.hw_live;
                    if (!live || live.cpu_temp_c == null) return null;
                    return Math.round(live.cpu_temp_c);
                },
                hwTempLevel(c) {
                    if (c == null) return '';
                    if (c >= 85) return 'crit';
                    if (c >= 70) return 'hot';
                    return '';
                },
                hwFastfetchText(hostname) {
                    const hw = this.hardwareCache[hostname];
                    if (!hw || !hw.fastfetch) return '';
                    try {
                        const arr = hw.fastfetch;
                        if (!Array.isArray(arr)) return JSON.stringify(arr, null, 2);
                        const lines = [];
                        for (const m of arr) {
                            if (!m) continue;
                            const t = m.type || 'Item';
                            const r = m.result;
                            let v;
                            if (r == null) v = '(null)';
                            else if (typeof r === 'string' || typeof r === 'number') v = String(r);
                            else v = JSON.stringify(r);
                            lines.push(t + ': ' + v);
                        }
                        return lines.join('\n');
                    } catch (_) {
                        return JSON.stringify(hw.fastfetch, null, 2);
                    }
                },
                renderSparkline(points, valueKey) {
                    if (!points || points.length === 0) return '';
                    const values = points.map(p => Number(p[valueKey])).filter(v => Number.isFinite(v));
                    if (values.length < 2) return '';
                    const w = 100, h = 28, pad = 2;
                    let min = Infinity, max = -Infinity;
                    for (const v of values) { if (v < min) min = v; if (v > max) max = v; }
                    const span = Math.max(1e-6, max - min);
                    const n = values.length;
                    const step = (w - pad*2) / Math.max(1, n - 1);
                    let d = '';
                    for (let i = 0; i < n; i++) {
                        const x = pad + i * step;
                        const y = h - pad - ((values[i] - min) / span) * (h - pad*2);
                        d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
                    }
                    const xLast = (pad + (n-1)*step).toFixed(1);
                    const area = d + 'L' + xLast + ' ' + (h - pad) + ' L' + pad + ' ' + (h - pad) + ' Z';
                    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path class="area" d="' + area + '"/><path class="line" d="' + d.trim() + '"/></svg>';
                },
                formatBytes(n) {
                    if (!n || n <= 0) return '—';
                    const units = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
                    let i = 0, v = n;
                    while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
                    return v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2) + ' ' + units[i];
                },

                // ---------- host config ----------
                openHostConfig(hostname) {
                    this.view = 'settings';
                    this.settingsTab = 'hosts';
                    this.configHost = hostname;
                    const cfg = this.hostConfigs[hostname] || {};
                    this.configComment = cfg.comment || '';
                    this.configImageId = cfg.image_preset_id != null ? Number(cfg.image_preset_id) : null;
                    this.imgPickOpen = false;
                    this.imgPickFocus = -1;
                    this.loadTokens();
                    this.loadImagePresets();
                },

                // ---------- image picker ----------
                imagePresetName(id) {
                    const p = this.imagePresets.find(p => p.id === id);
                    return p ? p.name : null;
                },
                imgPickToggle() {
                    this.imgPickOpen = !this.imgPickOpen;
                    if (this.imgPickOpen) {
                        // Seed focus on the currently selected row
                        const idx = this.imagePresets.findIndex(p => p.id === this.configImageId);
                        this.imgPickFocus = idx >= 0 ? idx + 1 : 0;
                    }
                },
                imgPickNav(delta) {
                    if (!this.imgPickOpen) { this.imgPickOpen = true; }
                    const max = this.imagePresets.length; // +1 virtual "none" at index 0
                    if (this.imgPickFocus < 0) this.imgPickFocus = 0;
                    this.imgPickFocus = (this.imgPickFocus + delta + (max + 1)) % (max + 1);
                },
                imgPickCommit() {
                    if (!this.imgPickOpen) { this.imgPickOpen = true; return; }
                    if (this.imgPickFocus === 0) { this.imgPickSelect(null); return; }
                    const p = this.imagePresets[this.imgPickFocus - 1];
                    if (p) this.imgPickSelect(p.id);
                },
                imgPickSelect(id) {
                    this.configImageId = id == null ? null : Number(id);
                    this.imgPickOpen = false;
                },

                async saveHostConfig() {
                    if (!this.configHost) return;
                    const presetId = this.configImageId == null ? null : Number(this.configImageId);
                    try {
                        const res = await fetch('/api/host-config', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                hostname: this.configHost,
                                image_preset_id: Number.isFinite(presetId) ? presetId : null,
                                comment: this.configComment
                            })
                        });
                        if (res.ok) this.toast('Host config saved');
                        else this.toast('Failed to save config', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- image presets ----------
                async loadImagePresets() {
                    try {
                        const res = await fetch('/api/image-presets');
                        if (res.ok) this.imagePresets = await res.json() || [];
                    } catch (_) {}
                },

                async uploadPreset(ev) {
                    const input = ev.target;
                    if (!input.files || !input.files[0]) return;
                    const file = input.files[0];
                    const name = prompt('Icon name:', file.name.replace(/\.[^.]+$/, ''));
                    if (!name) { input.value = ''; return; }
                    const form = new FormData();
                    form.append('name', name);
                    form.append('file', file);
                    try {
                        const res = await fetch('/api/image-presets', { method: 'POST', body: form });
                        if (res.ok) { this.loadImagePresets(); this.toast('Icon "' + name + '" uploaded'); }
                        else this.toast('Upload failed', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                    input.value = '';
                },

                async deletePreset(id) {
                    if (!confirm('Delete this icon?')) return;
                    try {
                        const res = await fetch('/api/image-presets/' + id, { method: 'DELETE' });
                        if (res.ok) { this.loadImagePresets(); this.toast('Icon deleted'); }
                        else this.toast('Delete failed', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                exportPresets() {
                    window.location.href = '/api/image-presets/export';
                },

                showImportDialog(event) {
                    this.importFile = event.target.files[0] || null;
                    this.importOverwrite = false;
                    event.target.value = '';
                },

                async importPresets() {
                    if (!this.importFile) return;
                    const form = new FormData();
                    form.append('file', this.importFile);
                    const mode = this.importOverwrite ? 'overwrite' : 'append';
                    try {
                        const res = await fetch('/api/image-presets/import?mode=' + mode, { method: 'POST', body: form });
                        if (res.ok) {
                            const result = await res.json();
                            this.toast('Imported ' + result.imported + ' of ' + result.total + ' icons');
                            this.importFile = null;
                            this.loadImagePresets();
                        } else {
                            this.toast(await res.text(), 'err');
                        }
                    } catch (_) { this.toast('Import failed', 'err'); }
                },

                // ---------- chip expand state ----------
                toggleChip(type, entityKey) {
                    const key = type + ':' + entityKey;
                    this.openChip = (this.openChip === key) ? null : key;
                },

                isChipOpen(type, entityKey) {
                    return this.openChip === (type + ':' + entityKey);
                },

                // ---------- global scale controls ----------
                effectiveScale(ctrl) {
                    return ctrl.scaleOverride || this.globalScale;
                },

                nextScaleOf(scale) {
                    const idx = this.scaleList.indexOf(scale);
                    return this.scaleList[(idx + 1) % this.scaleList.length];
                },

                nextGlobalScale() {
                    return this.nextScaleOf(this.globalScale);
                },

                cycleGlobalScale() {
                    const idx = this.scaleList.indexOf(this.globalScale);
                    this.globalScale = this.scaleList[(idx + 1) % this.scaleList.length];
                    localStorage.setItem('fleetcom.globalScale', this.globalScale);
                    this.propagateGlobalScale();
                },

                propagateGlobalScale() {
                    for (const c of this.stripRegistry) {
                        if (!c.scaleOverride) {
                            this.updateStripScale(c, this.globalScale);
                        }
                    }
                },

                resetAllStrips() {
                    for (const c of this.stripRegistry) {
                        if (c.scaleOverride) {
                            c.scaleOverride = null;
                            this.updateStripScale(c, this.globalScale);
                            if (c.revertBtn) c.revertBtn.classList.add('hidden');
                            if (c.labelEl) c.labelEl.classList.remove('has-override');
                        }
                    }
                },

                // ---------- history strips (canvas, imperative) ----------
                mountStrip(el, type, entityKey, opts) {
                    if (el._stripCtrl) return;
                    opts = opts || {};
                    const ctrl = {
                        el, type, key: entityKey,
                        scaleOverride: null,
                        labelEl: null,
                        scaleEl: null,
                        nextEl: null,
                        revertBtn: null,
                        meta: null,
                        canvas: null,
                        data: null,
                    };

                    // Lead element: context label for entities (dot + name)
                    if (opts.kind !== 'host') {
                        const ctx = document.createElement('span');
                        ctx.className = 'strip-context s-' + (opts.status || 'dead');
                        const dot = document.createElement('span');
                        dot.className = 'ctx-dot';
                        ctx.appendChild(dot);
                        const name = document.createElement('span');
                        name.className = 'ctx-name';
                        name.textContent = opts.label || entityKey;
                        ctx.appendChild(name);
                        el.appendChild(ctx);
                    }

                    // "STATUS 1H" label — clickable to cycle scale
                    const label = document.createElement('span');
                    label.className = 'strip-label';
                    label.title = 'Click to change time scale';
                    const slText = document.createElement('span');
                    slText.className = 'sl-text';
                    slText.textContent = opts.kind === 'host' ? 'STATUS' : 'HISTORY';
                    label.appendChild(slText);
                    const slScale = document.createElement('span');
                    slScale.className = 'sl-scale';
                    slScale.textContent = this.effectiveScale(ctrl);
                    ctrl.scaleEl = slScale;
                    label.appendChild(slScale);
                    const slNext = document.createElement('span');
                    slNext.className = 'sl-next';
                    slNext.textContent = '→ ' + this.nextScaleOf(this.effectiveScale(ctrl));
                    ctrl.nextEl = slNext;
                    label.appendChild(slNext);
                    ctrl.labelEl = label;

                    label.addEventListener('click', () => {
                        const curScale = this.effectiveScale(ctrl);
                        const nextScale = this.nextScaleOf(curScale);
                        ctrl.scaleOverride = nextScale;
                        label.classList.add('has-override');
                        revertBtn.classList.remove('hidden');
                        this.updateStripScale(ctrl, nextScale);
                    });
                    el.appendChild(label);

                    // Revert button
                    const revertBtn = document.createElement('button');
                    revertBtn.type = 'button';
                    revertBtn.className = 'strip-revert hidden';
                    revertBtn.innerHTML = '&#x21ba;';
                    revertBtn.title = 'Revert to global scale';
                    revertBtn.addEventListener('click', () => {
                        ctrl.scaleOverride = null;
                        label.classList.remove('has-override');
                        revertBtn.classList.add('hidden');
                        this.updateStripScale(ctrl, this.globalScale);
                    });
                    ctrl.revertBtn = revertBtn;
                    el.appendChild(revertBtn);

                    const canvas = document.createElement('canvas');
                    canvas.className = 'strip-canvas';
                    ctrl.canvas = canvas;
                    canvas.addEventListener('mousemove', (e) => this.onStripHover(e, ctrl));
                    canvas.addEventListener('mouseleave', () => this.hideStripTooltip());
                    el.appendChild(canvas);

                    const meta = document.createElement('span');
                    meta.className = 'strip-meta';
                    ctrl.meta = meta;
                    el.appendChild(meta);

                    el._stripCtrl = ctrl;
                    this.stripRegistry.add(ctrl);
                    this.fetchStrip(ctrl);
                },

                updateStripScale(ctrl, scale) {
                    if (ctrl.scaleEl) ctrl.scaleEl.textContent = scale;
                    if (ctrl.nextEl) ctrl.nextEl.textContent = '→ ' + this.nextScaleOf(scale);
                    this.fetchStrip(ctrl);
                },

                async fetchStrip(ctrl) {
                    const scale = this.effectiveScale(ctrl);
                    const url = '/api/history?entity_type=' + encodeURIComponent(ctrl.type)
                        + '&entity_key=' + encodeURIComponent(ctrl.key)
                        + '&scale=' + scale;
                    // Clear stale data so the canvas + meta don't silently
                    // keep showing the previous scale's numbers if the fetch
                    // fails. drawStrip renders 'loading…' when data is null.
                    ctrl.data = null;
                    this.drawStrip(ctrl);
                    try {
                        const res = await fetch(url);
                        if (!res.ok) return;
                        const json = await res.json();
                        ctrl.data = json;
                        this.drawStrip(ctrl);
                    } catch (_) {}
                },

                drawStrip(ctrl) {
                    const canvas = ctrl.canvas;
                    if (!canvas || !canvas.isConnected) return;
                    const dpr = window.devicePixelRatio || 1;
                    const cssW = canvas.clientWidth || 200;
                    const cssH = canvas.clientHeight || 12;
                    if (canvas.width !== Math.round(cssW * dpr) || canvas.height !== Math.round(cssH * dpr)) {
                        canvas.width = Math.round(cssW * dpr);
                        canvas.height = Math.round(cssH * dpr);
                    }
                    const ctx = canvas.getContext('2d');
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    const cs = getComputedStyle(document.documentElement);
                    const isLight = cs.getPropertyValue('--bg-0').trim().startsWith('#f') || cs.getPropertyValue('--bg-0').trim().startsWith('#e');
                    ctx.fillStyle = isLight ? '#e0e2e6' : '#0a0d10';
                    ctx.fillRect(0, 0, cssW, cssH);

                    const data = ctrl.data;
                    if (!data || !data.buckets) {
                        if (ctrl.meta) ctrl.meta.textContent = 'loading…';
                        return;
                    }

                    const buckets = data.buckets;
                    const n = buckets.length || 60;
                    const windowSec = data.window_seconds;
                    const cellW = cssW / n;

                    let coverageSec = 0;
                    if (data.first_sample) {
                        const t = new Date(data.first_sample).getTime();
                        if (!isNaN(t)) {
                            coverageSec = Math.min(windowSec, Math.max(0, (Date.now() - t) / 1000));
                        }
                    }

                    // "Before tracking" zone — render as faint hatched dead area
                    let coverStartIdx = n;
                    if (coverageSec > 0 && windowSec > 0) {
                        const ratio = coverageSec / windowSec;
                        coverStartIdx = Math.floor(n * (1 - ratio));
                    }
                    if (coverStartIdx > 0) {
                        ctx.fillStyle = isLight ? '#d0d3d8' : '#13171b';
                        ctx.fillRect(0, 0, coverStartIdx * cellW, cssH);
                    }

                    // Interpolate none-gaps shorter than the heartbeat interval.
                    // With 15s buckets and 60s heartbeats, up to 3 consecutive
                    // empty buckets between two data points is expected — not
                    // downtime. Only runs longer than the heartbeat interval are
                    // real outages and stay red.
                    const resolved = new Array(n);
                    for (let i = 0; i < n; i++) {
                        resolved[i] = (buckets[i] && buckets[i].s) ? buckets[i].s : 'none';
                    }
                    const bucketSec = windowSec / n;
                    const maxGapBuckets = Math.ceil(this.heartbeatInterval / bucketSec);
                    const rank = { ok: 0, dead: 1, warn: 2, crit: 3 };
                    let i = coverStartIdx;
                    while (i < n) {
                        if (resolved[i] !== 'none') { i++; continue; }
                        // Found start of a none-run — measure its length
                        let runEnd = i;
                        while (runEnd < n && resolved[runEnd] === 'none') runEnd++;
                        const runLen = runEnd - i;
                        // Find the data-bearing neighbors
                        const prev = (i > coverStartIdx) ? resolved[i - 1] : null;
                        const next = (runEnd < n) ? resolved[runEnd] : null;
                        // Fill if the gap is within expected heartbeat spacing
                        if (prev && prev !== 'none' && next && next !== 'none' && runLen <= maxGapBuckets) {
                            const fill = (rank[prev] || 0) >= (rank[next] || 0) ? prev : next;
                            for (let j = i; j < runEnd; j++) resolved[j] = fill;
                        }
                        i = runEnd;
                    }

                    // Real data vs interpolated — interpolated buckets use dimmed colors
                    const colors = isLight
                        ? { ok: '#16864f', warn: '#a86800', crit: '#c0243f', dead: '#8a8f9a' }
                        : { ok: '#3ddc97', warn: '#ffb84d', crit: '#ff4d6d', dead: '#5a6068' };
                    const colorsDim = isLight
                        ? { ok: '#6bc09a', warn: '#c9a050', crit: '#d87080', dead: '#b0b5be' }
                        : { ok: '#2a9e6c', warn: '#b8832e', crit: '#b8364d', dead: '#44484f' };
                    const noneColor = isLight ? '#e8c0c6' : '#2a1518';
                    for (let i = 0; i < n; i++) {
                        if (i < coverStartIdx) continue;
                        const status = resolved[i];
                        const x = Math.floor(i * cellW);
                        const w = Math.max(1, Math.floor((i + 1) * cellW) - x - (cellW > 2 ? 1 : 0));
                        if (status === 'none') {
                            ctx.fillStyle = noneColor;
                            ctx.fillRect(x, 1, w, cssH - 2);
                            continue;
                        }
                        const hasData = buckets[i] && buckets[i].s && buckets[i].s !== 'none';
                        const palette = hasData ? colors : colorsDim;
                        const color = palette[status];
                        if (!color) continue;
                        ctx.fillStyle = color;
                        ctx.fillRect(x, 1, w, cssH - 2);
                    }

                    // "now" marker on the right edge
                    ctx.fillStyle = isLight ? 'rgba(26, 29, 36, 0.3)' : 'rgba(232, 230, 223, 0.5)';
                    ctx.fillRect(cssW - 1, 0, 1, cssH);

                    if (ctrl.meta) {
                        ctrl.meta.classList.remove('fresh', 'complete');
                        if (!data.first_sample) {
                            ctrl.meta.textContent = '—';
                        } else if (coverageSec >= windowSec - 1) {
                            let ok = 0, total = 0;
                            for (let i = coverStartIdx; i < n; i++) {
                                if (resolved[i] === 'none') continue;
                                total++;
                                if (resolved[i] === 'ok') ok++;
                            }
                            const pct = total > 0 ? Math.round(100 * ok / total) : 0;
                            ctrl.meta.textContent = pct + '% ok';
                            if (pct >= 100) ctrl.meta.classList.add('complete');
                        } else {
                            ctrl.meta.textContent = this.humanDur(coverageSec) + '/' + this.humanDur(windowSec);
                            ctrl.meta.classList.add('fresh');
                        }
                    }
                },

                humanDur(sec) {
                    if (sec < 60) return Math.max(1, Math.round(sec)) + 's';
                    if (sec < 5400) return Math.round(sec / 60) + 'm';
                    if (sec < 86400 * 1.5) return Math.round(sec / 3600) + 'h';
                    if (sec < 86400 * 14) return Math.round(sec / 86400) + 'd';
                    if (sec < 86400 * 60) return Math.round(sec / 86400 / 7) + 'w';
                    if (sec < 86400 * 365) return Math.round(sec / 86400 / 30) + 'mo';
                    return Math.round(sec / 86400 / 365 * 10) / 10 + 'y';
                },

                onStripHover(e, ctrl) {
                    const data = ctrl.data;
                    if (!data || !data.buckets) return;
                    const rect = ctrl.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const n = data.buckets.length || 60;
                    let idx = Math.floor((x / rect.width) * n);
                    if (idx < 0) idx = 0;
                    if (idx >= n) idx = n - 1;
                    const b = data.buckets[idx];
                    const bucketSec = data.window_seconds / n;
                    const ageSec = (n - 1 - idx) * bucketSec;
                    const ageLabel = ageSec < bucketSec ? 'now' : this.humanDur(ageSec) + ' ago';
                    const scale = this.effectiveScale(ctrl);
                    let text;
                    if (!b || b.s === 'none') {
                        text = ageLabel + ' · no data';
                    } else {
                        text = ageLabel + ' · ' + b.s + ' · ' + (b.p || 0) + '% ok';
                    }
                    const tip = this.getStripTooltip();
                    tip.textContent = text;
                    tip.style.display = 'block';
                    const tx = Math.min(window.innerWidth - tip.offsetWidth - 10, e.clientX + 12);
                    const ty = Math.max(4, e.clientY - tip.offsetHeight - 8);
                    tip.style.left = tx + 'px';
                    tip.style.top = ty + 'px';
                },

                getStripTooltip() {
                    let tip = document.getElementById('strip-tooltip');
                    if (!tip) {
                        tip = document.createElement('div');
                        tip.id = 'strip-tooltip';
                        document.body.appendChild(tip);
                    }
                    return tip;
                },

                hideStripTooltip() {
                    const tip = document.getElementById('strip-tooltip');
                    if (tip) tip.style.display = 'none';
                },

                async removeHost(hostname) {
                    if (!confirm('Remove ' + hostname + '? Its agent will stop authenticating.')) return;
                    try {
                        const res = await fetch('/api/hosts?hostname=' + encodeURIComponent(hostname), { method: 'DELETE' });
                        if (res.ok) {
                            this.loadTokens();
                            if (this.newToken && this.newToken.hostname === hostname) this.newToken = null;
                            this.toast('Host ' + hostname + ' removed');
                        } else {
                            this.toast('Failed to remove host', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                async loadShares() {
                    const res = await fetch('/api/shares');
                    if (res.ok) this.shares = await res.json() || [];
                },

                async createShare() {
                    try {
                        const res = await fetch('/api/shares', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ label: this.shareLabel.trim(), hours: parseInt(this.shareHours) })
                        });
                        if (res.ok) {
                            this.newShare = await res.json();
                            this.shareLabel = '';
                            this.loadShares();
                            this.toast('Share link created');
                        } else {
                            this.toast('Failed to create share link', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                async deleteShare(id) {
                    if (!confirm('Revoke this share link?')) return;
                    try {
                        const res = await fetch('/api/shares?id=' + id, { method: 'DELETE' });
                        if (res.ok) { this.loadShares(); this.toast('Share link revoked'); }
                        else this.toast('Failed to revoke', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },

                // ---------- derived stats (ignored entities excluded) ----------
                activeHosts() {
                    return this.hosts.filter(h => !this.isIgnored('host', h.hostname));
                },
                get hostsUp() {
                    const iv = this.heartbeatInterval;
                    return this.activeHosts().filter(h => this.secondsAgo(h.last_seen) < iv * 2).length;
                },
                get hostsDown() { return this.activeHosts().length - this.hostsUp; },
                get totalContainers() {
                    return this.activeHosts().reduce((n, h) => n + this.activeContainers(h).length, 0);
                },
                get runningContainers() {
                    return this.activeHosts().reduce((n, h) => n + this.activeContainers(h).filter(c => c.state === 'running').length, 0);
                },
                get totalAgents() {
                    return this.activeHosts().reduce((n, h) => n + this.activeAgentsOf(h).length, 0);
                },
                get onlineAgents() {
                    return this.activeHosts().reduce((n, h) => n + this.activeAgentsOf(h).filter(a => a.status === 'online').length, 0);
                },

                activeContainers(host) {
                    return (host.containers || []).filter(c => !this.isIgnored('container', host.hostname + '/' + c.name));
                },
                activeAgentsOf(host) {
                    return (host.agents || []).filter(a => !this.isIgnored('agent', host.hostname + '/' + a.name));
                },
                get ignoredHostCount() {
                    return this.hosts.filter(h => this.isIgnored('host', h.hostname)).length;
                },
                get ignoredContainerCount() {
                    return this.hosts.reduce((n, h) => n + (h.containers || []).filter(c => this.isIgnored('container', h.hostname + '/' + c.name)).length, 0);
                },
                get ignoredAgentCount() {
                    return this.hosts.reduce((n, h) => n + (h.agents || []).filter(a => this.isIgnored('agent', h.hostname + '/' + a.name)).length, 0);
                },

                countRunning(containers) {
                    return (containers || []).filter(c => c.state === 'running').length;
                },
                countOnlineAgents(agents) {
                    return (agents || []).filter(a => a.status === 'online').length;
                },

                hostByName(hostname) {
                    return this.hosts.find(h => h.hostname === hostname) || null;
                },

                // ---------- status helpers ----------
                hostStatus(host) {
                    const ago = this.secondsAgo(host.last_seen);
                    const iv = this.heartbeatInterval;
                    if (ago < iv * 2) return 'ok';
                    if (ago < iv * 5) return 'warn';
                    if (ago < iv * 10) return 'crit';
                    return 'dead';
                },
                containerStatus(c) {
                    if (c.crash_loop || c.oom_killed) return 'crit';
                    if (c.health === 'unhealthy') return 'crit';
                    if (c.health === 'starting') return 'warn';
                    if (c.state === 'running') return 'ok';
                    if (c.state === 'restarting' || c.state === 'paused') return 'warn';
                    if (c.state === 'exited' || c.state === 'dead') return 'crit';
                    return 'dead';
                },
                containerHealthLabel(c) {
                    if (c.crash_loop) return 'CrashLoop';
                    if (c.oom_killed) return 'OOM Kill';
                    if (c.health === 'unhealthy') return 'Unhealthy';
                    if (c.health === 'starting') return 'Starting';
                    if (c.health === 'healthy') return 'Healthy';
                    if (c.state === 'restarting') return 'Restarting';
                    return '';
                },
                containerUptime(c) {
                    if (!c.started_at) return '';
                    const started = new Date(c.started_at).getTime();
                    if (isNaN(started)) return '';
                    const secs = Math.floor((Date.now() - started) / 1000);
                    if (secs < 0) return '';
                    if (secs < 60) return secs + 's';
                    if (secs < 3600) return Math.floor(secs / 60) + 'm';
                    if (secs < 86400) return Math.floor(secs / 3600) + 'h ' + Math.floor((secs % 3600) / 60) + 'm';
                    return Math.floor(secs / 86400) + 'd ' + Math.floor((secs % 86400) / 3600) + 'h';
                },
                exitCodeLabel(code) {
                    if (code === 0) return '';
                    if (code === 137) return 'SIGKILL/OOM';
                    if (code === 143) return 'SIGTERM';
                    if (code === 1) return 'Error';
                    return 'Exit ' + code;
                },
                isLegacyAgent(host) {
                    return !host.agent_version;
                },
                isOutdatedAgent(host) {
                    if (!host.agent_version || !this.expectedAgentVersion) return false;
                    // Extract semver from "0.1.0 (date, time)" format
                    const current = host.agent_version.split(' ')[0];
                    const expected = this.expectedAgentVersion.split(' ')[0];
                    return current !== expected;
                },
                agentVersionLabel(host) {
                    if (!host.agent_version) return 'LEGACY';
                    return host.agent_version;
                },
                agentVersionShort(host) {
                    if (!host.agent_version) return 'LEGACY';
                    return host.agent_version.split(' ')[0];
                },
                agentVersionRest(host) {
                    if (!host.agent_version) return '';
                    const rest = host.agent_version.slice(host.agent_version.indexOf(' ') + 1);
                    return rest === host.agent_version ? '' : rest;
                },
                // Parse the build timestamp out of an agent_version string
                // like "0.1.1 (2026-04-18, 17:45:27)". Returns ms since epoch
                // or null when no build time is present.
                agentBuildTimestamp(host) {
                    if (!host.agent_version) return null;
                    const m = host.agent_version.match(/\(([\d-]+),\s*([\d:]+)\)/);
                    if (!m) return null;
                    const t = Date.parse(m[1] + 'T' + m[2] + 'Z');
                    return Number.isFinite(t) ? t : null;
                },
                // A host is considered stale when either:
                //  - it's a legacy (no-version) agent and was created >24h ago
                //    (grace period so fresh hosts aren't nagged during setup), or
                //  - its agent build timestamp is more than 24h old.
                isAgentStale(host) {
                    const cutoffMs = 24 * 3600 * 1000;
                    if (!host.agent_version) {
                        if (!host.created_at) return false;
                        const created = Date.parse(host.created_at);
                        return Number.isFinite(created) && (Date.now() - created) > cutoffMs;
                    }
                    const built = this.agentBuildTimestamp(host);
                    if (built == null) return false;
                    return (Date.now() - built) > cutoffMs;
                },
                hasPendingUpdate(host) {
                    return !!(host && host.update_requested_at);
                },
                async requestHostUpdate(hostname) {
                    try {
                        const res = await fetch('/api/hosts/' + encodeURIComponent(hostname) + '/update', { method: 'POST' });
                        if (res.ok) this.toast('Update requested for ' + hostname);
                        else this.toast('Failed to request update', 'err');
                    } catch (_) { this.toast('Network error', 'err'); }
                },
                async requestUpdateAll() {
                    if (!confirm('Request an agent update on every host in your scope?')) return;
                    try {
                        const res = await fetch('/api/hosts/update-all', { method: 'POST' });
                        if (res.ok) {
                            const body = await res.json().catch(() => ({}));
                            this.toast('Update requested on ' + (body.count || 'all') + ' hosts');
                        } else {
                            this.toast('Failed to request updates', 'err');
                        }
                    } catch (_) { this.toast('Network error', 'err'); }
                },
                agentStatus(a) {
                    if (a.status === 'online') return 'ok';
                    if (a.status === 'degraded') return 'warn';
                    if (a.status === 'offline') return 'crit';
                    return 'dead';
                },
                stateLabel(s) {
                    return s === 'ok'   ? 'Online'
                         : s === 'warn' ? 'Stale'
                         : s === 'crit' ? 'Offline'
                                        : 'Dead';
                },

                // ---------- toast notifications ----------
                toast(msg, type = 'ok') {
                    const container = document.getElementById('toasts');
                    const el = document.createElement('div');
                    el.className = 'toast toast-' + type;
                    el.textContent = msg;
                    container.appendChild(el);
                    setTimeout(() => {
                        el.classList.add('toast-out');
                        setTimeout(() => el.remove(), 200);
                    }, type === 'err' ? 5000 : 3000);
                },

                async copyToClipboard(text, okMsg = 'Copied to clipboard') {
                    try {
                        await navigator.clipboard.writeText(text);
                        this.toast(okMsg);
                    } catch (_) {
                        this.toast('Copy failed', 'err');
                    }
                },

                // ---------- time helpers ----------
                secondsAgo(isoStr) {
                    // Read tickSec so Alpine tracks it as a dependency —
                    // this makes "seen Xs ago" and hostStatus update every second.
                    void this.tickSec;
                    if (!isoStr) return 9999;
                    return (Date.now() - new Date(isoStr).getTime()) / 1000;
                },

                formatAgo(isoStr) {
                    const s = this.secondsAgo(isoStr);
                    if (s > 86400) return Math.floor(s / 86400) + 'd ago';
                    if (s > 3600) return Math.floor(s / 3600) + 'h ago';
                    if (s > 60) return Math.floor(s / 60) + 'm ago';
                    return Math.floor(s) + 's ago';
                },

                formatUptime(seconds) {
                    if (!seconds) return '';
                    const d = Math.floor(seconds / 86400);
                    const h = Math.floor((seconds % 86400) / 3600);
                    if (d > 0) return d + 'd ' + h + 'h';
                    const m = Math.floor((seconds % 3600) / 60);
                    return h + 'h ' + m + 'm';
                }
            };
        }
    </script>
</body>
</html>
