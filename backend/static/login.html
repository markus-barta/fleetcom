<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetCom — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #1c1f26;
            border: 1px solid #2d333b;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #58a6ff;
        }
        label {
            display: block;
            font-size: 0.875rem;
            color: #8b949e;
            margin-bottom: 0.25rem;
        }
        input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            margin-bottom: 1rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #e1e4e8;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        button {
            width: 100%;
            padding: 0.625rem;
            background: #238636;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2ea043; }
        .error {
            background: #3d1f1f;
            border: 1px solid #6e3030;
            color: #f85149;
            padding: 0.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }
        .success {
            background: #1f3d1f;
            border: 1px solid #306e30;
            color: #3fb950;
            padding: 0.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }
        .forgot {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #58a6ff;
            font-size: 0.8125rem;
            text-decoration: none;
        }
        .forgot:hover { text-decoration: underline; }
        .forgot-form { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #2d333b; }
        .forgot-form label { margin-top: 0.5rem; }
        .forgot-form button { margin-top: 0.5rem; background: #30363d; }
        .forgot-form button:hover { background: #484f58; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>FleetCom</h1>
        <div class="success" id="success"></div>
        <div class="error" id="error"></div>
        <form method="POST" action="/login">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Sign in</button>
        </form>
        <a href="#" class="forgot" onclick="document.getElementById('forgot-form').style.display='block';this.style.display='none';return false;">Forgot password?</a>
        <div class="forgot-form" id="forgot-form">
            <form method="POST" action="/forgot-password">
                <label for="reset-email">Email</label>
                <input type="email" id="reset-email" name="email" required>
                <button type="submit">Send Reset Link</button>
            </form>
        </div>
    </div>
    <script>
        // Show success message after password reset
        if (location.search.includes('reset=ok')) {
            var el = document.getElementById('success');
            el.textContent = 'Password reset successfully. Please sign in.';
            el.style.display = 'block';
        }
    </script>
</body>
</html>
