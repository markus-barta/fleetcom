<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetCom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #080a10;
            --bg-1: #0e1118;
            --bg-2: #141821;
            --line: #1c202b;
            --line-2: #2a3040;
            --ink: #e8e6df;
            --ink-dim: #8a8d96;
            --ink-ghost: #565862;
            --ink-faint: #3a3e48;
            --ok: #3ddc97;
            --warn: #ffb84d;
            --crit: #ff4d6d;
            --dead: #545865;
            --accent: #6ab0ff;
            --ok-bg: rgba(61, 220, 151, 0.05);
            --warn-bg: rgba(255, 184, 77, 0.08);
            --warn-border: rgba(255, 184, 77, 0.42);
            --crit-bg: rgba(255, 77, 109, 0.10);
            --crit-border: rgba(255, 77, 109, 0.55);
            --dead-bg: rgba(84, 88, 101, 0.18);
            --dead-border: rgba(84, 88, 101, 0.40);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg-0);
            color: var(--ink);
            font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.5;
            font-feature-settings: 'tnum' 1, 'ss01' 1, 'cv02' 1;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* CRT scanlines — barely there, sets the telemetry tone */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                180deg,
                transparent 0,
                transparent 2px,
                rgba(255, 255, 255, 0.012) 2px,
                rgba(255, 255, 255, 0.012) 3px
            );
            z-index: 100;
        }

        /* Faint radial glow from top — subtle atmosphere */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(106, 176, 255, 0.05), transparent 60%);
            z-index: 1;
        }

        .app {
            flex: 1 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        main { flex: 1 0 auto; padding: 1.25rem 1.5rem 2rem; }

        /* ============================================================
           HEADER
           ============================================================ */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(20, 24, 33, 0.7), rgba(14, 17, 24, 0.5));
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left, .header-center, .header-right {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .header-right { justify-content: flex-end; }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.14em;
            color: var(--ink);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .brand::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 14px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(106, 176, 255, 0.3);
        }
        .brand .tag {
            font-size: 9px;
            letter-spacing: 0.22em;
            color: var(--ink-ghost);
            font-weight: 400;
            margin-left: 0.15rem;
        }

        /* Connection pill */
        .conn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.7rem;
            border: 1px solid var(--line-2);
            background: var(--bg-1);
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--ink-dim);
            white-space: nowrap;
        }
        .conn .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--ink-faint);
            flex-shrink: 0;
        }
        .conn.state-live { color: var(--ok); border-color: rgba(61, 220, 151, 0.35); }
        .conn.state-live .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok), 0 0 10px rgba(61, 220, 151, 0.4); }
        .conn.state-reconnecting { color: var(--warn); border-color: rgba(255, 184, 77, 0.4); }
        .conn.state-reconnecting .dot {
            background: var(--warn);
            box-shadow: 0 0 6px var(--warn);
            animation: pulse-fast 1s ease-in-out infinite;
        }
        .conn.state-offline {
            color: var(--crit);
            border-color: rgba(255, 77, 109, 0.55);
            background: rgba(255, 77, 109, 0.06);
        }
        .conn.state-offline .dot {
            background: var(--crit);
            box-shadow: 0 0 8px var(--crit), 0 0 14px rgba(255, 77, 109, 0.5);
            animation: pulse-fast 0.6s ease-in-out infinite;
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .clock {
            font-variant-numeric: tabular-nums;
            color: var(--ink-dim);
            font-size: 11px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .clock .sep { color: var(--ink-faint); margin: 0 0.35rem; }
        .clock .tz { color: var(--ink-ghost); font-size: 9px; letter-spacing: 0.18em; margin-left: 0.4rem; }

        /* View toggle */
        .view-toggle {
            display: inline-flex;
            border: 1px solid var(--line-2);
            background: var(--bg-1);
        }
        .view-toggle button {
            border: none;
            background: transparent;
            color: var(--ink-dim);
            padding: 0.35rem 0.8rem;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s;
        }
        .view-toggle button:hover { color: var(--ink); background: var(--bg-2); }
        .view-toggle button.active {
            color: var(--bg-0);
            background: var(--accent);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 1.1rem;
        }
        .nav a {
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--ink-dim);
            text-decoration: none;
            cursor: pointer;
            padding: 0.3rem 0;
            border-bottom: 1px solid transparent;
            transition: color 0.12s, border-color 0.12s;
        }
        .nav a:hover { color: var(--ink); }
        .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
        .nav .readonly {
            color: var(--ink-ghost);
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--line);
        }

        /* ============================================================
           SUB-HEADER
           ============================================================ */
        .sub-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1.5rem;
            border-bottom: 1px solid var(--line);
            background: rgba(14, 17, 24, 0.45);
            gap: 1.5rem;
            position: sticky;
            top: 47px;
            z-index: 9;
        }

        .sub-header-center {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .fleet-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .fleet-stat .stat-icon {
            width: 16px;
            height: 16px;
            color: var(--ink-ghost);
            flex-shrink: 0;
        }
        .fleet-stat.state-warn .stat-icon { color: var(--warn); }
        .fleet-stat.state-crit .stat-icon { color: var(--crit); }
        .fleet-stat .stat-label {
            font-size: 9px;
            letter-spacing: 0.18em;
            color: var(--ink-ghost);
            text-transform: uppercase;
            font-weight: 600;
        }
        .fleet-stat .stat-value {
            font-size: 13px;
            font-weight: 700;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
        }
        .fleet-stat .stat-value .sub {
            color: var(--ink-ghost);
            font-weight: 300;
            padding: 0 1px;
        }
        .fleet-stat.state-warn .stat-value { color: var(--warn); }
        .fleet-stat.state-crit .stat-value { color: var(--crit); }

        .sub-header-sep {
            width: 1px;
            height: 18px;
            background: var(--line-2);
            flex-shrink: 0;
        }

        /* Global scale controls */
        .global-scale {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .global-scale .gs-label {
            font-size: 8px;
            letter-spacing: 0.18em;
            color: var(--ink-ghost);
            text-transform: uppercase;
            font-weight: 600;
            margin-right: 4px;
        }

        /* ============================================================
           MAIN — view label
           ============================================================ */
        .view-label {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 0.85rem;
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 500;
        }
        .view-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--line), transparent);
        }

        /* ============================================================
           DETAIL VIEW — cards
           ============================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(410px, 1fr));
            gap: 0.85rem;
        }

        .card {
            position: relative;
            background: var(--bg-1);
            border: 1px solid var(--line);
            border-left: 3px solid var(--line-2);
            padding: 0.85rem 1.1rem 1rem;
            transition: background 0.15s, border-color 0.15s;
        }
        .card:hover { background: var(--bg-2); }

        .card.state-ok {
            border-left-color: var(--ok);
            animation: ok-breathe 6s ease-in-out infinite;
        }
        .card.state-warn {
            border-left-color: var(--warn);
            border-color: var(--warn-border);
            background: linear-gradient(180deg, var(--warn-bg), transparent 65%), var(--bg-1);
        }
        .card.state-crit {
            border-left-color: var(--crit);
            border-color: var(--crit-border);
            background: linear-gradient(180deg, var(--crit-bg), transparent 65%), var(--bg-1);
            animation: crit-pulse 2.4s ease-in-out infinite;
        }
        .card.state-dead {
            border-left-color: var(--dead);
            border-color: var(--dead-border);
            background:
                repeating-linear-gradient(
                    135deg,
                    transparent 0 18px,
                    rgba(255, 255, 255, 0.018) 18px 19px
                ),
                var(--dead-bg);
            filter: grayscale(0.7);
            opacity: 0.48;
        }
        .card.state-dead:hover { opacity: 0.72; }

        @keyframes ok-breathe {
            0%, 100% { box-shadow: -1px 0 14px -4px rgba(61, 220, 151, 0.18); }
            50%      { box-shadow: -1px 0 22px -2px rgba(61, 220, 151, 0.38); }
        }
        @keyframes crit-pulse {
            0%, 100% { box-shadow: 0 0 0 0 transparent, 0 0 12px rgba(255, 77, 109, 0.06); }
            50%      { box-shadow: inset 3px 0 0 0 var(--crit), 0 0 32px rgba(255, 77, 109, 0.24); }
        }

        .card-head {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            margin-bottom: 0.25rem;
        }
        .card-avatar {
            width: 50px;
            height: 50px;
            flex-shrink: 0;
            border: 1px solid var(--line);
            background: var(--bg-0);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .card-avatar .avatar-placeholder {
            width: 20px;
            height: 20px;
            color: var(--ink-faint);
        }
        .card-head-main {
            flex: 1;
            min-width: 0;
        }
        .card-head-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.6rem;
        }
        .card-head-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
            flex-wrap: wrap;
        }
        .hostname {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.01em;
        }
        .card-gear {
            background: transparent;
            border: none;
            color: var(--ink-faint);
            cursor: pointer;
            padding: 2px;
            line-height: 0;
            transition: color 0.12s;
        }
        .card-gear:hover { color: var(--ink-dim); }
        .card-gear svg { width: 12px; height: 12px; }
        .card-comment {
            font-size: 10px;
            line-height: 1.4;
            color: var(--ink-ghost);
            margin-top: 0.35rem;
            white-space: pre-line;
            max-height: 3.6em;
            overflow: hidden;
            letter-spacing: 0.01em;
        }
        .state-pill {
            display: inline-block;
            font-size: 8px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 2px 6px;
            border: 1px solid currentColor;
            line-height: 1.2;
        }
        .card.state-ok .state-pill {
            color: var(--ok);
            background: rgba(61, 220, 151, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .card.state-ok .state-pill::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ok);
            box-shadow: 0 0 6px var(--ok), 0 0 10px rgba(61, 220, 151, 0.5);
            animation: heartbeat 1.6s ease-in-out infinite;
        }
        .card.state-warn .state-pill { color: var(--warn); background: rgba(255, 184, 77, 0.05); }
        .card.state-crit .state-pill { color: var(--crit); background: rgba(255, 77, 109, 0.10); }
        .card.state-dead .state-pill { color: var(--dead); }

        @keyframes heartbeat {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.35; transform: scale(0.8); }
        }

        .card-head-right {
            text-align: right;
            font-size: 10px;
            color: var(--ink-dim);
            line-height: 1.5;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .card-head-right .seen {
            color: var(--ink-ghost);
        }
        .card.state-warn .card-head-right .seen { color: var(--warn); }
        .card.state-crit .card-head-right .seen { color: var(--crit); font-weight: 600; }

        .card-section {
            margin-top: 0.8rem;
        }
        .card-section-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            font-size: 8px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 600;
        }
        .card-section-label .count { color: var(--ink-dim); }
        .card-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .chips.dense {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
            gap: 3px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 7px;
            background: var(--bg-0);
            border: 1px solid var(--line);
            font-size: 11px;
            color: var(--ink);
            line-height: 1.3;
            min-width: 0;
            max-width: 100%;
        }
        .chip .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--ink-faint);
        }
        .chip.s-ok .dot { background: var(--ok); box-shadow: 0 0 4px rgba(61, 220, 151, 0.7); }
        .chip.s-warn .dot { background: var(--warn); box-shadow: 0 0 4px rgba(255, 184, 77, 0.7); }
        .chip.s-warn { border-color: rgba(255, 184, 77, 0.25); }
        .chip.s-crit .dot { background: var(--crit); box-shadow: 0 0 5px rgba(255, 77, 109, 0.8); }
        .chip.s-crit { border-color: rgba(255, 77, 109, 0.35); color: var(--crit); }
        .chip.s-dead .dot { background: var(--dead); }
        .chip.s-dead { opacity: 0.6; }

        /* Container chip — shipping-container crate icon */
        .chip-container .crate {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
            color: var(--ink-faint);
        }
        .chip-container.s-ok .crate {
            color: var(--ok);
            filter: drop-shadow(0 0 3px rgba(61, 220, 151, 0.75));
        }
        .chip-container.s-warn .crate {
            color: var(--warn);
            filter: drop-shadow(0 0 3px rgba(255, 184, 77, 0.75));
        }
        .chip-container.s-crit .crate {
            color: var(--crit);
            filter: drop-shadow(0 0 4px rgba(255, 77, 109, 0.85));
        }
        .chip-container.s-dead .crate { color: var(--dead); }

        .chip.is-open {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 0 10px rgba(106, 176, 255, 0.25);
        }
        .chip { cursor: pointer; }

        /* ============================================================
           HISTORY STRIPS — single-row, canvas-rendered, self-labelling
           ============================================================ */
        .strip-block {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 0.45rem;
            padding: 4px 8px;
            background: var(--bg-0);
            border: 1px solid var(--line);
            border-left: 2px solid var(--line-2);
        }
        .strip-block.host-strip {
            margin-top: 0.65rem;
            border-left-color: var(--accent);
            border-left-width: 2px;
        }
        .strip-prefix {
            font-size: 7px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 700;
            flex-shrink: 0;
            padding-right: 1px;
        }
        .strip-context {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--ink-dim);
            flex-shrink: 0;
            max-width: 120px;
            overflow: hidden;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .strip-context .ctx-name {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .strip-context .ctx-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ink-faint);
            flex-shrink: 0;
        }
        .strip-context.s-ok .ctx-dot   { background: var(--ok);   box-shadow: 0 0 4px rgba(61, 220, 151, 0.75); }
        .strip-context.s-warn .ctx-dot { background: var(--warn); box-shadow: 0 0 4px rgba(255, 184, 77, 0.75); }
        .strip-context.s-crit .ctx-dot { background: var(--crit); box-shadow: 0 0 5px rgba(255, 77, 109, 0.85); }
        .strip-context.s-dead .ctx-dot { background: var(--dead); }
        .strip-context.s-warn { color: var(--warn); }
        .strip-context.s-crit { color: var(--crit); }
        .strip-context.s-dead { color: var(--ink-ghost); opacity: 0.7; }

        /* Strip scale controls */
        .strip-controls {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .strip-scale-btn {
            background: rgba(106, 176, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: inherit;
            font-size: 8px;
            letter-spacing: 0.08em;
            padding: 0 5px;
            height: 15px;
            line-height: 13px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            min-width: 30px;
            text-align: center;
        }
        .strip-scale-btn:hover { background: rgba(106, 176, 255, 0.2); }
        .strip-scale-btn.has-override {
            background: rgba(255, 184, 77, 0.12);
            border-color: var(--warn);
            color: var(--warn);
        }
        .strip-scale-btn.has-override:hover { background: rgba(255, 184, 77, 0.2); }

        .strip-ghost-btn {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--ink-ghost);
            font-family: inherit;
            font-size: 9px;
            padding: 0;
            width: 15px;
            height: 15px;
            line-height: 13px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.1s;
        }
        .strip-ghost-btn:hover {
            color: var(--ink-dim);
            border-color: var(--line-2);
            background: var(--bg-2);
        }
        .strip-ghost-btn.revert-btn {
            color: var(--ink-faint);
            font-size: 10px;
        }
        .strip-ghost-btn.revert-btn:hover {
            color: var(--warn);
            border-color: rgba(255, 184, 77, 0.35);
        }
        .strip-ghost-btn.revert-btn.hidden { display: none; }

        .strip-canvas {
            display: block;
            flex: 1 1 auto;
            min-width: 60px;
            height: 12px;
            cursor: crosshair;
        }
        .strip-meta {
            flex-shrink: 0;
            font-size: 8px;
            color: var(--ink-ghost);
            letter-spacing: 0.03em;
            font-variant-numeric: tabular-nums;
            text-transform: lowercase;
            min-width: 44px;
            text-align: right;
            font-weight: 600;
        }
        .strip-meta.fresh    { color: var(--accent); }
        .strip-meta.complete { color: var(--ok); }
        #strip-tooltip {
            position: fixed;
            display: none;
            background: var(--bg-0);
            color: var(--ink);
            border: 1px solid var(--line-2);
            padding: 4px 8px;
            font-size: 10px;
            line-height: 1.35;
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.55);
            font-variant-numeric: tabular-nums;
        }

        /* Agent chip — sparkle icon instead of dot */
        .chip-agent .spark {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
            color: var(--ink-faint);
        }
        .chip-agent.s-ok .spark {
            color: var(--ok);
            filter: drop-shadow(0 0 4px rgba(61, 220, 151, 0.85));
            animation: spark-twinkle 3.4s ease-in-out infinite;
        }
        .chip-agent.s-warn .spark {
            color: var(--warn);
            filter: drop-shadow(0 0 4px rgba(255, 184, 77, 0.85));
        }
        .chip-agent.s-crit .spark {
            color: var(--crit);
            filter: drop-shadow(0 0 5px rgba(255, 77, 109, 0.9));
        }
        .chip-agent.s-dead .spark { color: var(--dead); }

        @keyframes spark-twinkle {
            0%, 100% { opacity: 1; transform: rotate(0deg); }
            50%      { opacity: 0.65; transform: rotate(12deg); }
        }

        .card-empty {
            font-size: 9px;
            color: var(--ink-ghost);
            letter-spacing: 0.12em;
            margin-top: 0.65rem;
            text-transform: uppercase;
        }

        /* ============================================================
           COMPACT VIEW — telemetry table
           ============================================================ */
        .fleet-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            border: 1px solid var(--line);
            background: var(--bg-1);
        }
        .fleet-table thead th {
            text-align: left;
            padding: 0.55rem 0.85rem;
            font-size: 8px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 600;
            border-bottom: 1px solid var(--line-2);
            background: var(--bg-2);
            white-space: nowrap;
        }
        .fleet-table thead th.col-state { width: 20px; padding-right: 0; }
        .fleet-table tbody td {
            padding: 0.6rem 0.85rem;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
            color: var(--ink-dim);
            white-space: nowrap;
        }
        .fleet-table tbody tr:last-child td { border-bottom: none; }
        .fleet-table tbody tr { transition: background 0.1s; }
        .fleet-table tbody tr:hover { background: var(--bg-2); }

        .fleet-table .col-host { color: var(--ink); font-weight: 700; font-size: 13px; }
        .fleet-table td.col-state { padding-right: 0; width: 20px; }
        .fleet-table td.col-state .dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--ink-faint);
        }

        .fleet-table tr.row-ok .col-state .dot {
            background: var(--ok);
            box-shadow: 0 0 6px var(--ok);
        }
        .fleet-table tr.row-warn .col-state .dot {
            background: var(--warn);
            box-shadow: 0 0 6px var(--warn);
        }
        .fleet-table tr.row-warn { background: var(--warn-bg); }
        .fleet-table tr.row-warn .col-host { color: var(--warn); }
        .fleet-table tr.row-crit .col-state .dot {
            background: var(--crit);
            box-shadow: 0 0 8px var(--crit);
            animation: pulse-fast 1.4s ease-in-out infinite;
        }
        .fleet-table tr.row-crit { background: var(--crit-bg); }
        .fleet-table tr.row-crit .col-host { color: var(--crit); }
        .fleet-table tr.row-dead {
            opacity: 0.42;
            filter: grayscale(0.75);
            background: repeating-linear-gradient(
                135deg,
                transparent 0 14px,
                rgba(255, 255, 255, 0.02) 14px 15px
            );
        }
        .fleet-table tr.row-dead:hover { opacity: 0.7; }
        .fleet-table tr.row-dead .col-state .dot { background: var(--dead); }
        .fleet-table tr.row-dead .col-host { color: var(--ink-ghost); text-decoration: line-through; text-decoration-color: var(--ink-faint); }
        .fleet-table tr.row-ok .col-state .dot { animation: heartbeat 1.6s ease-in-out infinite; }

        /* Bar strip inside compact table */
        .bar-strip {
            display: inline-flex;
            gap: 2px;
            flex-wrap: wrap;
            align-items: center;
            max-width: 320px;
            line-height: 0;
        }
        .bar-strip .bar {
            position: relative;
            width: 8px;
            height: 14px;
            background: var(--ink-faint);
            cursor: default;
            transition: transform 0.08s;
        }
        .bar-strip .bar:hover { transform: scaleY(1.2); }
        .bar-strip .bar.s-ok { background: var(--ok); box-shadow: 0 0 4px rgba(61, 220, 151, 0.55); }
        .bar-strip .bar.s-warn { background: var(--warn); box-shadow: 0 0 4px rgba(255, 184, 77, 0.55); }
        .bar-strip .bar.s-crit { background: var(--crit); box-shadow: 0 0 4px rgba(255, 77, 109, 0.7); }
        .bar-strip .bar.s-dead { background: var(--dead); }
        .bar-strip .bar:hover::after {
            content: attr(data-name);
            position: absolute;
            bottom: calc(100% + 7px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-0);
            color: var(--ink);
            border: 1px solid var(--line-2);
            padding: 4px 7px;
            font-size: 10px;
            line-height: 1.3;
            white-space: nowrap;
            z-index: 30;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .bar-strip .none { color: var(--ink-faint); }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--ink-ghost);
            border: 1px dashed var(--line);
            background: var(--bg-1);
        }
        .empty-state h2 {
            font-size: 13px;
            margin-bottom: 0.5rem;
            color: var(--ink-dim);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .empty-state p {
            font-size: 11px;
            letter-spacing: 0.02em;
        }

        /* ============================================================
           ADMIN PANEL
           ============================================================ */
        .admin-panel { max-width: 700px; }
        .admin-panel h2 {
            font-size: 10px;
            color: var(--ink-dim);
            margin-bottom: 1rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 700;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--line);
        }
        .form-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            align-items: stretch;
        }
        .form-row input, .form-row select {
            padding: 0.55rem 0.8rem;
            background: var(--bg-1);
            border: 1px solid var(--line-2);
            color: var(--ink);
            font-family: inherit;
            font-size: 12px;
        }
        .form-row input { flex: 1; }
        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(106, 176, 255, 0.12);
        }

        .btn {
            padding: 0.55rem 1.1rem;
            border: 1px solid var(--line-2);
            background: var(--bg-1);
            color: var(--ink);
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn:hover { background: var(--bg-2); }
        .btn-primary {
            background: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }
        .btn-primary:hover { background: rgba(106, 176, 255, 0.1); }
        .btn-danger {
            color: var(--crit);
            border-color: rgba(255, 77, 109, 0.35);
            padding: 0.3rem 0.65rem;
            font-size: 9px;
            background: transparent;
        }
        .btn-danger:hover { background: rgba(255, 77, 109, 0.08); }

        .token-list { list-style: none; }
        .token-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 0.9rem;
            background: var(--bg-1);
            border: 1px solid var(--line);
            margin-bottom: 0.4rem;
            font-size: 12px;
        }
        .token-list .hostname { color: var(--ink); font-weight: 700; font-size: 13px; }
        .token-list .created {
            color: var(--ink-ghost);
            font-size: 10px;
            margin-left: 1rem;
            font-variant-numeric: tabular-nums;
        }
        .token-reveal {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-1);
            border: 1px solid var(--ok);
            border-left: 3px solid var(--ok);
        }
        .token-reveal .label {
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ok);
            margin-bottom: 0.4rem;
            font-weight: 700;
        }
        .token-reveal code {
            display: block;
            word-break: break-all;
            font-size: 11px;
            color: var(--ink);
            user-select: all;
            padding: 0.5rem 0;
            line-height: 1.5;
        }
        .token-reveal .warning {
            font-size: 10px;
            color: var(--warn);
            margin-top: 0.5rem;
            letter-spacing: 0.04em;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        footer {
            flex-shrink: 0;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, transparent, rgba(14, 17, 24, 0.6));
            padding: 0.6rem 1.5rem;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
        }
        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.4rem 0.75rem;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: var(--ink-ghost);
            line-height: 1;
        }
        .footer-inner .sep { color: var(--ink-faint); user-select: none; }
        .footer-inner .brand-f {
            color: var(--ink-dim);
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .footer-inner .brand-f .version {
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .footer-inner .deployed {
            font-size: 9px;
            letter-spacing: 0.1em;
            color: var(--ink-ghost);
            text-transform: uppercase;
            font-weight: 600;
        }
        .footer-inner .deployed .ts {
            color: var(--ink-dim);
            font-variant-numeric: tabular-nums;
            text-transform: none;
            font-weight: 400;
        }
        .footer-inner a {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--ink-dim);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer-inner a:hover { color: var(--ink); }
        .footer-inner a svg { width: 13px; height: 13px; display: block; }
        .footer-inner a.commit {
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }
        .footer-inner a.commit .hash::before {
            content: '#';
            color: var(--ink-faint);
            margin-right: 1px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1100px) {
            header { grid-template-columns: 1fr; gap: 0.75rem; padding: 0.75rem 1rem; }
            .header-left, .header-center, .header-right {
                justify-content: flex-start;
                flex-wrap: wrap;
            }
            .sub-header { flex-wrap: wrap; gap: 0.6rem; top: auto; position: relative; }
        }
        @media (max-width: 720px) {
            main { padding: 1rem; }
            .grid { grid-template-columns: 1fr; }
            .fleet-table { font-size: 11px; }
            .fleet-table thead th, .fleet-table tbody td { padding: 0.4rem 0.55rem; }
        }

        /* Shared icon base */
        .icon { display: inline-flex; align-items: center; flex-shrink: 0; }
        .icon svg { width: 14px; height: 14px; }

        /* ============================================================
           SETTINGS TABS
           ============================================================ */
        .settings-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--line-2);
            margin-bottom: 1.5rem;
        }
        .settings-tab {
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--ink-ghost);
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 600;
            padding: 0.65rem 1.2rem;
            cursor: pointer;
            transition: color 0.12s, border-color 0.12s;
        }
        .settings-tab:hover { color: var(--ink-dim); }
        .settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ============================================================
           IGNORED ENTITIES
           ============================================================ */
        .card.is-ignored {
            opacity: 0.35;
            filter: grayscale(0.6);
        }
        .card.is-ignored:hover { opacity: 0.55; }
        .card.is-ignored .state-pill::after {
            content: ' · IGNORED';
            font-size: 7px;
            letter-spacing: 0.18em;
        }
        .chip.is-ignored {
            opacity: 0.3;
            filter: grayscale(0.6);
        }
        .chip.is-ignored:hover { opacity: 0.5; }

        .ignored-list { list-style: none; }
        .ignored-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.55rem 0.9rem;
            background: var(--bg-1);
            border: 1px solid var(--line);
            margin-bottom: 0.35rem;
            font-size: 11px;
        }
        .ignored-list .entity-type {
            font-size: 8px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-ghost);
            font-weight: 700;
            margin-right: 0.6rem;
            min-width: 70px;
        }
        .ignored-list .entity-key {
            color: var(--ink-dim);
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ============================================================
           CONTEXT MENU
           ============================================================ */
        .ctx-menu {
            position: fixed;
            z-index: 9999;
            background: var(--bg-1);
            border: 1px solid var(--line-2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            min-width: 160px;
        }
        .ctx-menu button {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: var(--ink-dim);
            font-family: inherit;
            font-size: 11px;
            padding: 0.55rem 0.9rem;
            cursor: pointer;
            transition: background 0.08s, color 0.08s;
        }
        .ctx-menu button:hover { background: var(--bg-2); color: var(--ink); }
        .ctx-menu .ctx-sep {
            height: 1px;
            background: var(--line);
            margin: 2px 0;
        }
    </style>
</head>
